<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Always Close — انقطع الاتصال</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #fff;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  /* Animated background orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .orb1 { width:320px; height:320px; background:#6c63ff; top:-80px; left:-80px; animation-delay:0s; }
  .orb2 { width:240px; height:240px; background:#ff6584; bottom:-60px; right:-60px; animation-delay:3s; }
  .orb3 { width:180px; height:180px; background:#43d4ff; top:40%; left:60%; animation-delay:5s; }

  @keyframes float {
    0%,100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px;
    padding: 40px 32px 36px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  /* Logo / Icon */
  .icon-wrap {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 42px;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(108,99,255,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(108,99,255,0); }
  }

  .app-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    margin-bottom: 4px;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #6c63ff, #ff6584);
    border-radius: 4px;
    margin: 14px auto;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 80, 80, 0.2);
    border: 1px solid rgba(255,80,80,0.35);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: #ff8080;
    margin-bottom: 18px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ff4444;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity:0.2; }
  }

  .title-ar {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }

  .title-en {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    margin-bottom: 20px;
    direction: ltr;
    font-style: italic;
  }

  .desc {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.7);
    margin-bottom: 28px;
  }

  .retry-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #6c63ff, #9c59d1);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    margin-bottom: 12px;
  }

  .retry-btn:active { transform: scale(0.97); }

  .footer-note {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
  }

  /* Countdown */
  #countdown {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 16px;
    height: 20px;
  }

  /* RTL/LTR switch */
  body.ltr { direction: ltr; }
  body.ltr .app-name { letter-spacing: 1px; }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="icon-wrap">📡</div>
  <div class="app-name">Always Close</div>
  <div class="divider"></div>

  <div class="status-badge">
    <span class="dot"></span>
    <span id="lbl-offline">غير متصل</span>
  </div>

  <div class="title-ar" id="lbl-title">انقطع الاتصال بالخادم</div>
  <div class="title-en" id="lbl-title-en">Connection Lost</div>

  <div class="desc" id="lbl-desc">
    الخادم غير متاح في الوقت الحالي.<br>
    يُرجى الانتظار أو المحاولة مجدداً.
  </div>

  <div id="countdown"></div>

  <button class="retry-btn" id="retry-btn" onclick="retry()">🔄 إعادة الاتصال</button>

  <div class="footer-note" id="lbl-footer">Always Close &copy; 2025</div>
</div>

<script>
// ─── Language detection ───────────────────────────────────────
const params  = new URLSearchParams(location.search);
const referer = document.referrer || '';
let lang = params.get('lang') || 'ar';

// Try to read lang from sessionStorage (set by main pages)
try { lang = sessionStorage.getItem('ac_lang') || lang; } catch(e){}

const isAr = lang === 'ar';

if (!isAr) {
  document.documentElement.lang = 'en';
  document.documentElement.dir  = 'ltr';
  document.body.classList.add('ltr');
  document.getElementById('lbl-offline').textContent  = 'Offline';
  document.getElementById('lbl-title').textContent    = 'Server Unavailable';
  document.getElementById('lbl-title-en').textContent = 'انقطع الاتصال';
  document.getElementById('lbl-desc').innerHTML       =
    'The server is currently unavailable.<br>Please wait or try again.';
  document.getElementById('retry-btn').textContent    = '🔄 Retry Connection';
}

// ─── Auto retry countdown ─────────────────────────────────────
let seconds = 15;
const cdEl = document.getElementById('countdown');

function updateCountdown() {
  if (seconds <= 0) {
    cdEl.textContent = '';
    retry();
    return;
  }
  cdEl.textContent = isAr
    ? `إعادة المحاولة تلقائياً خلال ${seconds}ث`
    : `Auto-retrying in ${seconds}s`;
  seconds--;
  setTimeout(updateCountdown, 1000);
}

updateCountdown();

// ─── Retry logic ─────────────────────────────────────────────
let retrying = false;
function retry() {
  if (retrying) return;
  retrying = true;
  const btn = document.getElementById('retry-btn');
  btn.textContent = isAr ? '⏳ جارٍ الاتصال...' : '⏳ Connecting...';
  btn.disabled = true;
  cdEl.textContent = '';

  // Ping the server root — if it responds, reload back to previous page
  fetch('/', { method:'HEAD', cache:'no-store' })
    .then(r => {
      if (r.ok) {
        // Server is back — go back or reload
        if (history.length > 1) {
          history.back();
          setTimeout(() => location.reload(), 500);
        } else {
          location.href = '/';
        }
      } else { resetRetry(); }
    })
    .catch(() => resetRetry());
}

function resetRetry() {
  retrying = false;
  const btn = document.getElementById('retry-btn');
  btn.textContent = isAr ? '🔄 إعادة الاتصال' : '🔄 Retry Connection';
  btn.disabled = false;
  seconds = 15;
  updateCountdown();
}
</script>
</body>
</html>
