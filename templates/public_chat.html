<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>الدردشة العامة</title>
<style>
:root{
  --bg:#0f0f13;--card:#1a1a24;--card2:#22222e;
  --accent:#7c5af0;--accent2:#e91e8c;
  --text:#f0f0f8;--sub:#8888a8;--brd:rgba(255,255,255,.08);
  --me:linear-gradient(135deg,#7c5af0,#e91e8c);
  --other:#22222e;--radius:16px;
  --bar-h:64px;--hdr-h:52px;--filter-h:48px;
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
#hdr{height:var(--hdr-h);background:var(--card);border-bottom:1px solid var(--brd);
     display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;
     position:sticky;top:0;z-index:100}
#hdr-title{font-size:16px;font-weight:700;flex:1}
#hdr-loc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);
         background:rgba(124,90,240,.15);border-radius:10px;padding:3px 8px}
#hdr-loc-dot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;
              transition:background .3s}
#hdr-loc-dot.active{background:#4caf50}

/* ── FILTER CHIPS ── */
#filter-row{height:var(--filter-h);background:var(--card);border-bottom:1px solid var(--brd);
            display:flex;align-items:center;padding:0 10px;gap:7px;overflow-x:auto;
            flex-shrink:0;scrollbar-width:none}
#filter-row::-webkit-scrollbar{display:none}
.fchip{border:1.5px solid var(--brd);border-radius:20px;padding:5px 13px;
       font-size:12px;font-weight:600;color:var(--sub);white-space:nowrap;cursor:pointer;
       background:transparent;transition:all .2s;flex-shrink:0}
.fchip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── MESSAGES ── */
#msgs-wrap{flex:1;overflow-y:auto;padding:12px 10px 8px;
           display:flex;flex-direction:column;gap:6px;
           scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
#msgs-wrap::-webkit-scrollbar{width:4px}
#msgs-wrap::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

#empty-state{display:none;flex-direction:column;align-items:center;
             justify-content:center;gap:10px;flex:1;color:var(--sub);text-align:center}
#empty-state .icon{font-size:48px;opacity:.4}
#empty-state p{font-size:13px;line-height:1.6}

/* ── MESSAGE BUBBLE ── */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:85%}
.msg-row.mine{align-self:flex-start;flex-direction:row-reverse}
.msg-row.other{align-self:flex-end}
.msg-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;cursor:pointer;
            border:2px solid var(--brd)}
.msg-avatar-ph{width:34px;height:34px;border-radius:50%;background:var(--card2);
               display:flex;align-items:center;justify-content:center;font-size:14px;
               flex-shrink:0;cursor:pointer;border:2px solid var(--brd)}
.bubble-wrap{display:flex;flex-direction:column;gap:2px}
.bubble-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--sub);
             padding:0 4px}
.msg-row.mine .bubble-meta{justify-content:flex-end}
.meta-name{font-weight:600;color:var(--text);cursor:pointer}
.meta-name:hover{text-decoration:underline}
.meta-dist{background:rgba(124,90,240,.25);border-radius:6px;padding:1px 5px;
           font-size:9px;color:#b0a0ff}
.bubble{border-radius:18px;padding:10px 13px;max-width:300px;word-break:break-word;
        font-size:14px;line-height:1.5;position:relative}
.msg-row.mine .bubble{background:var(--me);border-bottom-right-radius:4px;
                       box-shadow:0 2px 12px rgba(124,90,240,.35)}
.msg-row.other .bubble{background:var(--other);border-bottom-left-radius:4px}
.bubble-time{font-size:9px;color:rgba(255,255,255,.45);margin-top:3px;
             text-align:left}
.msg-row.mine .bubble-time{text-align:right}

/* image bubble */
.bubble-img{border-radius:14px;max-width:220px;max-height:220px;
            object-fit:cover;cursor:pointer;display:block;width:100%}
/* voice bubble */
.voice-bubble{display:flex;align-items:center;gap:8px;padding:8px 12px;min-width:160px}
.voice-play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);
            border:none;color:#fff;cursor:pointer;display:flex;align-items:center;
            justify-content:center;font-size:16px;flex-shrink:0;transition:background .2s}
.voice-play:hover{background:rgba(255,255,255,.35)}
.voice-bars{flex:1;display:flex;align-items:center;gap:2px;height:24px}
.voice-bar{flex:1;background:rgba(255,255,255,.4);border-radius:2px;
           animation:none;transition:height .1s}
.voice-dur{font-size:11px;color:rgba(255,255,255,.7);flex-shrink:0;min-width:28px;text-align:right}
/* file bubble */
.file-bubble{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer}
.file-ico{font-size:24px;flex-shrink:0}
.file-info{overflow:hidden}
.file-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.file-dl{font-size:10px;color:rgba(255,255,255,.6)}

/* ── INPUT BAR ── */
#input-bar{background:var(--card);border-top:1px solid var(--brd);
           padding:8px 10px calc(8px + var(--safe-bot));
           display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.ibtn{width:38px;height:38px;border-radius:50%;background:var(--card2);
      border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;
      justify-content:center;font-size:18px;flex-shrink:0;transition:background .2s}
.ibtn:hover{background:var(--accent)}
#msg-input{flex:1;background:var(--card2);border:1.5px solid var(--brd);
           border-radius:20px;padding:9px 15px;color:var(--text);font-size:14px;
           resize:none;max-height:120px;outline:none;font-family:inherit;line-height:1.4}
#msg-input::placeholder{color:var(--sub)}
#send-btn{width:40px;height:40px;border-radius:50%;
          background:linear-gradient(135deg,var(--accent),var(--accent2));
          border:none;color:#fff;cursor:pointer;font-size:18px;
          display:flex;align-items:center;justify-content:center;
          flex-shrink:0;transition:transform .15s,opacity .15s}
#send-btn:active{transform:scale(.9)}
#send-btn.mic-mode{background:var(--card2)}

/* ── EMOJI PICKER ── */
#emoji-picker{position:fixed;bottom:calc(var(--bar-h) + var(--filter-h) + var(--hdr-h) + 8px);
              left:8px;right:8px;background:var(--card);border:1px solid var(--brd);
              border-radius:16px;padding:10px;z-index:200;display:none;
              box-shadow:0 -8px 30px rgba(0,0,0,.5)}
.emoji-tabs{display:flex;gap:6px;margin-bottom:8px;border-bottom:1px solid var(--brd);padding-bottom:6px}
.etab{background:none;border:none;font-size:18px;cursor:pointer;padding:3px 6px;
      border-radius:8px;opacity:.5;transition:all .2s}
.etab.active{opacity:1;background:rgba(124,90,240,.2)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;
            max-height:160px;overflow-y:auto}
.eg{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;
    border-radius:8px;transition:background .15s;text-align:center}
.eg:hover{background:var(--card2)}

/* ── ATTACH MENU ── */
#attach-menu{position:fixed;bottom:calc(var(--bar-h) + var(--filter-h) + var(--hdr-h) + 8px);
             left:10px;background:var(--card);border:1px solid var(--brd);
             border-radius:14px;padding:8px;z-index:200;display:none;
             box-shadow:0 -4px 20px rgba(0,0,0,.4)}
.amenu-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
            border-radius:10px;cursor:pointer;font-size:14px;white-space:nowrap;
            transition:background .15s}
.amenu-item:hover{background:var(--card2)}
.amenu-item span{font-size:20px}

/* ── VOICE RECORDING OVERLAY ── */
#rec-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;
             display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#rec-pulse{width:80px;height:80px;border-radius:50%;background:var(--accent2);
           display:flex;align-items:center;justify-content:center;font-size:36px;
           animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(233,30,140,.6)}
                 50%{transform:scale(1.1);box-shadow:0 0 0 20px rgba(233,30,140,0)}}
#rec-dur{font-size:28px;font-weight:700;color:#fff}
#rec-hint{font-size:13px;color:rgba(255,255,255,.5)}
#rec-cancel{background:var(--card2);border:none;color:var(--sub);padding:10px 24px;
            border-radius:20px;cursor:pointer;font-size:13px}

/* ── IMAGE EXPAND ── */
#img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;
             display:none;align-items:center;justify-content:center}
#img-overlay img{max-width:95vw;max-height:92vh;border-radius:12px;object-fit:contain}
#img-overlay-close{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.15);
                   border:none;color:#fff;width:36px;height:36px;border-radius:50%;
                   cursor:pointer;font-size:20px}

/* ── USER SHEET ── */
#user-sheet{position:fixed;inset:0;z-index:350;display:none}
#user-sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
#user-sheet-card{position:absolute;bottom:0;left:0;right:0;background:var(--card);
                 border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-bot));
                 display:flex;flex-direction:column;align-items:center;gap:14px}
.usheet-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}
.usheet-name{font-size:16px;font-weight:700}
.usheet-dist{font-size:12px;color:var(--sub)}
.usheet-btns{display:flex;gap:10px;width:100%}
.usheet-btn{flex:1;padding:13px;border-radius:14px;border:none;cursor:pointer;
            font-size:14px;font-weight:700;transition:opacity .2s}
.usheet-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.usheet-btn.secondary{background:var(--card2);color:var(--text)}

/* ── SCROLL TO BOTTOM BTN ── */
#scroll-btn{position:fixed;left:50%;transform:translateX(-50%);
            bottom:calc(var(--bar-h) + var(--filter-h) + 16px);
            background:var(--accent);color:#fff;border:none;border-radius:20px;
            padding:7px 16px;font-size:12px;cursor:pointer;display:none;z-index:150;
            box-shadow:0 2px 12px rgba(124,90,240,.5)}

/* ── LOADING ── */
#loading-msgs{text-align:center;padding:24px;color:var(--sub);font-size:13px}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-title">💬 الدردشة العامة</div>
  <div id="hdr-loc">
    <div id="hdr-loc-dot"></div>
    <span id="hdr-loc-txt">جارٍ التحديد…</span>
  </div>
</div>

<!-- FILTER CHIPS -->
<div id="filter-row">
  <div class="fchip" data-r="100m">100م</div>
  <div class="fchip" data-r="500m">500م</div>
  <div class="fchip active" data-r="1km">1 كم</div>
  <div class="fchip" data-r="10km">10 كم</div>
  <div class="fchip" data-r="city">المدينة</div>
  <div class="fchip" data-r="country">البلد</div>
  <div class="fchip" data-r="all">الكل</div>
</div>

<!-- MESSAGES -->
<div id="msgs-wrap">
  <div id="loading-msgs">⏳ جارٍ التحميل…</div>
  <div id="empty-state" style="display:none">
    <div class="icon">💬</div>
    <p>لا توجد رسائل ضمن النطاق المحدد<br>كن أول من يبدأ المحادثة!</p>
  </div>
</div>

<!-- SCROLL TO BOTTOM -->
<button id="scroll-btn" onclick="scrollToBottom()">⬇ رسائل جديدة</button>

<!-- INPUT BAR -->
<div id="input-bar">
  <button class="ibtn" id="emoji-btn" title="إيموجي">😊</button>
  <button class="ibtn" id="attach-btn" title="مرفق">📎</button>
  <textarea id="msg-input" rows="1" placeholder="اكتب رسالة…"></textarea>
  <button id="send-btn" class="mic-mode" id="send-btn">🎤</button>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker">
  <div class="emoji-tabs">
    <button class="etab active" data-cat="smileys">😀</button>
    <button class="etab" data-cat="gestures">👍</button>
    <button class="etab" data-cat="hearts">❤️</button>
    <button class="etab" data-cat="nature">🌸</button>
    <button class="etab" data-cat="objects">⭐</button>
    <button class="etab" data-cat="flags">🇸🇦</button>
  </div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<!-- ATTACH MENU -->
<div id="attach-menu">
  <div class="amenu-item" id="attach-img">
    <span>🖼️</span> صورة
  </div>
  <div class="amenu-item" id="attach-file">
    <span>📄</span> ملف
  </div>
</div>

<!-- VOICE RECORDING OVERLAY -->
<div id="rec-overlay">
  <div id="rec-pulse">🎤</div>
  <div id="rec-dur">0:00</div>
  <div id="rec-hint">أفلت للإرسال</div>
  <button id="rec-cancel">❌ إلغاء</button>
</div>

<!-- IMAGE EXPAND OVERLAY -->
<div id="img-overlay" onclick="closeImg()">
  <button id="img-overlay-close" onclick="closeImg()">✕</button>
  <img id="img-overlay-img" src="" alt="">
</div>

<!-- USER ACTION SHEET -->
<div id="user-sheet">
  <div id="user-sheet-bg" onclick="closeUserSheet()"></div>
  <div id="user-sheet-card">
    <img class="usheet-avatar" id="us-avatar" src="" alt="">
    <div class="usheet-name" id="us-name"></div>
    <div class="usheet-dist" id="us-dist"></div>
    <div class="usheet-btns">
      <button class="usheet-btn primary" onclick="goPrivateChat()">💬 محادثة خاصة</button>
      <button class="usheet-btn secondary" onclick="closeUserSheet()">إغلاق</button>
    </div>
  </div>
</div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="fi-img"  accept="image/*" style="display:none">
<input type="file" id="fi-file" accept="*/*"     style="display:none">

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const params   = new URLSearchParams(location.search);
const uid      = params.get('uid') || '';
const lang     = params.get('lang') || 'ar';
const isRTL    = lang === 'ar';
document.documentElement.dir = isRTL ? 'rtl' : 'ltr';

let radius     = '1km';
let lastId     = 0;
let myDbId     = null;
let pollTimer  = null;
let isAtBottom = true;

// active user sheet
let sheetTgId    = null;
let sheetName    = '';
let sheetPhoto   = '';
let sheetDist    = '';

// voice recording
let mediaRecorder  = null;
let audioChunks    = [];
let isRecording    = false;
let recInterval    = null;
let recSeconds     = 0;
let recCancelled   = false;

// ═══════════════════════════════════════════════════════
// EMOJI DATA
// ═══════════════════════════════════════════════════════
const EMOJIS = {
  smileys:  ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩'],
  gestures: ['👍','👎','👌','✌️','🤞','🤟','🤙','👋','🤚','🖐️','🖖','🤲','🙌','👐','🤜','🤛','✊','👊','🤝','🙏','💪','🦾','🦿','🤜','✋'],
  hearts:   ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟','☮️','✝️','☯️','✨','💯','🔥','⭐','🌟','💫','⚡','🎉'],
  nature:   ['🌸','🌹','🌺','🌻','🌼','🌷','🌱','🌿','🍀','🍁','🍂','🍃','🌾','🍄','🌊','🌈','⭐','🌙','☀️','❄️','🌴','🎋','🎍','🍁','🌵','🎄'],
  objects:  ['⭐','🔥','💎','🎵','🎶','🎸','🎮','📱','💻','🖥️','📷','📸','🎬','🎥','📺','📻','🎁','🎈','🎂','🍕','🍔','🌮','🍣','🍜','🍎','🍊','🍋','🍇','🍓'],
  flags:    ['🇸🇦','🇦🇪','🇶🇦','🇰🇼','🇧🇭','🇴🇲','🇯🇴','🇱🇧','🇪🇬','🇸🇾','🇮🇶','🇾🇪','🇱🇾','🇹🇳','🇩🇿','🇲🇦','🇸🇩','🇸🇴','🇵🇸','🇹🇷','🇺🇸','🇬🇧','🇫🇷','🇩🇪','🇷🇺','🇨🇳','🇯🇵','🇰🇷','🇮🇳','🇧🇷'],
};

// ═══════════════════════════════════════════════════════
// EMOJI PICKER
// ═══════════════════════════════════════════════════════
function renderEmojis(cat) {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  (EMOJIS[cat] || []).forEach(e => {
    const b = document.createElement('button');
    b.className = 'eg'; b.textContent = e;
    b.onclick = () => { insertEmoji(e); };
    grid.appendChild(b);
  });
}
renderEmojis('smileys');

document.querySelectorAll('.etab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.etab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderEmojis(tab.dataset.cat);
  };
});

function insertEmoji(e) {
  const inp = document.getElementById('msg-input');
  const s = inp.selectionStart, en = inp.selectionEnd;
  inp.value = inp.value.slice(0, s) + e + inp.value.slice(en);
  inp.selectionStart = inp.selectionEnd = s + e.length;
  inp.dispatchEvent(new Event('input'));
}

document.getElementById('emoji-btn').onclick = (ev) => {
  ev.stopPropagation();
  const p = document.getElementById('emoji-picker');
  const a = document.getElementById('attach-menu');
  a.style.display = 'none';
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
};

// ═══════════════════════════════════════════════════════
// ATTACH MENU
// ═══════════════════════════════════════════════════════
document.getElementById('attach-btn').onclick = (ev) => {
  ev.stopPropagation();
  const a = document.getElementById('attach-menu');
  const p = document.getElementById('emoji-picker');
  p.style.display = 'none';
  a.style.display = a.style.display === 'block' ? 'none' : 'block';
};
document.getElementById('attach-img').onclick  = () => { document.getElementById('fi-img').click(); document.getElementById('attach-menu').style.display='none'; };
document.getElementById('attach-file').onclick = () => { document.getElementById('fi-file').click(); document.getElementById('attach-menu').style.display='none'; };

document.getElementById('fi-img').onchange  = (e) => handleFileUpload(e.target.files[0], 'image');
document.getElementById('fi-file').onchange = (e) => handleFileUpload(e.target.files[0], 'file');

document.addEventListener('click', () => {
  document.getElementById('emoji-picker').style.display = 'none';
  document.getElementById('attach-menu').style.display  = 'none';
});

// ═══════════════════════════════════════════════════════
// SEND BUTTON ↔ MIC
// ═══════════════════════════════════════════════════════
const inp  = document.getElementById('msg-input');
const sBtn = document.getElementById('send-btn');

function autoResize() {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  const hasText = inp.value.trim().length > 0;
  sBtn.textContent = hasText ? '➤' : '🎤';
  sBtn.classList.toggle('mic-mode', !hasText);
}
inp.addEventListener('input', autoResize);
inp.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendTextMsg(); }});

sBtn.onclick = () => {
  if (inp.value.trim()) sendTextMsg();
};

// ── MIC: long press ────────────────────────────────────
let micHoldTimer = null;
sBtn.addEventListener('touchstart', (e) => {
  if (inp.value.trim()) return;
  e.preventDefault();
  micHoldTimer = setTimeout(startRecording, 300);
}, {passive:false});
sBtn.addEventListener('touchend', (e) => {
  clearTimeout(micHoldTimer);
  if (isRecording) stopRecording(false);
});
sBtn.addEventListener('mousedown', () => {
  if (inp.value.trim()) return;
  micHoldTimer = setTimeout(startRecording, 300);
});
sBtn.addEventListener('mouseup', () => {
  clearTimeout(micHoldTimer);
  if (isRecording) stopRecording(false);
});

// ═══════════════════════════════════════════════════════
// VOICE RECORDING
// ═══════════════════════════════════════════════════════
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioChunks = [];
    recCancelled = false;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if (recCancelled || audioChunks.length === 0) return;
      const blob = new Blob(audioChunks, {type: 'audio/webm'});
      await uploadAndSend(blob, 'voice.webm', 'voice', recSeconds);
    };
    mediaRecorder.start(200);
    isRecording = true;
    recSeconds = 0;
    document.getElementById('rec-overlay').style.display = 'flex';
    recInterval = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds/60)).padStart(1,'0');
      const s = String(recSeconds%60).padStart(2,'0');
      document.getElementById('rec-dur').textContent = `${m}:${s}`;
    }, 1000);
  } catch(err) {
    alert('لا يمكن الوصول للميكروفون');
  }
}

function stopRecording(cancel) {
  if (!isRecording) return;
  isRecording = false;
  recCancelled = cancel;
  clearInterval(recInterval);
  document.getElementById('rec-overlay').style.display = 'none';
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
}
document.getElementById('rec-cancel').onclick = () => stopRecording(true);

// ═══════════════════════════════════════════════════════
// FILE UPLOAD
// ═══════════════════════════════════════════════════════
async function handleFileUpload(file, type) {
  if (!file) return;
  await uploadAndSend(file, file.name, type, null);
}

async function uploadAndSend(blob, name, type, dur) {
  const fd = new FormData();
  fd.append('uid', uid);
  fd.append('file_type', type === 'image' ? 'image' : type === 'voice' ? 'voice' : 'file');
  fd.append('file', blob, name);
  try {
    const res = await fetch('/api/chat/upload', {method:'POST', body:fd}).then(r=>r.json());
    if (!res.ok) { alert(res.error); return; }
    const payload = {
      uid, content: '', msg_type: type,
      file_url: res.file_url, file_name: res.file_name,
    };
    if (dur) payload.duration = dur;
    await sendMsg(payload);
  } catch(e) { console.error(e); }
}

// ═══════════════════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════════════════
async function sendTextMsg() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  autoResize();
  await sendMsg({ uid, content: text, msg_type: 'text' });
}

async function sendMsg(payload) {
  try {
    const res = await fetch('/api/chat/public/send', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).then(r=>r.json());
    if (res.ok) loadMessages(false);
  } catch(e) { console.error(e); }
}

// ═══════════════════════════════════════════════════════
// RADIUS FILTER
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.fchip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.fchip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    radius = c.dataset.r;
    lastId = 0;
    loadMessages(true);
  };
});

// ═══════════════════════════════════════════════════════
// LOAD MESSAGES
// ═══════════════════════════════════════════════════════
async function loadMessages(reset) {
  if (reset) {
    lastId = 0;
    document.getElementById('msgs-wrap').innerHTML =
      '<div id="loading-msgs" style="text-align:center;padding:24px;color:var(--sub);font-size:13px">⏳ جارٍ التحميل…</div>';
  }
  if (!uid) return;
  try {
    const r = await fetch(
      `/api/chat/public/messages?uid=${uid}&radius=${radius}&last_id=${lastId}`
    ).then(r=>r.json());
    if (!r.ok) return;
    if (r.my_db_id) myDbId = r.my_db_id;

    if (reset) {
      document.getElementById('msgs-wrap').innerHTML = '';
      if (r.messages.length === 0) {
        const e = document.createElement('div');
        e.id = 'empty-state';
        e.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;flex:1;color:var(--sub);text-align:center;padding:40px 20px';
        e.innerHTML = '<div style="font-size:48px;opacity:.4">💬</div><p style="font-size:13px;line-height:1.6">لا توجد رسائل ضمن النطاق المحدد<br>كن أول من يبدأ المحادثة!</p>';
        document.getElementById('msgs-wrap').appendChild(e);
        return;
      }
    }

    r.messages.forEach(m => {
      if (document.getElementById(`msg-${m.id}`)) return;
      const el = buildMsgEl(m);
      document.getElementById('msgs-wrap').appendChild(el);
      if (m.id > lastId) lastId = m.id;
    });

    if (reset || isAtBottom) scrollToBottom();
    else if (r.messages.length > 0) {
      document.getElementById('scroll-btn').style.display = 'block';
    }
  } catch(e) { console.error(e); }
}

// ═══════════════════════════════════════════════════════
// BUILD MESSAGE ELEMENT
// ═══════════════════════════════════════════════════════
function buildMsgEl(m) {
  const row = document.createElement('div');
  row.id = `msg-${m.id}`;
  row.className = `msg-row ${m.is_mine ? 'mine' : 'other'}`;

  // avatar
  const avatarEl = m.sender_photo
    ? `<img class="msg-avatar" src="${m.sender_photo}" alt=""
           onclick="openUserSheet('${m.sender_tg_id}','${esc(m.sender_name)}','${m.sender_photo || ''}','${esc(m.distance||'')}')"`
    : `<div class="msg-avatar-ph"
           onclick="openUserSheet('${m.sender_tg_id}','${esc(m.sender_name)}','','${esc(m.distance||'')}')">👤</div>`;

  // bubble content
  let bubbleContent = '';
  if (m.msg_type === 'image' && m.file_url) {
    bubbleContent = `<img class="bubble-img" src="${m.file_url}" alt="صورة"
      onclick="openImg('${m.file_url}')" onerror="this.style.display='none'">`;
  } else if (m.msg_type === 'voice' && m.file_url) {
    const dur = m.duration || 0;
    const bars = Array.from({length:20},(_,i)=>
      `<div class="voice-bar" style="height:${6+Math.sin(i*0.8)*8+Math.random()*6}px"></div>`
    ).join('');
    bubbleContent = `
      <div class="voice-bubble">
        <button class="voice-play" onclick="playVoice(this,'${m.file_url}')">▶</button>
        <div class="voice-bars">${bars}</div>
        <span class="voice-dur">${fmtDur(dur)}</span>
      </div>`;
  } else if (m.msg_type === 'file' && m.file_url) {
    bubbleContent = `
      <div class="file-bubble" onclick="window.open('${m.file_url}','_blank')">
        <div class="file-ico">${fileIcon(m.file_name)}</div>
        <div class="file-info">
          <div class="file-name">${esc(m.file_name || 'ملف')}</div>
          <div class="file-dl">اضغط للتحميل</div>
        </div>
      </div>`;
  } else {
    bubbleContent = `<span>${linkify(esc(m.content))}</span>`;
  }

  const time = fmtTime(m.created_at);
  const distBadge = m.distance && !m.is_mine
    ? `<span class="meta-dist">📍 ${esc(m.distance)}</span>` : '';

  row.innerHTML = `
    ${avatarEl}
    <div class="bubble-wrap">
      ${!m.is_mine ? `<div class="bubble-meta">
        <span class="meta-name" onclick="openUserSheet('${m.sender_tg_id}','${esc(m.sender_name)}','${m.sender_photo||''}','${esc(m.distance||'')}')">
          ${esc(m.sender_name)}
        </span>
        ${distBadge}
      </div>` : ''}
      <div class="bubble">${bubbleContent}</div>
      <div class="bubble-time">${time}</div>
    </div>`;
  return row;
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'الآن';
  if (diff < 3600) return `${Math.floor(diff/60)} د`;
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('ar', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ar', {day:'numeric',month:'short'});
}
function fmtDur(s) {
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function fileIcon(name) {
  if (!name) return '📄';
  const ext = name.split('.').pop().toLowerCase();
  const map = {pdf:'📕',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📋',pptx:'📋',zip:'🗜️',rar:'🗜️',mp3:'🎵',mp4:'🎬',mov:'🎬'};
  return map[ext] || '📄';
}
function linkify(s) {
  return s.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" style="color:#a0a0ff;word-break:break-all">$1</a>');
}

// ── Voice playback ─────────────────────────────────────
let activeAudio = null;
let activePlayBtn = null;
function playVoice(btn, url) {
  if (activeAudio) { activeAudio.pause(); activeAudio = null; if(activePlayBtn) activePlayBtn.textContent='▶'; }
  if (btn === activePlayBtn) { activePlayBtn = null; return; }
  activeAudio = new Audio(url);
  activePlayBtn = btn;
  btn.textContent = '⏸';
  activeAudio.play();
  activeAudio.onended = () => { btn.textContent = '▶'; activeAudio = null; activePlayBtn = null; };
  activeAudio.onerror = () => { btn.textContent = '▶'; };
}

// ── Image expand ───────────────────────────────────────
function openImg(url) {
  document.getElementById('img-overlay-img').src = url;
  document.getElementById('img-overlay').style.display = 'flex';
}
function closeImg() { document.getElementById('img-overlay').style.display = 'none'; }

// ── User sheet ─────────────────────────────────────────
function openUserSheet(tgId, name, photo, dist) {
  if (!tgId || tgId === uid) return;
  sheetTgId = tgId; sheetName = name; sheetPhoto = photo; sheetDist = dist;
  const av = document.getElementById('us-avatar');
  if (photo) { av.src = photo; av.style.display = 'block'; }
  else av.style.display = 'none';
  document.getElementById('us-name').textContent = name;
  document.getElementById('us-dist').textContent = dist ? `📍 ${dist} منك` : '';
  document.getElementById('user-sheet').style.display = 'block';
}
function closeUserSheet() { document.getElementById('user-sheet').style.display = 'none'; }
function goPrivateChat() {
  if (!sheetTgId) return;
  location.href = `/private-chat?uid=${uid}&other_uid=${sheetTgId}&lang=${lang}`;
}

// ── Scroll handling ────────────────────────────────────
function scrollToBottom() {
  const w = document.getElementById('msgs-wrap');
  w.scrollTop = w.scrollHeight;
  document.getElementById('scroll-btn').style.display = 'none';
  isAtBottom = true;
}
document.getElementById('msgs-wrap').addEventListener('scroll', function() {
  const thr = 80;
  isAtBottom = this.scrollHeight - this.scrollTop - this.clientHeight < thr;
  if (isAtBottom) document.getElementById('scroll-btn').style.display = 'none';
});

// ═══════════════════════════════════════════════════════
// LOCATION
// ═══════════════════════════════════════════════════════
function updateLocationUI(ok) {
  const dot = document.getElementById('hdr-loc-dot');
  const txt = document.getElementById('hdr-loc-txt');
  if (ok) {
    dot.classList.add('active');
    txt.textContent = `${radius === '100m' ? '100م' : radius === '500m' ? '500م' : radius === '1km' ? '1 كم' : radius === '10km' ? '10 كم' : radius === 'city' ? 'المدينة' : radius === 'country' ? 'البلد' : 'الكل'}`;
  } else {
    dot.classList.remove('active');
    txt.textContent = 'موقع غير معروف';
  }
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    if (!uid) return;
    fetch('/api/update_location', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({uid, lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy})
    });
    updateLocationUI(true);
  }, () => updateLocationUI(false), {enableHighAccuracy: true, timeout: 10000});
} else {
  updateLocationUI(false);
}

// ═══════════════════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════════════════
loadMessages(true);
pollTimer = setInterval(() => loadMessages(false), 3000);
</script>
