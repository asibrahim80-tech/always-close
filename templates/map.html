<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Always Close – Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d1a;overflow:hidden;height:100vh}
    #map{height:100vh;width:100%}

    /* ── Shared UI style ── */
    :root{
      --ui-bg:   rgba(13,13,26,.55);
      --ui-bd:   1.5px solid rgba(255,255,255,.18);
      --ui-blur: blur(6px);
    }

    /* ── Loading overlay ── */
    #overlay{
      position:fixed;inset:0;background:#0d0d1a;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;color:#fff;transition:opacity .4s
    }
    #overlay.gone{opacity:0;pointer-events:none}
    #overlay .ico{font-size:48px;animation:float 2s ease-in-out infinite}
    #overlay .lbl{font-size:15px;opacity:.7}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* ── Live badge ── */
    #live-badge{
      position:fixed;top:12px;left:12px;z-index:1000;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);
      color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;
      border:var(--ui-bd);
      display:flex;align-items:center;gap:7px;user-select:none
    }
    .pulse-dot{
      width:8px;height:8px;border-radius:50%;background:#2ecc71;
      animation:pulse-green 1.5s infinite
    }
    @keyframes pulse-green{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
    #countdown{font-variant-numeric:tabular-nums;min-width:28px}

    /* ══════════════════════════════════════
       BOTTOM BAR — recenter | legend | zoom
    ══════════════════════════════════════ */
    #bottom-bar{
      position:fixed;bottom:16px;left:12px;right:12px;z-index:1000;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }

    /* recenter */
    #recenter{
      flex-shrink:0;width:42px;height:42px;border-radius:50%;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);border:var(--ui-bd);
      color:#fff;font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    #recenter:active{background:rgba(231,76,60,.4)}

    /* legend */
    #legend{
      flex:1;min-width:0;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);border:var(--ui-bd);
      color:#fff;border-radius:24px;padding:8px 8px;
      display:flex;flex-direction:row;gap:0;align-items:center;justify-content:space-evenly;
      font-size:10px;overflow:visible;
    }
    .leg-item{display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:1}
    .leg-dot{
      width:9px;height:9px;border-radius:50%;
      border:1.5px solid rgba(255,255,255,.45);flex-shrink:0;
    }
    .leg-dot.red   {background:#e74c3c}
    .leg-dot.green {background:#2ecc71}
    .leg-dot.blue  {background:#3498db}
    .leg-dot.yellow{background:#f1c40f}

    /* zoom */
    #zoom-ctrl{
      flex-shrink:0;display:flex;flex-direction:row;gap:6px;
    }
    .z-btn{
      width:42px;height:42px;border-radius:50%;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);border:var(--ui-bd);
      color:#fff;font-size:20px;font-weight:300;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    .z-btn:active{background:rgba(231,76,60,.4)}

    /* ══════════════════════════════════════
       DRAG JOYSTICK
    ══════════════════════════════════════ */
    #joystick{
      position:fixed;right:12px;bottom:76px;z-index:1000;
      width:90px;height:90px;
      touch-action:none;
    }
    .jpad{
      width:90px;height:90px;border-radius:50%;
      background:var(--ui-bg);
      backdrop-filter:var(--ui-blur);
      border:var(--ui-bd);
      position:relative;cursor:grab;
    }
    .jpad::after{
      content:'';position:absolute;
      inset:22px;border-radius:50%;
      border:1px solid rgba(255,255,255,.10);
    }
    .jknob{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:34px;height:34px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.70),rgba(255,255,255,.20));
      border:1.5px solid rgba(255,255,255,.45);
      box-shadow:0 2px 8px rgba(0,0,0,.30);
      pointer-events:none;
      will-change:transform;
    }

    /* ── Room pin ── */
    .room-pin{
      background:#7c3aed;border:2px solid #fff;
      border-radius:10px;padding:3px 7px;
      color:#fff;font-size:11px;font-weight:700;
      white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.40);
      cursor:pointer;user-select:none;
      display:flex;align-items:center;gap:4px;
    }
    .room-pin::after{
      content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
      border:4px solid transparent;border-top:5px solid #7c3aed;
    }

    /* ── Pin ring animations ── */
    @keyframes ring-red{
      0%  {box-shadow:0 0 0 0   rgba(231,76,60,.70),0 3px 12px rgba(0,0,0,.35)}
      70% {box-shadow:0 0 0 10px rgba(231,76,60,0), 0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0   rgba(231,76,60,0), 0 3px 12px rgba(0,0,0,.35)}
    }
    @keyframes ring-green{
      0%  {box-shadow:0 0 0 0   rgba(46,204,113,.70),0 3px 12px rgba(0,0,0,.35)}
      70% {box-shadow:0 0 0 10px rgba(46,204,113,0), 0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0   rgba(46,204,113,0), 0 3px 12px rgba(0,0,0,.35)}
    }
    @keyframes ring-yellow{
      0%  {box-shadow:0 0 0 0   rgba(241,196,15,.80),0 3px 12px rgba(0,0,0,.35)}
      70% {box-shadow:0 0 0 12px rgba(241,196,15,0), 0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0   rgba(241,196,15,0), 0 3px 12px rgba(0,0,0,.35)}
    }
    .pme {animation:ring-red    1.8s ease-out infinite}
    .pa  {animation:ring-green  1.8s ease-out infinite}
    .prm {animation:ring-yellow 1.4s ease-out infinite}

    /* ── Leaflet popup card ── */
    .leaflet-popup-content-wrapper{
      border-radius:18px!important;padding:0!important;
      overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.28)!important;
      min-width:230px;
    }
    .leaflet-popup-content{margin:0!important}
    .leaflet-popup-tip-container{display:none}
    .card{background:#fff;border-radius:18px;overflow:hidden;font-size:13px;min-width:230px}
    .card-img{width:100%;height:150px;object-fit:cover;display:block;background:#e5e5e5}
    .card-body{padding:12px 14px 14px}
    .card-name{font-size:15px;font-weight:700;color:#111;margin-bottom:5px}
    .card-row{color:#555;margin-bottom:3px;display:flex;align-items:center;gap:5px;font-size:13px}
    .card-bio{color:#666;font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;font-size:12px}
    .badge-dist{
      display:inline-block;background:linear-gradient(135deg,#e74c3c,#c0392b);
      color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px
    }
    .card-actions{display:flex;gap:8px;margin-top:10px}
    .btn-msg{
      flex:1;background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;
      border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:600;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px
    }
    .last-seen{font-size:11px;color:#999;margin-top:5px}
  </style>
</head>
<body>

<div id="overlay">
  <div class="ico">🗺️</div>
  <div class="lbl" id="overlay-lbl">Loading map…</div>
</div>

<div id="map"></div>

<!-- ── Live badge ── -->
<div id="live-badge">
  <span class="pulse-dot"></span>
  <span id="live-lbl">LIVE</span>
  <span id="countdown"> 5s </span>
</div>

<!-- ── Drag Joystick ── -->
<div id="joystick">
  <div class="jpad" id="jpad">
    <div class="jknob" id="jknob"></div>
  </div>
</div>

<!-- ── Bottom Bar: recenter | legend | zoom ── -->
<div id="bottom-bar">
  <button id="recenter" title="Re-center">📍</button>

  <div id="legend">
    <span class="leg-item">
      <span class="leg-dot red"></span>
      <span id="leg-me">You</span>
    </span>
    <span class="leg-item">
      <span class="leg-dot green"></span>
      <span id="leg-active">Active</span>
    </span>
    <span class="leg-item" id="leg-roam-item">
      <span class="leg-dot yellow"></span>
      <span id="leg-roam">Roaming</span>
    </span>
    <span class="leg-item">
      <span class="leg-dot blue"></span>
      <span id="leg-away">Away</span>
    </span>
  </div>

  <div id="zoom-ctrl">
    <button class="z-btn" id="zoom-out">−</button>
    <button class="z-btn" id="zoom-in">+</button>
  </div>
</div>

<script>
  // ── Params ─────────────────────────────────────────────────────────────
  const uid  = new URLSearchParams(location.search).get('uid');
  const lang = new URLSearchParams(location.search).get('lang') || 'en';

  const L_ = {
    ar:{
      loading:'جارٍ التحميل…', you:'موقعك',
      live:'مباشر', sec:'ث',
      me_leg:'أنت', active_leg:'نشط', roam_leg:'متجول', away_leg:'غير نشط',
      km:'كم', yo:'سنة', msg:'💬 مراسلة',
      active:'🟢 نشط الآن', away:'🔵 غير نشط', roam:'🟡 متجول',
      last:'آخر ظهور:', now:'الآن', min:'د', hr:'س', day:'ي',
      no_photo:'صورة', err:'❌ خطأ في التحميل',
    },
    en:{
      loading:'Loading map…', you:'Your location',
      live:'LIVE', sec:'s',
      me_leg:'You', active_leg:'Active', roam_leg:'Roaming', away_leg:'Away',
      km:'km', yo:'yo', msg:'💬 Message',
      active:'🟢 Active now', away:'🔵 Away', roam:'🟡 Roaming',
      last:'Last seen:', now:'now', min:'m', hr:'h', day:'d',
      no_photo:'photo', err:'❌ Error loading map',
    }
  }[lang] || {};

  // ── Apply static labels ─────────────────────────────────────────────────
  document.getElementById('overlay-lbl').textContent = L_.loading;
  document.getElementById('live-lbl').textContent    = L_.live;
  document.getElementById('leg-me').textContent      = L_.me_leg;
  document.getElementById('leg-active').textContent  = L_.active_leg;
  document.getElementById('leg-roam').textContent    = L_.roam_leg;
  document.getElementById('leg-away').textContent    = L_.away_leg;

  // ── Map (no default zoom control) ──────────────────────────────────────
  const map = L.map('map', { zoomControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap', maxZoom:19
  }).addTo(map);

  document.getElementById('zoom-in').addEventListener('click',  () => map.zoomIn());
  document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

  // ── Position state ──────────────────────────────────────────────────────
  let gpsLatLng  = null;   // real GPS from server
  let myLatLng   = null;   // displayed pin position (moves with joystick)
  let myPhoto    = null;   // me profile photo URL
  let myInitial  = '?';

  const ROAM_THRESH = 0.0001;  // ~11 metres
  function isRoaming() {
    if (!gpsLatLng || !myLatLng) return false;
    return Math.abs(gpsLatLng[0]-myLatLng[0]) > ROAM_THRESH ||
           Math.abs(gpsLatLng[1]-myLatLng[1]) > ROAM_THRESH;
  }

  // ── Recenter ────────────────────────────────────────────────────────────
  document.getElementById('recenter').addEventListener('click', () => {
    if (!gpsLatLng) return;
    myLatLng = [...gpsLatLng];
    if (meMarker) meMarker.setLatLng(myLatLng);
    map.setView(myLatLng, 16, { animate: true });
    refreshMeMarker();
  });

  // ── Helpers ─────────────────────────────────────────────────────────────
  function timeAgo(iso) {
    if (!iso) return '';
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60)    return L_.now;
    if (diff < 3600)  return `${Math.floor(diff/60)}${L_.min}`;
    if (diff < 86400) return `${Math.floor(diff/3600)}${L_.hr}`;
    return `${Math.floor(diff/86400)}${L_.day}`;
  }
  function openChat(username, telegramId) {
    const url = username ? `https://t.me/${username}` : `tg://user?id=${telegramId}`;
    if (window.Telegram?.WebApp?.openTelegramLink) Telegram.WebApp.openTelegramLink(url);
    else window.open(url, '_blank');
  }
  window.openChat = openChat;

  // ══════════════════════════════════════════════════════════════════════
  // PIN FACTORY
  // ══════════════════════════════════════════════════════════════════════
  /*
    Design:
      Outer div  = ring colour (padding acts as border)
      Inner div  = white bg clipped circle (overflow:hidden)
      Content    = <img> or letter fallback
  */
  function makePin(isActive, isMe, photoUrl, initial, roaming) {
    const sz   = isMe ? 34 : 36;
    const pad  = 3;          // ring thickness
    const iSz  = sz - pad*2; // inner content size

    const ring =
      isMe && roaming ? '#f1c40f' :
      isMe            ? '#e74c3c' :
      isActive        ? '#2ecc71' : '#3498db';

    const animClass =
      isMe && roaming ? 'prm' :
      isMe            ? 'pme' :
      isActive        ? 'pa'  : '';

    const fbBg = isMe ? '#e74c3c' : isActive ? '#2ecc71' : '#3498db';
    const fz   = Math.max(10, Math.round(iSz * 0.40));

    let content;
    if (photoUrl) {
      content = `
        <img src="${photoUrl}"
          style="width:${iSz}px;height:${iSz}px;object-fit:cover;display:block;border-radius:50%;flex-shrink:0"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;width:${iSz}px;height:${iSz}px;border-radius:50%;
          background:${fbBg};color:#fff;font-size:${fz}px;font-weight:700;
          align-items:center;justify-content:center;flex-shrink:0">
          ${initial}
        </div>`;
    } else {
      content = `
        <div style="width:${iSz}px;height:${iSz}px;border-radius:50%;
          background:${fbBg};color:#fff;font-size:${fz}px;font-weight:700;
          display:flex;align-items:center;justify-content:center">
          ${initial}
        </div>`;
    }

    const html = `
      <div class="${animClass}" style="
        width:${sz}px;height:${sz}px;border-radius:50%;
        padding:${pad}px;background:${ring};
        display:flex;align-items:center;justify-content:center;
      ">
        <div style="
          width:${iSz}px;height:${iSz}px;border-radius:50%;
          overflow:hidden;background:#ddd;
          display:flex;align-items:center;justify-content:center;
          flex-shrink:0;
        ">
          ${content}
        </div>
      </div>`;

    const half = sz / 2;
    return L.divIcon({
      html, className:'', iconSize:[sz,sz], iconAnchor:[half,half], popupAnchor:[0,-half-8]
    });
  }

  // ── Refresh me marker (after joystick move or recenter) ─────────────────
  function refreshMeMarker() {
    if (!meMarker) return;
    const roam = isRoaming();
    meMarker.setIcon(makePin(true, true, myPhoto, myInitial, roam));
  }

  // ── Popup card ───────────────────────────────────────────────────────────
  function makePopup(u) {
    const ago    = timeAgo(u.last_seen);
    const status = u.is_active ? L_.active : L_.away;
    let html = '<div class="card">';
    if (u.photo_url)
      html += `<img class="card-img" src="${u.photo_url}"
        onerror="this.style.display='none'" alt="${L_.no_photo}">`;
    html += '<div class="card-body">';
    html += `<div class="card-name">👤 ${u.username || 'User'}</div>`;
    const parts = [];
    if (u.age)    parts.push(`🎂 ${u.age} ${L_.yo}`);
    if (u.gender) parts.push(`🚻 ${u.gender}`);
    if (parts.length) html += `<div class="card-row">${parts.join(' &nbsp;•&nbsp; ')}</div>`;
    html += `<div class="card-row">${status}</div>`;
    if (u.distance != null) html += `<span class="badge-dist">📍 ${u.distance} ${L_.km}</span>`;
    if (ago) html += `<div class="last-seen">🕒 ${L_.last} ${ago}</div>`;
    if (u.bio) html += `<div class="card-bio">📝 ${u.bio}</div>`;
    if (u.username || u.telegram_id)
      html += `<div class="card-actions">
        <button class="btn-msg" onclick="openChat('${u.username||''}','${u.telegram_id||''}')">
          ${L_.msg}</button></div>`;
    html += '</div></div>';
    return html;
  }

  // ── State ────────────────────────────────────────────────────────────────
  let meMarker    = null;
  const markerMap = {};
  let refreshTimer = 5;

  // ── Load data ─────────────────────────────────────────────────────────────
  function loadData(firstLoad) {
    fetch(`/api/nearby/${uid}`)
      .then(r => r.json())
      .then(data => {
        if (firstLoad) {
          const ov = document.getElementById('overlay');
          ov.classList.add('gone');
          setTimeout(() => ov.remove(), 500);
        }
        if (data.error) return;

        const me = data.me;
        gpsLatLng = [me.lat, me.lng];
        if (!myLatLng)  myLatLng  = [...gpsLatLng];
        if (!myPhoto)   myPhoto   = me.photo_url || null;
        myInitial = (me.name || '?')[0].toUpperCase();

        const roam = isRoaming();
        const meIcon = makePin(true, true, myPhoto, myInitial, roam);

        if (!meMarker) {
          meMarker = L.marker(myLatLng, { icon: meIcon, zIndexOffset: 1000 })
            .addTo(map)
            .bindPopup(`<div style="padding:10px;font-weight:700;font-size:14px">📍 ${L_.you}</div>`);
          if (firstLoad) map.setView(myLatLng, defaultZoom);
        } else {
          meMarker.setIcon(meIcon);
          // Don't move meMarker back to gpsLatLng — joystick position is kept
        }

        // ── Nearby users ──────────────────────────────────────
        const seenIds = new Set();
        data.nearby.forEach(u => {
          seenIds.add(u.id);
          const initial   = (u.username || '?')[0].toUpperCase();
          const icon      = makePin(u.is_active, false, u.photo_url, initial, false);
          const latlng    = [u.lat, u.lng];
          const popupHtml = makePopup(u);

          if (markerMap[u.id]) {
            markerMap[u.id].m.setLatLng(latlng).setIcon(icon);
            markerMap[u.id].m.getPopup().setContent(popupHtml);
            markerMap[u.id].u = u;
          } else {
            const m = L.marker(latlng, { icon })
              .addTo(map)
              .bindPopup(popupHtml, { maxWidth: 280, minWidth: 230 });
            markerMap[u.id] = { m, u };
          }
        });

        Object.keys(markerMap).forEach(id => {
          if (!seenIds.has(parseInt(id))) {
            map.removeLayer(markerMap[id].m);
            delete markerMap[id];
          }
        });

        refreshTimer = 5;
      })
      .catch(() => {});
  }

  // ── Countdown ─────────────────────────────────────────────────────────────
  function startCountdown() {
    refreshTimer = 5;
    const el = document.getElementById('countdown');
    if (el) el.textContent = `${refreshTimer}${L_.sec}`;
    setInterval(() => {
      refreshTimer--;
      if (el) el.textContent = `${refreshTimer}${L_.sec}`;
      if (refreshTimer <= 0) { refreshTimer = 5; loadData(false); }
    }, 1000);
  }

  // ── Settings from localStorage ──────────────────────────────────────────
  let speedMult   = 3;
  let defaultZoom = 18;
  try {
    const sv = JSON.parse(localStorage.getItem('ac_settings') || '{}');
    if (sv.speed)      speedMult   = sv.speed;
    if (sv.zoom_level) defaultZoom = sv.zoom_level;
  } catch(e) {}

  // ══════════════════════════════════════════════════════════════════════
  // DRAG JOYSTICK
  // ══════════════════════════════════════════════════════════════════════
  const jpad  = document.getElementById('jpad');
  const jknob = document.getElementById('jknob');
  const KNOB_R = 22;

  let joyActive = false;
  let joyCX = 0, joyCY = 0;
  let joyDir = { lat:0, lng:0 };
  let moveInterval = null;

  function joyStep() {
    const z = map.getZoom();
    return 0.00018 * speedMult * Math.pow(2, Math.max(0, 16 - z));
  }

  function startJoyMove() {
    if (moveInterval) return;
    moveInterval = setInterval(() => {
      if (!myLatLng || (joyDir.lat === 0 && joyDir.lng === 0)) return;
      const s = joyStep();
      myLatLng = [myLatLng[0] + joyDir.lat * s, myLatLng[1] + joyDir.lng * s];
      if (meMarker) meMarker.setLatLng(myLatLng);
      map.panTo(myLatLng, { animate: true, duration: 0.1 });
      refreshMeMarker();
    }, 80);
  }

  function stopJoyMove() {
    clearInterval(moveInterval);
    moveInterval = null;
    joyDir = { lat:0, lng:0 };
    jknob.style.transform = 'translate(-50%,-50%)';
  }

  function updateJoy(cx, cy) {
    let dx = cx - joyCX;
    let dy = cy - joyCY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > KNOB_R) { dx = dx/dist*KNOB_R; dy = dy/dist*KNOB_R; }
    jknob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joyDir = { lat: -dy/KNOB_R, lng: dx/KNOB_R };
  }

  jpad.addEventListener('pointerdown', e => {
    e.preventDefault();
    jpad.setPointerCapture(e.pointerId);
    joyActive = true;
    const r = jpad.getBoundingClientRect();
    joyCX = r.left + r.width/2;
    joyCY = r.top  + r.height/2;
    updateJoy(e.clientX, e.clientY);
    startJoyMove();
  });
  jpad.addEventListener('pointermove', e => {
    if (!joyActive) return;
    updateJoy(e.clientX, e.clientY);
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev =>
    jpad.addEventListener(ev, () => { joyActive = false; stopJoyMove(); })
  );

  // ── Room markers ──────────────────────────────────────────────────────
  const roomMarkers = {};

  function makeRoomIcon(name) {
    const el = document.createElement('div');
    el.className = 'room-pin';
    el.style.position = 'relative';
    el.innerHTML = `🏠 ${name}`;
    return L.divIcon({ html: el.outerHTML, className: '', iconAnchor: [0, 28] });
  }

  function loadRooms() {
    if (!uid) return;
    fetch(`/api/rooms/${uid}`)
      .then(r => r.json())
      .then(data => {
        const rooms = data.rooms || [];
        // Remove old markers
        Object.values(roomMarkers).forEach(m => map.removeLayer(m));
        Object.keys(roomMarkers).forEach(k => delete roomMarkers[k]);
        // Add new markers
        rooms.forEach(r => {
          const icon = makeRoomIcon(r.name);
          const m = L.marker([r.lat, r.lng], { icon, zIndexOffset: 500 })
            .addTo(map);
          const dist = r.distance !== null
            ? `${r.distance} ${L_.km}`
            : '';
          const members = r.members || 0;
          m.bindPopup(`
            <div style="padding:10px;min-width:150px">
              <div style="font-weight:700;font-size:14px;margin-bottom:4px">🏠 ${r.name}</div>
              <div style="font-size:12px;opacity:.8;margin-bottom:6px">${r.purpose}</div>
              <div style="font-size:11px;opacity:.6">👥 ${members} &nbsp;${dist ? '📍 ' + dist : ''}</div>
            </div>
          `);
          roomMarkers[r.id] = m;
        });
      })
      .catch(() => {});
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  loadData(true);
  startCountdown();
  loadRooms();
  setInterval(loadRooms, 30000);
</script>
</body>
</html>
