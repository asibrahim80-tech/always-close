<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Always Close – Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d1a;overflow:hidden;height:100vh}
    #map{height:100vh;width:100%}

    /* ── Shared UI style ── */
    :root{
      --ui-bg:   rgba(13,13,26,.55);
      --ui-bd:   1.5px solid rgba(255,255,255,.18);
      --ui-blur: blur(6px);
    }

    /* ── Loading overlay ── */
    #overlay{
      position:fixed;inset:0;background:#0d0d1a;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;color:#fff;transition:opacity .4s
    }
    #overlay.gone{opacity:0;pointer-events:none}
    #overlay .ico{font-size:48px;animation:float 2s ease-in-out infinite}
    #overlay .lbl{font-size:15px;opacity:.7}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* ── Live badge ── */
    #live-badge{
      position:fixed;top:12px;left:12px;z-index:1000;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);
      color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;
      border:var(--ui-bd);
      display:flex;align-items:center;gap:7px;user-select:none
    }

    /* ── GPS accuracy badge ── */
    #gps-badge{
      position:fixed;top:12px;right:12px;z-index:1000;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);
      color:#fff;border-radius:20px;padding:6px 12px;font-size:11px;
      border:var(--ui-bd);display:flex;align-items:center;gap:6px;
      transition:opacity .4s;
    }
    #gps-dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0}
    #gps-dot.good{background:#2ecc71}
    #gps-dot.fair{background:#f1c40f}
    #gps-dot.bad {background:#e74c3c}
    .pulse-dot{
      width:8px;height:8px;border-radius:50%;background:#2ecc71;
      animation:pulse-green 1.5s infinite
    }
    @keyframes pulse-green{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
    #countdown{font-variant-numeric:tabular-nums;min-width:28px}

    /* ══════════════════════════════════════
       BOTTOM BAR — recenter | legend | zoom
    ══════════════════════════════════════ */
    #bottom-bar{
      position:fixed;bottom:16px;left:12px;right:12px;z-index:1000;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }

    /* recenter */
    #recenter{
      flex-shrink:0;width:42px;height:42px;border-radius:50%;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);border:var(--ui-bd);
      color:#fff;font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    #recenter:active{background:rgba(231,76,60,.4)}

    /* legend */
    #legend{
      flex:1;min-width:0;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);border:var(--ui-bd);
      color:#fff;border-radius:24px;padding:8px 8px;
      display:flex;flex-direction:row;gap:0;align-items:center;justify-content:space-evenly;
      font-size:10px;overflow:visible;
    }
    .leg-item{display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:1}
    .leg-dot{
      width:9px;height:9px;border-radius:50%;
      border:1.5px solid rgba(255,255,255,.45);flex-shrink:0;
    }
    .leg-dot.red   {background:#e74c3c}
    .leg-dot.green {background:#2ecc71}
    .leg-dot.blue  {background:#3498db}
    .leg-dot.yellow{background:#f1c40f}

    /* zoom */
    #zoom-ctrl{
      flex-shrink:0;display:flex;flex-direction:row;gap:6px;
    }
    .z-btn{
      width:42px;height:42px;border-radius:50%;
      background:var(--ui-bg);backdrop-filter:var(--ui-blur);border:var(--ui-bd);
      color:#fff;font-size:20px;font-weight:300;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    .z-btn:active{background:rgba(231,76,60,.4)}

    /* ══════════════════════════════════════
       DRAG JOYSTICK
    ══════════════════════════════════════ */
    #joystick{
      position:fixed;right:12px;bottom:76px;z-index:1000;
      width:90px;height:90px;
      touch-action:none;
    }
    .jpad{
      width:90px;height:90px;border-radius:50%;
      background:var(--ui-bg);
      backdrop-filter:var(--ui-blur);
      border:var(--ui-bd);
      position:relative;cursor:grab;
    }
    .jpad::after{
      content:'';position:absolute;
      inset:22px;border-radius:50%;
      border:1px solid rgba(255,255,255,.10);
    }
    .jknob{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:34px;height:34px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.70),rgba(255,255,255,.20));
      border:1.5px solid rgba(255,255,255,.45);
      box-shadow:0 2px 8px rgba(0,0,0,.30);
      pointer-events:none;
      will-change:transform;
    }

    /* ── Room pin ── */
    .room-pin{
      background:linear-gradient(135deg,#7c3aed,#5b21b6);
      border:3px solid #fff;
      border-radius:16px;padding:8px 16px;
      color:#fff;font-size:15px;font-weight:800;
      white-space:nowrap;
      box-shadow:0 4px 18px rgba(124,58,237,.6),0 2px 5px rgba(0,0,0,.3);
      cursor:pointer;user-select:none;
      display:flex;align-items:center;gap:6px;
      letter-spacing:.2px;
    }
    .room-pin::after{
      content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
      border:6px solid transparent;border-top:7px solid #7c3aed;
    }
    .store-pin{
      background:linear-gradient(135deg,#e67e22,#c0392b);
      border:3px solid #fff;
      border-radius:16px;padding:8px 16px;
      color:#fff;font-size:15px;font-weight:800;
      white-space:nowrap;
      box-shadow:0 4px 18px rgba(230,126,34,.6),0 2px 5px rgba(0,0,0,.3);
      cursor:pointer;user-select:none;
      display:flex;align-items:center;gap:6px;
      position:relative;letter-spacing:.2px;
    }
    .store-pin::after{
      content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
      border:6px solid transparent;border-top:7px solid #e67e22;
    }

    /* ── Entity edit overlay ── */
    #entity-edit-overlay{
      position:fixed;inset:0;z-index:3100;display:none;
      background:rgba(0,0,0,.52);
    }
    #entity-edit-box{
      position:absolute;bottom:0;left:0;right:0;
      background:#fff;border-radius:22px 22px 0 0;
      padding:20px 16px 34px;
    }
    #entity-edit-box.open{animation:mc-in .28s ease}
    #entity-edit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    #entity-edit-title{font-size:16px;font-weight:800;color:#111}
    #entity-edit-close-btn{font-size:22px;color:#aaa;cursor:pointer;padding:4px;line-height:1}
    .ee-label{font-size:12px;font-weight:700;color:#555;margin-bottom:4px;display:block}
    .ee-input{
      width:100%;box-sizing:border-box;
      padding:11px 13px;border:1.5px solid #ddd;
      border-radius:12px;font-size:14px;margin-bottom:12px;
      outline:none;font-family:inherit;transition:border-color .15s;
    }
    .ee-input:focus{border-color:#7c3aed}
    .ee-textarea{resize:none;height:72px;line-height:1.5}
    #entity-edit-save{
      width:100%;padding:13px;
      background:linear-gradient(135deg,#7c3aed,#5b21b6);
      color:#fff;border:none;border-radius:14px;
      font-size:15px;font-weight:700;cursor:pointer;
      transition:opacity .15s;
    }
    #entity-edit-save:disabled{opacity:.5}
    .ee-char-count{font-size:11px;color:#aaa;text-align:left;margin-top:-10px;margin-bottom:10px}

    /* ── Icon picker overlay ── */
    #icon-picker-overlay{
      position:fixed;inset:0;z-index:3000;display:none;
      background:rgba(0,0,0,.5);
    }
    #icon-picker-box{
      position:absolute;bottom:0;left:0;right:0;
      background:#fff;border-radius:22px 22px 0 0;
      padding:18px 14px 30px;
    }
    #icon-picker-box.open{animation:mc-in .28s ease}
    #icon-picker-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    #icon-picker-title{font-size:15px;font-weight:700;color:#111}
    #icon-picker-close-btn{font-size:22px;color:#aaa;cursor:pointer;padding:4px;line-height:1}
    #icon-picker-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));
      gap:6px;max-height:48vh;overflow-y:auto;
    }
    .icon-pick-btn{
      font-size:26px;width:44px;height:44px;
      border:2px solid transparent;border-radius:10px;background:#f7f7f7;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:border-color .15s,background .15s;
    }
    .icon-pick-btn:hover{background:#ede9fe;border-color:#7c3aed}
    .icon-pick-btn.selected{background:#ddd2fd;border-color:#7c3aed}
    #icon-save-btn{
      margin-top:14px;width:100%;padding:12px;
      background:linear-gradient(135deg,#7c3aed,#5b21b6);
      color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;
    }

    /* ── Map catalog overlay ── */
    #map-cat-overlay{
      position:fixed;inset:0;z-index:2000;display:none;
      background:rgba(0,0,0,.55);
    }
    #map-cat-panel{
      position:absolute;bottom:0;left:0;right:0;
      background:#fff;border-radius:22px 22px 0 0;
      max-height:88vh;display:flex;flex-direction:column;
    }
    #map-cat-panel.open{animation:mc-in .32s ease}
    @keyframes mc-in{from{transform:translateY(100%)}to{transform:translateY(0)}}
    #map-cat-hdr{padding:14px 16px 0;border-bottom:1px solid #f0f0f0;flex-shrink:0;border-radius:22px 22px 0 0;background:#fff}
    #map-cat-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    #map-cat-title{font-size:16px;font-weight:700;color:#111}
    #map-cat-close{font-size:22px;color:#999;cursor:pointer;padding:4px;line-height:1}
    #map-cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
    #map-cat-tabs::-webkit-scrollbar{display:none}
    .mct-tab{flex-shrink:0;padding:6px 14px;border-radius:18px;border:1.5px solid #ddd;background:#f7f7f7;font-size:12px;font-weight:600;cursor:pointer;color:#555;white-space:nowrap;transition:all .15s}
    .mct-tab.active{background:#555;border-color:#555;color:#fff}
    #map-cat-body{overflow-y:auto;padding:10px 14px 30px;flex:1}
    .mct-item{background:#fff;border-radius:14px;border:1px solid #eee;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:10px;overflow:hidden}
    .mct-item-img{width:100%;height:120px;object-fit:cover;display:block;background:#f5f5f5}
    .mct-item-body{padding:10px 12px}
    .mct-item-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
    .mct-item-title{font-size:14px;font-weight:700;color:#111;flex:1}
    .mct-item-price{font-size:13px;font-weight:700;color:#e67e22;white-space:nowrap}
    .mct-item-desc{font-size:12px;color:#666;line-height:1.5;margin-bottom:5px}
    .mct-item-extra{font-size:12px;color:#555;margin-bottom:3px}
    .mct-empty{text-align:center;padding:30px;color:#bbb;font-size:14px}
    .mct-spinner{width:24px;height:24px;border:3px solid #eee;border-top-color:#555;border-radius:50%;animation:mc-spin .7s linear infinite;margin:20px auto}
    @keyframes mc-spin{to{transform:rotate(360deg)}}

    /* ── Pin ring animations ── */
    @keyframes ring-red{
      0%  {box-shadow:0 0 0 0   rgba(231,76,60,.70),0 3px 12px rgba(0,0,0,.35)}
      70% {box-shadow:0 0 0 10px rgba(231,76,60,0), 0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0   rgba(231,76,60,0), 0 3px 12px rgba(0,0,0,.35)}
    }
    @keyframes ring-green{
      0%  {box-shadow:0 0 0 0   rgba(46,204,113,.70),0 3px 12px rgba(0,0,0,.35)}
      70% {box-shadow:0 0 0 10px rgba(46,204,113,0), 0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0   rgba(46,204,113,0), 0 3px 12px rgba(0,0,0,.35)}
    }
    @keyframes ring-yellow{
      0%  {box-shadow:0 0 0 0   rgba(241,196,15,.80),0 3px 12px rgba(0,0,0,.35)}
      70% {box-shadow:0 0 0 12px rgba(241,196,15,0), 0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0   rgba(241,196,15,0), 0 3px 12px rgba(0,0,0,.35)}
    }
    .pme {animation:ring-red    1.8s ease-out infinite}
    .pa  {animation:ring-green  1.8s ease-out infinite}
    .prm {animation:ring-yellow 1.4s ease-out infinite}

    /* ── Leaflet popup card ── */
    .leaflet-popup-content-wrapper{
      border-radius:18px!important;padding:0!important;
      overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.28)!important;
      min-width:230px;
    }
    .leaflet-popup-content{margin:0!important}
    .leaflet-popup-tip-container{display:none}
    .card{background:#fff;border-radius:18px;overflow:hidden;font-size:13px;min-width:230px}
    .card-img{width:100%;height:150px;object-fit:cover;display:block;background:#e5e5e5}
    .card-body{padding:12px 14px 14px}
    .card-name{font-size:15px;font-weight:700;color:#111;margin-bottom:5px}
    .card-row{color:#555;margin-bottom:3px;display:flex;align-items:center;gap:5px;font-size:13px}
    .card-bio{color:#666;font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;font-size:12px}
    .badge-dist{
      display:inline-block;background:linear-gradient(135deg,#e74c3c,#c0392b);
      color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px
    }
    .card-actions{display:flex;gap:8px;margin-top:10px}
    .btn-msg{
      flex:1;background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;
      border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:600;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px
    }
    .last-seen{font-size:11px;color:#999;margin-top:5px}

    /* ══════════════════════════════════════
       PROXIMITY BUBBLE NOTIFICATIONS
    ══════════════════════════════════════ */
    #bubble-container{
      position:fixed;bottom:82px;left:10px;right:10px;
      z-index:1100;display:flex;flex-direction:column;
      gap:8px;pointer-events:none;
    }
    .map-bubble{
      background:rgba(10,10,22,.88);
      backdrop-filter:blur(10px);
      border-left:4px solid #3498db;
      border-radius:14px;padding:10px 12px 10px 14px;
      color:#fff;display:flex;align-items:center;
      gap:10px;font-size:13px;line-height:1.45;
      animation:bub-in .38s cubic-bezier(.17,.67,.35,1.2);
      transition:opacity .4s,transform .4s;
      pointer-events:all;max-width:100%;
      box-shadow:0 4px 20px rgba(0,0,0,.45);
    }
    @keyframes bub-in{
      from{transform:translateY(18px) scale(.95);opacity:0}
      to  {transform:translateY(0)   scale(1);  opacity:1}
    }
    .bub-icon{font-size:20px;flex-shrink:0;line-height:1}
    .bub-msg {flex:1;min-width:0}
    .bub-title{font-weight:700;font-size:13px;margin-bottom:2px}
    .bub-sub  {font-size:11px;opacity:.75}
    .bub-close{
      background:none;border:none;color:rgba(255,255,255,.45);
      cursor:pointer;font-size:14px;flex-shrink:0;
      padding:2px 4px;line-height:1;
    }
    .bub-close:hover{color:#fff}
    .map-bubble.bub-out{opacity:0;transform:translateX(-10px)}
  </style>
</head>
<body>

<div id="overlay">
  <div class="ico">🗺️</div>
  <div class="lbl" id="overlay-lbl">Loading map…</div>
</div>

<div id="map"></div>

<!-- ── Live badge ── -->
<div id="live-badge">
  <span class="pulse-dot"></span>
  <span id="live-lbl">LIVE</span>
  <span id="countdown"> 5s </span>
</div>

<!-- ── GPS accuracy badge ── -->
<div id="gps-badge">
  <span id="gps-dot"></span>
  <span id="gps-lbl">GPS…</span>
</div>

<!-- ── Proximity bubble notifications ── -->
<div id="bubble-container"></div>

<!-- ── Entity edit overlay ── -->
<div id="entity-edit-overlay">
  <div id="entity-edit-box">
    <div id="entity-edit-hdr">
      <span id="entity-edit-title">✏️</span>
      <span id="entity-edit-close-btn">✕</span>
    </div>
    <label class="ee-label" id="ee-name-label"></label>
    <input  class="ee-input" id="ee-name"    type="text"    maxlength="60">
    <div class="ee-char-count" id="ee-name-count">0/60</div>
    <label class="ee-label" id="ee-purpose-label"></label>
    <input  class="ee-input" id="ee-purpose" type="text"    maxlength="120">
    <label class="ee-label" id="ee-nature-label"></label>
    <input  class="ee-input" id="ee-nature"  type="text"    maxlength="60"
            placeholder="">
    <button id="entity-edit-save"></button>
  </div>
</div>

<!-- ── Icon picker overlay ── -->
<div id="icon-picker-overlay">
  <div id="icon-picker-box">
    <div id="icon-picker-hdr">
      <span id="icon-picker-title">🎨</span>
      <span id="icon-picker-close-btn">✕</span>
    </div>
    <div id="icon-picker-grid"></div>
    <button id="icon-save-btn"></button>
  </div>
</div>

<!-- ── Map catalog overlay ── -->
<div id="map-cat-overlay">
  <div id="map-cat-panel">
    <div id="map-cat-hdr">
      <div id="map-cat-title-row">
        <span id="map-cat-title">📋</span>
        <span id="map-cat-close">✕</span>
      </div>
      <div id="map-cat-tabs"></div>
    </div>
    <div id="map-cat-body"></div>
  </div>
</div>

<!-- ── Drag Joystick ── -->
<div id="joystick">
  <div class="jpad" id="jpad">
    <div class="jknob" id="jknob"></div>
  </div>
</div>

<!-- ── Bottom Bar: recenter | legend | zoom ── -->
<div id="bottom-bar">
  <button id="recenter" title="Re-center">📍</button>

  <div id="legend">
    <span class="leg-item">
      <span class="leg-dot red"></span>
      <span id="leg-me">You</span>
    </span>
    <span class="leg-item">
      <span class="leg-dot green"></span>
      <span id="leg-active">Active</span>
    </span>
    <span class="leg-item" id="leg-roam-item">
      <span class="leg-dot yellow"></span>
      <span id="leg-roam">Roaming</span>
    </span>
    <span class="leg-item">
      <span class="leg-dot blue"></span>
      <span id="leg-away">Away</span>
    </span>
  </div>

  <div id="zoom-ctrl">
    <button class="z-btn" id="zoom-out">−</button>
    <button class="z-btn" id="zoom-in">+</button>
  </div>
</div>

<script>
  // ── Params ─────────────────────────────────────────────────────────────
  const uid  = new URLSearchParams(location.search).get('uid');
  const lang = new URLSearchParams(location.search).get('lang') || 'en';

  const L_ = {
    ar:{
      loading:'جارٍ التحميل…', you:'موقعك',
      live:'مباشر', sec:'ث',
      me_leg:'أنت', active_leg:'نشط', roam_leg:'متجول', away_leg:'غير نشط',
      km:'كم', yo:'سنة', msg:'💬 مراسلة',
      active:'🟢 نشط الآن', away:'🔵 غير نشط', roam:'🟡 متجول',
      last:'آخر ظهور:', now:'الآن', min:'د', hr:'س', day:'ي',
      no_photo:'صورة', err:'❌ خطأ في التحميل',
    },
    en:{
      loading:'Loading map…', you:'Your location',
      live:'LIVE', sec:'s',
      me_leg:'You', active_leg:'Active', roam_leg:'Roaming', away_leg:'Away',
      km:'km', yo:'yo', msg:'💬 Message',
      active:'🟢 Active now', away:'🔵 Away', roam:'🟡 Roaming',
      last:'Last seen:', now:'now', min:'m', hr:'h', day:'d',
      no_photo:'photo', err:'❌ Error loading map',
    }
  }[lang] || {};

  // ── Apply static labels ─────────────────────────────────────────────────
  document.getElementById('overlay-lbl').textContent = L_.loading;
  document.getElementById('live-lbl').textContent    = L_.live;
  document.getElementById('leg-me').textContent      = L_.me_leg;
  document.getElementById('leg-active').textContent  = L_.active_leg;
  document.getElementById('leg-roam').textContent    = L_.roam_leg;
  document.getElementById('leg-away').textContent    = L_.away_leg;

  // ── Map (no default zoom control) ──────────────────────────────────────
  const map = L.map('map', { zoomControl: false, maxZoom: 22 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap', maxZoom:22, maxNativeZoom:19
  }).addTo(map);

  document.getElementById('zoom-in').addEventListener('click',  () => map.zoomIn());
  document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

  // ── Position state ──────────────────────────────────────────────────────
  let gpsLatLng       = null;   // latest live GPS (from watchPosition only)
  let myLatLng        = null;   // displayed pin position (moves with joystick)
  let myPhoto         = null;   // me profile photo URL
  let myInitial       = '?';
  let joystickRoaming = false;  // true only while user is moving via joystick

  function isRoaming() { return joystickRoaming; }

  // ── Recenter ────────────────────────────────────────────────────────────
  document.getElementById('recenter').addEventListener('click', () => {
    if (!gpsLatLng) return;
    joystickRoaming = false;           // reset roaming flag
    myLatLng = [...gpsLatLng];
    if (meMarker) meMarker.setLatLng(myLatLng);
    map.setView(myLatLng, 16, { animate: true });
    refreshMeMarker();
  });

  // ── Helpers ─────────────────────────────────────────────────────────────
  function timeAgo(iso) {
    if (!iso) return '';
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60)    return L_.now;
    if (diff < 3600)  return `${Math.floor(diff/60)}${L_.min}`;
    if (diff < 86400) return `${Math.floor(diff/3600)}${L_.hr}`;
    return `${Math.floor(diff/86400)}${L_.day}`;
  }
  function openChat(username, telegramId) {
    const url = username ? `https://t.me/${username}` : `tg://user?id=${telegramId}`;
    if (window.Telegram?.WebApp?.openTelegramLink) Telegram.WebApp.openTelegramLink(url);
    else window.open(url, '_blank');
  }
  window.openChat = openChat;

  // ══════════════════════════════════════════════════════════════════════
  // PIN FACTORY
  // ══════════════════════════════════════════════════════════════════════
  /*
    Design:
      Outer div  = ring colour (padding acts as border)
      Inner div  = white bg clipped circle (overflow:hidden)
      Content    = <img> or letter fallback
  */
  function makePin(isActive, isMe, photoUrl, initial, roaming) {
    const sz   = isMe ? 34 : 36;
    const pad  = 3;          // ring thickness
    const iSz  = sz - pad*2; // inner content size

    const ring =
      isMe && roaming ? '#f1c40f' :
      isMe            ? '#e74c3c' :
      isActive        ? '#2ecc71' : '#3498db';

    const animClass =
      isMe && roaming ? 'prm' :
      isMe            ? 'pme' :
      isActive        ? 'pa'  : '';

    const fbBg = isMe ? '#e74c3c' : isActive ? '#2ecc71' : '#3498db';
    const fz   = Math.max(10, Math.round(iSz * 0.40));

    let content;
    if (photoUrl) {
      content = `
        <img src="${photoUrl}"
          style="width:${iSz}px;height:${iSz}px;object-fit:cover;display:block;border-radius:50%;flex-shrink:0"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;width:${iSz}px;height:${iSz}px;border-radius:50%;
          background:${fbBg};color:#fff;font-size:${fz}px;font-weight:700;
          align-items:center;justify-content:center;flex-shrink:0">
          ${initial}
        </div>`;
    } else {
      content = `
        <div style="width:${iSz}px;height:${iSz}px;border-radius:50%;
          background:${fbBg};color:#fff;font-size:${fz}px;font-weight:700;
          display:flex;align-items:center;justify-content:center">
          ${initial}
        </div>`;
    }

    const html = `
      <div class="${animClass}" style="
        width:${sz}px;height:${sz}px;border-radius:50%;
        padding:${pad}px;background:${ring};
        display:flex;align-items:center;justify-content:center;
      ">
        <div style="
          width:${iSz}px;height:${iSz}px;border-radius:50%;
          overflow:hidden;background:#ddd;
          display:flex;align-items:center;justify-content:center;
          flex-shrink:0;
        ">
          ${content}
        </div>
      </div>`;

    const half = sz / 2;
    return L.divIcon({
      html, className:'', iconSize:[sz,sz], iconAnchor:[half,half], popupAnchor:[0,-half-8]
    });
  }

  // ── Refresh me marker (after joystick move or recenter) ─────────────────
  function refreshMeMarker() {
    if (!meMarker) return;
    const roam = isRoaming();
    meMarker.setIcon(makePin(true, true, myPhoto, myInitial, roam));
  }

  // ── Popup card ───────────────────────────────────────────────────────────
  function makePopup(u) {
    const ago    = timeAgo(u.last_seen);
    const status = u.is_active ? L_.active : L_.away;
    let html = '<div class="card">';
    if (u.photo_url)
      html += `<img class="card-img" src="${u.photo_url}"
        onerror="this.style.display='none'" alt="${L_.no_photo}">`;
    html += '<div class="card-body">';
    html += `<div class="card-name">👤 ${u.username || 'User'}</div>`;
    const parts = [];
    if (u.age)    parts.push(`🎂 ${u.age} ${L_.yo}`);
    if (u.gender) parts.push(`🚻 ${u.gender}`);
    if (parts.length) html += `<div class="card-row">${parts.join(' &nbsp;•&nbsp; ')}</div>`;
    html += `<div class="card-row">${status}</div>`;
    if (u.distance != null) html += `<span class="badge-dist">📍 ${u.distance} ${L_.km}</span>`;
    if (ago) html += `<div class="last-seen">🕒 ${L_.last} ${ago}</div>`;
    if (u.bio) html += `<div class="card-bio">📝 ${u.bio}</div>`;
    if (u.username || u.telegram_id)
      html += `<div class="card-actions">
        <button class="btn-msg" onclick="openChat('${u.username||''}','${u.telegram_id||''}')">
          ${L_.msg}</button></div>`;
    html += '</div></div>';
    return html;
  }

  // ── State ────────────────────────────────────────────────────────────────
  let meMarker    = null;
  const markerMap = {};
  let refreshTimer = 5;

  // ── Load data ─────────────────────────────────────────────────────────────
  function loadData(firstLoad) {
    fetch(`/api/nearby/${uid}`)
      .then(r => r.json())
      .then(data => {
        if (firstLoad) {
          const ov = document.getElementById('overlay');
          ov.classList.add('gone');
          setTimeout(() => ov.remove(), 500);
        }
        if (data.error) return;

        const me = data.me;
        // Only use server position as fallback on very first load (before live GPS arrives)
        const serverPos = [me.lat, me.lng];
        if (!gpsLatLng) gpsLatLng = serverPos;   // first-time fallback only
        if (!myLatLng)  myLatLng  = [...gpsLatLng];
        if (!myPhoto)   myPhoto   = me.photo_url || null;
        myInitial = (me.name || '?')[0].toUpperCase();

        const roam = isRoaming();
        const meIcon = makePin(true, true, myPhoto, myInitial, roam);

        if (!meMarker) {
          meMarker = L.marker(myLatLng, { icon: meIcon, zIndexOffset: 1000 })
            .addTo(map)
            .bindPopup(`<div style="padding:10px;font-weight:700;font-size:14px">📍 ${L_.you}</div>`);
          if (firstLoad) map.setView(myLatLng, defaultZoom);
        } else {
          meMarker.setIcon(meIcon);
          // Don't move meMarker back to gpsLatLng — joystick position is kept
        }

        // ── Nearby users ──────────────────────────────────────
        const seenIds = new Set();
        data.nearby.forEach(u => {
          seenIds.add(u.id);
          const initial   = (u.username || '?')[0].toUpperCase();
          const icon      = makePin(u.is_active, false, u.photo_url, initial, false);
          const latlng    = [u.lat, u.lng];
          const popupHtml = makePopup(u);

          if (markerMap[u.id]) {
            markerMap[u.id].m.setLatLng(latlng).setIcon(icon);
            markerMap[u.id].m.getPopup().setContent(popupHtml);
            markerMap[u.id].u = u;
          } else {
            const m = L.marker(latlng, { icon })
              .addTo(map)
              .bindPopup(popupHtml, { maxWidth: 280, minWidth: 230 });
            markerMap[u.id] = { m, u };
          }
        });

        Object.keys(markerMap).forEach(id => {
          if (!seenIds.has(parseInt(id))) {
            map.removeLayer(markerMap[id].m);
            delete markerMap[id];
          }
        });

        // ── Feed proximity engine ──────────────────────────
        _prox_users = data.nearby || [];
        if (!firstLoad) runProximityChecks();

        refreshTimer = 5;
      })
      .catch(() => {});
  }

  // ── Countdown ─────────────────────────────────────────────────────────────
  function startCountdown() {
    refreshTimer = 5;
    const el = document.getElementById('countdown');
    if (el) el.textContent = `${refreshTimer}${L_.sec}`;
    setInterval(() => {
      refreshTimer--;
      if (el) el.textContent = `${refreshTimer}${L_.sec}`;
      if (refreshTimer <= 0) { refreshTimer = 5; loadData(false); }
    }, 1000);
  }

  // ── Settings from localStorage ──────────────────────────────────────────
  let speedMult   = 3;
  let defaultZoom = 18;
  try {
    const sv = JSON.parse(localStorage.getItem('ac_settings') || '{}');
    if (sv.speed)      speedMult   = sv.speed;
    if (sv.zoom_level) defaultZoom = sv.zoom_level;
  } catch(e) {}

  // ══════════════════════════════════════════════════════════════════════
  // DRAG JOYSTICK
  // ══════════════════════════════════════════════════════════════════════
  const jpad  = document.getElementById('jpad');
  const jknob = document.getElementById('jknob');
  const KNOB_R = 22;

  let joyActive = false;
  let joyCX = 0, joyCY = 0;
  let joyDir = { lat:0, lng:0 };
  let moveInterval = null;

  function joyStep() {
    const z = map.getZoom();
    return 0.0000008 * speedMult * Math.pow(2, Math.max(0, 16 - z));
  }

  function startJoyMove() {
    if (moveInterval) return;
    moveInterval = setInterval(() => {
      if (!myLatLng || (joyDir.lat === 0 && joyDir.lng === 0)) return;
      const s = joyStep();
      myLatLng = [myLatLng[0] + joyDir.lat * s, myLatLng[1] + joyDir.lng * s];
      if (meMarker) meMarker.setLatLng(myLatLng);
      map.panTo(myLatLng, { animate: true, duration: 0.1 });
      refreshMeMarker();
    }, 80);
  }

  function stopJoyMove() {
    clearInterval(moveInterval);
    moveInterval = null;
    joyDir = { lat:0, lng:0 };
    jknob.style.transform = 'translate(-50%,-50%)';
  }

  function updateJoy(cx, cy) {
    let dx = cx - joyCX;
    let dy = cy - joyCY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > KNOB_R) { dx = dx/dist*KNOB_R; dy = dy/dist*KNOB_R; }
    jknob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joyDir = { lat: -dy/KNOB_R, lng: dx/KNOB_R };
  }

  jpad.addEventListener('pointerdown', e => {
    e.preventDefault();
    jpad.setPointerCapture(e.pointerId);
    joyActive = true;
    joystickRoaming = true;   // user is intentionally moving away from GPS
    const r = jpad.getBoundingClientRect();
    joyCX = r.left + r.width/2;
    joyCY = r.top  + r.height/2;
    updateJoy(e.clientX, e.clientY);
    startJoyMove();
  });
  jpad.addEventListener('pointermove', e => {
    if (!joyActive) return;
    updateJoy(e.clientX, e.clientY);
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev =>
    jpad.addEventListener(ev, () => { joyActive = false; stopJoyMove(); })
  );

  // ── Room markers ──────────────────────────────────────────────────────
  const roomMarkers = {};

  function makeRoomIcon(name, icon) {
    const el = document.createElement('div');
    el.className = 'room-pin';
    el.style.position = 'relative';
    el.innerHTML = `${icon||'🏠'} ${name}`;
    return L.divIcon({ html: el.outerHTML, className: '', iconAnchor: [0, 32] });
  }

  function loadRooms() {
    if (!uid) return;
    fetch(`/api/rooms/${uid}`)
      .then(r => r.json())
      .then(data => {
        const rooms = data.rooms || [];
        // Remove old markers
        Object.values(roomMarkers).forEach(m => map.removeLayer(m));
        Object.keys(roomMarkers).forEach(k => delete roomMarkers[k]);
        // Add new markers
        // ── Feed proximity engine ──────────────────────────
        _prox_rooms = rooms;
        runProximityChecks();

        rooms.forEach(r => {
          const icon = makeRoomIcon(r.name, r.icon);
          const m = L.marker([r.lat, r.lng], { icon, zIndexOffset: 500 })
            .addTo(map);
          const dist = r.distance !== null
            ? `${r.distance} ${L_.km}`
            : '';
          const members = r.members || 0;
          const natureBadge = r.nature
            ? `<span style="display:inline-block;background:#e8f8f0;color:#1e8449;border-radius:8px;padding:2px 8px;font-size:11px;margin-bottom:4px">${r.nature}</span>`
            : '';
          const purposeRow = r.purpose
            ? `<div style="font-size:12px;opacity:.8;margin-bottom:4px">📝 ${r.purpose}</div>`
            : '';
          let expiresRow = '';
          if (r.expires_at) {
            const exp = new Date(r.expires_at);
            const daysLeft = Math.ceil((exp - Date.now()) / 86400000);
            if (daysLeft > 0) expiresRow = `<div style="font-size:11px;color:#e67e22;margin-bottom:4px">⏳ ${daysLeft}d left</div>`;
            else expiresRow = `<div style="font-size:11px;color:#e74c3c;margin-bottom:4px">⚠️ Expired</div>`;
          }
          m.bindPopup(`
            <div style="padding:10px;min-width:175px">
              <div style="font-weight:700;font-size:15px;margin-bottom:5px">${r.icon||'🏠'} ${r.name}</div>
              ${natureBadge}
              ${purposeRow}
              ${expiresRow}
              <div style="font-size:11px;opacity:.6;margin-bottom:8px">👥 ${members} &nbsp;${dist ? '📍 ' + dist : ''}</div>
              <div style="display:flex;gap:6px">
                <button onclick="openMapCatalog('room',${r.id},'${r.name.replace(/'/g,"\\'")}',${JSON.stringify(lang==='ar'?{service:'🛎️ خدمات',event:'🎉 فعاليات',meeting:'📅 اجتماعات',offer:'🎁 عروض',info:'ℹ️ معلومات',contact:'📞 تواصل',hours:'🕐 مواعيد'}:{service:'🛎️ Services',event:'🎉 Events',meeting:'📅 Meetings',offer:'🎁 Offers',info:'ℹ️ Info',contact:'📞 Contact',hours:'🕐 Hours'})});" style="flex:1;padding:8px 4px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer">📋 ${lang==='ar'?'الكتالوج':'Catalog'}</button>
                ${r.is_creator ? `<button onclick="openIconPicker('room',${r.id},'${(r.icon||'🏠')}')" style="padding:8px 9px;background:#f3f0ff;border:1.5px solid #c4b5fd;border-radius:10px;font-size:15px;cursor:pointer" title="${lang==='ar'?'تغيير الأيقونة':'Change Icon'}">🎨</button>` : ''}
                ${r.is_creator ? `<button onclick="openEntityEdit('room',${r.id},'${r.name.replace(/'/g,"\\'")}','${(r.purpose||'').replace(/'/g,"\\'")}','${(r.nature||'').replace(/'/g,"\\'")}');" style="padding:8px 9px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;font-size:15px;cursor:pointer" title="${lang==='ar'?'تعديل':'Edit'}">✏️</button>` : ''}
              </div>
            </div>
          `);
          roomMarkers[r.id] = m;
        });
      })
      .catch(() => {});
  }

  // ── Store markers ─────────────────────────────────────────────────────
  const storeMarkers = {};

  function makeStoreIcon(name, icon) {
    const el = document.createElement('div');
    el.className = 'store-pin';
    el.innerHTML = `${icon||'🏪'} ${name}`;
    return L.divIcon({ html: el.outerHTML, className: '', iconAnchor: [0, 32] });
  }

  function loadStores() {

    fetch(`/api/stores/${uid}`)
      .then(r => r.json())
      .then(data => {
        const stores = data.stores || [];
        Object.values(storeMarkers).forEach(m => map.removeLayer(m));
        Object.keys(storeMarkers).forEach(k => delete storeMarkers[k]);

        // ── Feed proximity engine ──────────────────────────
        _prox_stores = stores;

        stores.forEach(s => {

          const members = s.members || 0;

            : '';
          const purposeRow = s.purpose

            : '';
          let expiresRow = '';
          if (s.expires_at) {

            const daysLeft = Math.ceil((exp - Date.now()) / 86400000);
            if (daysLeft > 0) expiresRow = `<div style="font-size:11px;color:#e67e22;margin-bottom:4px">⏳ ${daysLeft}d left</div>`;
            else expiresRow = `<div style="font-size:11px;color:#e74c3c;margin-bottom:4px">⚠️ Expired</div>`;
          }
          m.bindPopup(`

              ${natureBadge}

              <div style="font-size:11px;opacity:.6;margin-bottom:8px">🔔 ${members} ${dist ? '&nbsp;📍 ' + dist : ''}</div>
              <div style="display:flex;gap:6px">
                <button onclick="openMapCatalog('store',${s.id},'${s.name.replace(/'/g,"\\'")}',${JSON.stringify(lang==='ar'?{product:'📦 منتجات',menu_food:'🍔 طعام',menu_drink:'🥤 مشروبات',clothing:'👕 ملابس',accessory:'💍 اكسسوار',other:'📋 أخرى',contact:'📞 تواصل',hours:'🕐 مواعيد'}:{product:'📦 Products',menu_food:'🍔 Food',menu_drink:'🥤 Drinks',clothing:'👕 Clothing',accessory:'💍 Accessories',other:'📋 Other',contact:'📞 Contact',hours:'🕐 Hours'})});" style="flex:1;padding:8px 4px;background:linear-gradient(135deg,#e67e22,#c0392b);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer">📋 ${lang==='ar'?'الكتالوج':'Catalog'}</button>
                ${s.is_creator ? `<button onclick="openIconPicker('store',${s.id},'${(s.icon||'🏪')}')" style="padding:8px 9px;background:#fff8f0;border:1.5px solid #fcd9a7;border-radius:10px;font-size:15px;cursor:pointer" title="${lang==='ar'?'تغيير الأيقونة':'Change Icon'}">🎨</button>` : ''}
                ${s.is_creator ? `<button onclick="openEntityEdit('store',${s.id},'${s.name.replace(/'/g,"\\'")}','${(s.purpose||'').replace(/'/g,"\\'")}','${(s.nature||'').replace(/'/g,"\\'")}');" style="padding:8px 9px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;font-size:15px;cursor:pointer" title="${lang==='ar'?'تعديل':'Edit'}">✏️</button>` : ''}
              </div>
            </div>
          `);
          storeMarkers[s.id] = m;
        });
      })
      .catch(() => {});
  }

  // ══════════════════════════════════════════════════════════════════════
  // LIVE GPS TRACKING — watchPosition
  // ══════════════════════════════════════════════════════════════════════
  const gpsDot = document.getElementById('gps-dot');
  const gpsLbl = document.getElementById('gps-lbl');

  let lastSentLat   = null;
  let lastSentLng   = null;
  let lastSentTime  = 0;
  const MIN_DIST_M  = 5;    // only send if moved ≥ 5 metres
  const MIN_SEND_MS = 4000; // at most once every 4 seconds

  function metresToDeg(m) { return m / 111320; }

  function movedEnough(lat, lng) {
    if (lastSentLat === null) return true;
    const dLat = Math.abs(lat - lastSentLat);
    const dLng = Math.abs(lng - lastSentLng);
    return dLat > metresToDeg(MIN_DIST_M) || dLng > metresToDeg(MIN_DIST_M);
  }

  function setGpsUi(state, text) {
    gpsDot.className = state;   // good | fair | bad | ''
    gpsLbl.textContent = text;
  }

  function onGpsPosition(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy; // metres

    // ── Update GPS accuracy badge ──
    if      (acc <= 20)  setGpsUi('good', `±${Math.round(acc)}m`);
    else if (acc <= 100) setGpsUi('fair', `±${Math.round(acc)}m`);
    else                 setGpsUi('bad',  `±${Math.round(acc)}m`);

    // ── Update gpsLatLng so recenter works ──
    gpsLatLng = [lat, lng];

    // ── If not joystick-roaming, always follow live GPS ──
    if (!joystickRoaming && meMarker) {
      myLatLng = [lat, lng];
      meMarker.setLatLng(myLatLng);
      map.panTo(myLatLng, { animate: true, duration: 0.5 });
      refreshMeMarker();
    }

    // ── Run proximity checks on GPS move ──
    runProximityChecks();

    // ── Throttle server updates ──
    const now = Date.now();
    if (now - lastSentTime < MIN_SEND_MS) return;
    if (!movedEnough(lat, lng)) return;

    lastSentLat  = lat;
    lastSentLng  = lng;
    lastSentTime = now;

    fetch('/api/update_location', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid, lat, lng, accuracy: acc })
    }).catch(() => {});
  }

  function onGpsError(err) {
    setGpsUi('bad', lang === 'ar' ? 'GPS ✗' : 'GPS off');
  }

  if (uid && navigator.geolocation) {
    navigator.geolocation.watchPosition(
      onGpsPosition,
      onGpsError,
      {
        enableHighAccuracy: true,
        timeout:            10000,
        maximumAge:         0,      // always fresh position
      }
    );
  } else {
    document.getElementById('gps-badge').style.display = 'none';
  }

  // ══════════════════════════════════════════════════════════════════════
  // ENTITY EDIT SYSTEM (name / purpose / nature)
  // ══════════════════════════════════════════════════════════════════════
  const _eeOverlay   = document.getElementById('entity-edit-overlay');
  const _eeBox       = document.getElementById('entity-edit-box');
  const _eeTitle     = document.getElementById('entity-edit-title');
  const _eeName      = document.getElementById('ee-name');
  const _eeNameCount = document.getElementById('ee-name-count');
  const _eePurpose   = document.getElementById('ee-purpose');
  const _eeNature    = document.getElementById('ee-nature');
  const _eeSave      = document.getElementById('entity-edit-save');

  let _eeEntityType = '';
  let _eeEntityId   = 0;

  // Labels (AR / EN)
  const _eeL = {
    room:  lang==='ar' ? {
      title:'✏️ تعديل الغرفة', name:'اسم الغرفة', purpose:'الهدف / الوصف',
      nature:'الطبيعة (مثال: عام، خاص، ترفيهي)', save:'💾 حفظ التغييرات',
      ok:'✅ تم الحفظ', err:'❌ حدث خطأ', nameReq:'الاسم مطلوب'
    } : {
      title:'✏️ Edit Room', name:'Room Name', purpose:'Purpose / Description',
      nature:'Nature (e.g. Public, Private, Social)', save:'💾 Save Changes',
      ok:'✅ Saved', err:'❌ Error', nameReq:'Name is required'
    },
    store: lang==='ar' ? {
      title:'✏️ تعديل المتجر', name:'اسم المتجر', purpose:'الهدف / الوصف',
      nature:'الطبيعة (مثال: مطعم، بقالة، إلكترونيات)', save:'💾 حفظ التغييرات',
      ok:'✅ تم الحفظ', err:'❌ حدث خطأ', nameReq:'الاسم مطلوب'
    } : {
      title:'✏️ Edit Store', name:'Store Name', purpose:'Purpose / Description',
      nature:'Nature (e.g. Restaurant, Grocery, Electronics)', save:'💾 Save Changes',
      ok:'✅ Saved', err:'❌ Error', nameReq:'Name is required'
    }
  };

  document.getElementById('entity-edit-close-btn').addEventListener('click', closeEntityEdit);
  _eeOverlay.addEventListener('click', e => { if (e.target === _eeOverlay) closeEntityEdit(); });

  // character counter for name
  _eeName.addEventListener('input', () => {
    const n = _eeName.value.length;
    _eeNameCount.textContent = `${n}/60`;
  });

  function closeEntityEdit() { _eeOverlay.style.display = 'none'; }

  window.openEntityEdit = function(entityType, entityId, name, purpose, nature) {
    _eeEntityType = entityType;
    _eeEntityId   = entityId;
    const L = _eeL[entityType] || _eeL.room;

    _eeTitle.textContent = L.title;
    document.getElementById('ee-name-label').textContent    = L.name;
    document.getElementById('ee-purpose-label').textContent = L.purpose;
    document.getElementById('ee-nature-label').textContent  = L.nature;
    _eeSave.textContent = L.save;

    _eeName.value    = name    || '';
    _eePurpose.value = purpose || '';
    _eeNature.value  = nature  || '';
    _eeNameCount.textContent = `${_eeName.value.length}/60`;

    _eeOverlay.style.display = 'block';
    _eeBox.classList.remove('open');
    void _eeBox.offsetWidth;
    _eeBox.classList.add('open');
    map.closePopup();
    setTimeout(() => _eeName.focus(), 320);
  };

  _eeSave.addEventListener('click', async () => {
    const L = _eeL[_eeEntityType] || _eeL.room;
    const name = _eeName.value.trim();
    if (!name) { _eeName.style.borderColor='#e74c3c'; _eeName.focus(); return; }
    _eeName.style.borderColor = '';
    _eeSave.disabled = true;
    _eeSave.textContent = '⏳';
    try {
      const res = await fetch('/api/entity/edit', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          uid, entity_type:_eeEntityType, entity_id:_eeEntityId,
          name, purpose:_eePurpose.value.trim(), nature:_eeNature.value.trim()
        })
      }).then(r => r.json());

      if (res.ok) {
        _eeSave.textContent = L.ok;
        setTimeout(() => {
          closeEntityEdit();
          if (_eeEntityType==='room') loadRooms();
          else loadStores();
          _eeSave.textContent = L.save;
          _eeSave.disabled = false;
        }, 800);
      } else {
        _eeSave.textContent = L.err;
        setTimeout(() => { _eeSave.textContent = L.save; _eeSave.disabled = false; }, 1500);
      }
    } catch(e) {
      _eeSave.textContent = L.err;
      setTimeout(() => { _eeSave.textContent = L.save; _eeSave.disabled = false; }, 1500);
    }
  });

  // ══════════════════════════════════════════════════════════════════════
  // ICON PICKER SYSTEM
  // ══════════════════════════════════════════════════════════════════════
  const ROOM_EMOJIS  = ['🏠','🏡','🏢','🏣','🏥','🏦','🏨','🏩','🏫','🏬','🏯','🏰','⛪','🕌','🛖','🏕️','🎪','🎭','🎨','🎬','🎵','🎧','🎤','🎸','🎮','🏋️','🏊','⛱️','🌴','🌳','🌿','🔥','⭐','🌟','🎯','🚀','💡','🔮','🧘','🤝','👥','🎓','📖','🏆','🎁','❤️','🌸','🌈','🌙','🎊','🎉','🍔','☕','🥗','🌺','💎','🛡️','⚡','🎠','🎡','🌊','🏄','🚂','✈️','🚁','💫'];
  const STORE_EMOJIS = ['🏪','🛒','🛍️','🍔','🍕','🌮','🍣','🍰','🧁','☕','🍵','🍺','🍷','🥗','🍦','🍫','💊','💄','👗','👟','👜','💍','💎','💻','📱','📚','📷','🎁','🔧','🛠️','🚗','⚽','🎮','🎨','🌸','🌺','💈','🧴','🪴','🎀','🐾','🧸','🎪','🍀','🌞','⭐','🔑','🏷️','🎵','📦','🍓','🧃','🌶️','🧇','🥐','🥩','🎂'];

  let _ipOverlay    = document.getElementById('icon-picker-overlay');
  let _ipBox        = document.getElementById('icon-picker-box');
  let _ipGrid       = document.getElementById('icon-picker-grid');
  let _ipSaveBtn    = document.getElementById('icon-save-btn');
  let _ipTitle      = document.getElementById('icon-picker-title');
  let _ipEntityType = '';
  let _ipEntityId   = 0;
  let _ipSelected   = '';

  document.getElementById('icon-picker-close-btn').addEventListener('click', closeIconPicker);
  _ipOverlay.addEventListener('click', e => { if (e.target === _ipOverlay) closeIconPicker(); });

  function closeIconPicker() { _ipOverlay.style.display = 'none'; }

  window.openIconPicker = function(entityType, entityId, currentIcon) {
    _ipEntityType = entityType;
    _ipEntityId   = entityId;
    _ipSelected   = currentIcon;
    _ipTitle.textContent = lang === 'ar' ? `🎨 اختر أيقونة` : `🎨 Choose Icon`;
    _ipSaveBtn.textContent = lang === 'ar' ? '💾 حفظ' : '💾 Save';

    const emojis = entityType === 'room' ? ROOM_EMOJIS : STORE_EMOJIS;
    _ipGrid.innerHTML = '';
    emojis.forEach(em => {
      const btn = document.createElement('button');
      btn.className = 'icon-pick-btn' + (em === _ipSelected ? ' selected' : '');
      btn.textContent = em;
      btn.addEventListener('click', () => {
        _ipSelected = em;
        document.querySelectorAll('.icon-pick-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
      _ipGrid.appendChild(btn);
    });

    _ipOverlay.style.display = 'block';
    _ipBox.classList.remove('open');
    void _ipBox.offsetWidth;
    _ipBox.classList.add('open');
    map.closePopup();
  };

  _ipSaveBtn.addEventListener('click', async () => {
    if (!_ipSelected) return;
    _ipSaveBtn.disabled = true;
    _ipSaveBtn.textContent = '⏳';
    try {
      const res = await fetch('/api/entity/set_icon', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, entity_type: _ipEntityType, entity_id: _ipEntityId, icon: _ipSelected })
      }).then(r => r.json());
      if (res.ok) {
        closeIconPicker();
        // Reload markers immediately
        if (_ipEntityType === 'room') loadRooms();
        else loadStores();
      } else {
        _ipSaveBtn.textContent = '❌';
        setTimeout(() => { _ipSaveBtn.textContent = lang==='ar'?'💾 حفظ':'💾 Save'; _ipSaveBtn.disabled=false; }, 1500);
        return;
      }
    } catch(e) {
      _ipSaveBtn.textContent = '❌';
    }
    _ipSaveBtn.disabled = false;
    _ipSaveBtn.textContent = lang==='ar'?'💾 حفظ':'💾 Save';
  });

  // ══════════════════════════════════════════════════════════════════════
  // MAP CATALOG OVERLAY (read-only view from popups)
  // ══════════════════════════════════════════════════════════════════════
  const _mcOverlay = document.getElementById('map-cat-overlay');
  const _mcPanel   = document.getElementById('map-cat-panel');
  const _mcTitle   = document.getElementById('map-cat-title');
  const _mcTabs    = document.getElementById('map-cat-tabs');
  const _mcBody    = document.getElementById('map-cat-body');
  let   _mcItems   = [];
  let   _mcActive  = '';
  let   _mcCatMap  = {};

  document.getElementById('map-cat-close').addEventListener('click', closeMapCatalog);
  _mcOverlay.addEventListener('click', e => { if (e.target === _mcOverlay) closeMapCatalog(); });

  function closeMapCatalog() { _mcOverlay.style.display = 'none'; map.closePopup(); }

  window.openMapCatalog = function(entityType, entityId, name, catMap) {
    _mcCatMap = catMap || {};
    _mcTitle.textContent = `📋 ${name}`;
    _mcOverlay.style.display = 'block';
    _mcPanel.classList.remove('open');
    void _mcPanel.offsetWidth;
    _mcPanel.classList.add('open');
    _mcBody.innerHTML = `<div class="mct-spinner"></div>`;
    _mcTabs.innerHTML = '';
    fetch(`/api/catalog/${entityType}/${entityId}`)
      .then(r => r.json())
      .then(data => {
        _mcItems = data.items || [];
        // build unique cat list from items
        const cats = [...new Set(_mcItems.map(it => it.category))];
        if (!cats.length) { _mcBody.innerHTML = `<div class="mct-empty">${lang==='ar'?'لا يوجد محتوى بعد':'No content yet'}</div>`; return; }
        _mcActive = cats[0];
        _mcTabs.innerHTML = '';
        cats.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'mct-tab' + (cat === _mcActive ? ' active' : '');
          btn.textContent = _mcCatMap[cat] || cat;
          btn.addEventListener('click', () => {
            _mcActive = cat;
            document.querySelectorAll('.mct-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMcItems();
          });
          _mcTabs.appendChild(btn);
        });
        renderMcItems();
      })
      .catch(() => { _mcBody.innerHTML = `<div class="mct-empty">❌</div>`; });
  };

  function renderMcItems() {
    _mcBody.innerHTML = '';
    const filtered = _mcItems.filter(it => it.category === _mcActive);
    if (!filtered.length) {
      _mcBody.innerHTML = `<div class="mct-empty">${lang==='ar'?'لا يوجد محتوى في هذا القسم':'No items in this section'}</div>`;
      return;
    }
    filtered.forEach(it => {
      const el = document.createElement('div'); el.className = 'mct-item';
      if (it.image_url) {
        const img = document.createElement('img'); img.className = 'mct-item-img';
        img.src = it.image_url; img.onerror = () => img.remove(); el.appendChild(img);
      }
      const body = document.createElement('div'); body.className = 'mct-item-body';
      const top = document.createElement('div'); top.className = 'mct-item-top';
      const ttl = document.createElement('div'); ttl.className = 'mct-item-title'; ttl.textContent = it.title;
      top.appendChild(ttl);
      if (it.price != null) {
        const pr = document.createElement('div'); pr.className = 'mct-item-price';
        pr.textContent = `${parseFloat(it.price).toLocaleString()} ${it.currency || 'SAR'}`;
        top.appendChild(pr);
      }
      body.appendChild(top);
      if (it.description) { const d=document.createElement('div');d.className='mct-item-desc';d.textContent=it.description;body.appendChild(d); }
      const ex=(icon,txt)=>{const d=document.createElement('div');d.className='mct-item-extra';d.textContent=`${icon} ${txt}`;body.appendChild(d);};
      if (it.hours) ex('🕐', it.hours);
      if (it.phone) ex('📞', it.phone);
      if (it.website) ex('🌐', it.website);
      el.appendChild(body);
      _mcBody.appendChild(el);
    });
  }

  // ══════════════════════════════════════════════════════════════════════
  // PROXIMITY BUBBLE NOTIFICATION ENGINE
  // ══════════════════════════════════════════════════════════════════════

  // ── Data caches ──────────────────────────────────────────────────────
  let _prox_users  = [];
  let _prox_rooms  = [];
  let _prox_stores = [];
  const _prevRoomMembers  = {};   // roomId  → last known member count
  const _prevStoreMembers = {};   // storeId → last known member count

  // ── Cooldown / dedup ─────────────────────────────────────────────────
  const _bubShown  = {};          // key → timestamp last shown
  const BUB_COOL   = 120000;      // 2 min before repeating same key
  const BUB_MAX    = 4;           // max visible bubbles at once
  let   _bubCount  = 0;
  let   _lastCheck = 0;
  const CHECK_INT  = 8000;        // run proximity checks every 8 s

  // ── Haversine distance in metres ────────────────────────────────────
  function _dist(la1, lo1, la2, lo2) {
    const R = 6371000, r = Math.PI/180;
    const dLa = (la2-la1)*r, dLo = (lo2-lo1)*r;
    const a = Math.sin(dLa/2)**2 +
              Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
    return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function _mStr(m) {
    if (m < 1000) return `${Math.round(m)}${lang==='ar'?'م':'m'}`;
    return `${(m/1000).toFixed(1)} ${L_.km}`;
  }

  // ── Show one bubble ──────────────────────────────────────────────────
  function showBubble(icon, title, sub, key, color, dur) {
    const now = Date.now();
    if (_bubShown[key] && now - _bubShown[key] < BUB_COOL) return;
    if (_bubCount >= BUB_MAX) return;
    _bubShown[key] = now;
    _bubCount++;

    const el = document.createElement('div');
    el.className = 'map-bubble';
    el.style.borderLeftColor = color;
    el.innerHTML = `
      <span class="bub-icon">${icon}</span>
      <div class="bub-msg">
        <div class="bub-title">${title}</div>
        ${sub ? `<div class="bub-sub">${sub}</div>` : ''}
      </div>
      <button class="bub-close" onclick="dismissBubble(this)">✕</button>`;

    document.getElementById('bubble-container').appendChild(el);

    const lifetime = (dur || 7000);
    setTimeout(() => {
      el.classList.add('bub-out');
      setTimeout(() => { el.remove(); _bubCount = Math.max(0, _bubCount-1); }, 420);
    }, lifetime);
  }

  window.dismissBubble = function(btn) {
    const el = btn.closest('.map-bubble');
    if (!el) return;
    el.classList.add('bub-out');
    setTimeout(() => { el.remove(); _bubCount = Math.max(0, _bubCount-1); }, 420);
  };

  // ── Message templates ────────────────────────────────────────────────
  const T = {
    ar: {
      group:      (n,d)   => [`👥 تجمّع ${n} أشخاص بالقرب`,  `على بعد ${d} منك`],
      user_bio:   (n,b,d) => [`👤 ${n} موجود على بعد ${d}`,   `"${b}"`],
      user_act:   (n,d)   => [`👤 شخص نشط بالقرب — ${d}`,     `${n||'مستخدم'}`],
      room_full:  (n,m,d) => [`🏠 غرفة "${n}" على بعد ${d}`,  `يوجد بها ${m} أشخاص الآن`],
      room_empty: (n,d)   => [`🏠 غرفة "${n}" قريبة`,          `على بعد ${d} — انضم الآن`],
      room_new:   (n,m)   => [`✨ ${m} أشخاص تعارفوا للتو!`,   `في غرفة "${n}" القريبة منك`],
      store_full: (n,nat,m,d) => [`🏪 ${nat||'متجر'} "${n}" على بعد ${d}`, `يرتاده ${m} ${m===1?'شخص':'أشخاص'} الآن`],
      store_empty:(n,nat,d)   => [`🏪 ${nat||'متجر'} "${n}" قريب`,          `على بعد ${d} — تفضل بزيارته`],
      store_new:  (n,m)   => [`🔔 ${m} أشخاص في "${n}" الآن!`, `زاد الإقبال على هذا المتجر`],
    },
    en: {
      group:      (n,d)   => [`👥 ${n} people gathered nearby`, `Within ${d} of you`],
      user_bio:   (n,b,d) => [`👤 ${n} is ${d} away`,           `"${b}"`],
      user_act:   (n,d)   => [`👤 Active person nearby — ${d}`,  `${n||'User'}`],
      room_full:  (n,m,d) => [`🏠 Room "${n}" is ${d} away`,     `${m} people inside right now`],
      room_empty: (n,d)   => [`🏠 Room "${n}" nearby`,           `${d} away — come join!`],
      room_new:   (n,m)   => [`✨ ${m} people just connected!`,   `In room "${n}" nearby you`],
      store_full: (n,nat,m,d) => [`🏪 ${nat||'Store'} "${n}" is ${d} away`, `${m} ${m===1?'person':'people'} visiting now`],
      store_empty:(n,nat,d)   => [`🏪 ${nat||'Store'} "${n}" nearby`,        `${d} away — check it out`],
      store_new:  (n,m)   => [`🔔 ${m} people at "${n}" now!`,   `Footfall just increased`],
    }
  };
  const TL = T[lang] || T.en;

  // ── Main proximity check ─────────────────────────────────────────────
  function runProximityChecks(force) {
    const now = Date.now();
    if (!force && now - _lastCheck < CHECK_INT) return;
    if (!myLatLng) return;
    _lastCheck = now;
    const [la, lo] = myLatLng;

    // ── 1. Rooms ──────────────────────────────────────────────────────
    _prox_rooms.forEach(r => {
      if (!r.lat || !r.lng) return;
      const d = _dist(la, lo, r.lat, r.lng);
      if (d > 350) return;
      const dStr   = _mStr(d);
      const members = r.members || 0;

      // ── New members just joined? ──
      const prev = _prevRoomMembers[r.id];
      if (prev !== undefined && members > prev && members >= 2) {
        const [ti, su] = TL.room_new(r.name, members);
        showBubble('✨', ti, su, `room_new_${r.id}_${members}`, '#f1c40f', 9000);
      }
      _prevRoomMembers[r.id] = members;

      // ── Proximity notification ──
      const nature = r.nature ? `(${r.nature})` : '';
      const purpose = r.purpose || '';
      if (members >= 2) {
        const [ti, su] = TL.room_full(r.name, members, dStr);
        showBubble('🏠', ti, purpose || su, `room_prox_${r.id}`, '#7c3aed');
      } else {
        const [ti, su] = TL.room_empty(r.name, dStr);
        showBubble('🏠', ti, purpose || su, `room_prox_${r.id}`, '#9b59b6');
      }
    });

    // ── 2. Stores ─────────────────────────────────────────────────────
    _prox_stores.forEach(s => {
      if (!s.lat || !s.lng) return;
      const d = _dist(la, lo, s.lat, s.lng);
      if (d > 300) return;
      const dStr   = _mStr(d);
      const members = s.members || 0;
      const nat    = s.nature || '';

      // ── New visitors? ──
      const prev = _prevStoreMembers[s.id];
      if (prev !== undefined && members > prev && members >= 2) {
        const [ti, su] = TL.store_new(s.name, members);
        showBubble('🔔', ti, su, `store_new_${s.id}_${members}`, '#f39c12', 9000);
      }
      _prevStoreMembers[s.id] = members;

      const purpose = s.purpose || '';
      if (members >= 1) {
        const [ti, su] = TL.store_full(s.name, nat, members, dStr);
        showBubble('🏪', ti, purpose || su, `store_prox_${s.id}`, '#e67e22');
      } else {
        const [ti, su] = TL.store_empty(s.name, nat, dStr);
        showBubble('🏪', ti, purpose || su, `store_prox_${s.id}`, '#d35400');
      }
    });

    // ── 3. Users ──────────────────────────────────────────────────────
    const close = _prox_users.filter(u => {
      if (!u.lat || !u.lng) return false;
      return _dist(la, lo, u.lat, u.lng) <= 150;
    });

    if (close.length >= 3) {
      // Group bubble
      const dMax = Math.max(...close.map(u => _dist(la, lo, u.lat, u.lng)));
      const [ti, su] = TL.group(close.length, _mStr(dMax));
      const gKey = `grp_${Math.round(la*100)}_${Math.round(lo*100)}`;
      showBubble('👥', ti, su, gKey, '#2ecc71');
    } else {
      // Individual bubbles (max 2)
      close.slice(0, 2).forEach(u => {
        const d    = _dist(la, lo, u.lat, u.lng);
        const dStr = _mStr(d);
        const name = u.username || (lang==='ar'?'مستخدم':'User');
        const bio  = u.bio ? u.bio.substring(0,40)+(u.bio.length>40?'…':'') : '';
        const key  = `user_${u.id}`;
        if (bio) {
          const [ti, su] = TL.user_bio(name, bio, dStr);
          showBubble('👤', ti, su, key, '#3498db');
        } else if (u.is_active) {
          const [ti, su] = TL.user_act(name, dStr);
          showBubble('👤', ti, su, key, '#2980b9');
        }
      });
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  loadData(true);
  startCountdown();
  loadRooms();
  loadStores();
  setInterval(loadRooms, 5000);
  setInterval(loadStores, 5000);
</script>
