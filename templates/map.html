<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Always Close – Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d1a;overflow:hidden;height:100vh}
    #map{height:100vh;width:100%}

    /* ── Loading overlay ── */
    #overlay{
      position:fixed;inset:0;background:#0d0d1a;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;color:#fff;transition:opacity .4s
    }
    #overlay.gone{opacity:0;pointer-events:none}
    #overlay .ico{font-size:48px;animation:float 2s ease-in-out infinite}
    #overlay .lbl{font-size:15px;opacity:.7}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* ── Live badge ── */
    #live-badge{
      position:fixed;top:12px;left:12px;z-index:1000;
      background:rgba(13,13,26,.85);backdrop-filter:blur(8px);
      color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;
      display:flex;align-items:center;gap:7px;user-select:none
    }
    .pulse-dot{
      width:8px;height:8px;border-radius:50%;background:#2ecc71;
      animation:pulse-green 1.5s infinite
    }
    @keyframes pulse-green{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
    #countdown{font-variant-numeric:tabular-nums;min-width:28px}

    /* ── Recenter button ── */
    #recenter{
      position:fixed;bottom: 20px;left:10px;right:14;z-index:1000;
      width:40px;height:40px;border-radius:50%;background:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,.25);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:18px
    }

    /* ── Legend ── */
    #legend{
      position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
      background:rgba(13,13,26,.85);backdrop-filter:blur(8px);
      color:#fff;border-radius:24px;padding:7px 18px;
      display:flex;gap:16px;align-items:center;font-size:11.5px;z-index:1000;white-space:nowrap
    }
    .leg-dot{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.5);display:inline-block;margin-right:4px}
    .leg-dot.red{background:#e74c3c}
    .leg-dot.green{background:#2ecc71}
    .leg-dot.blue{background:#3498db}

    /* ── Pin animations ── */
    @keyframes ring-green{
      0%{box-shadow:0 0 0 0 rgba(46,204,113,.6),0 3px 12px rgba(0,0,0,.35)}
      70%{box-shadow:0 0 0 10px rgba(46,204,113,0),0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0 rgba(46,204,113,0),0 3px 12px rgba(0,0,0,.35)}
    }
    @keyframes ring-red{
      0%{box-shadow:0 0 0 0 rgba(231,76,60,.6),0 3px 12px rgba(0,0,0,.35)}
      70%{box-shadow:0 0 0 10px rgba(231,76,60,0),0 3px 12px rgba(0,0,0,.35)}
      100%{box-shadow:0 0 0 0 rgba(231,76,60,0),0 3px 12px rgba(0,0,0,.35)}
    }
    .pa{animation:ring-green 1.8s ease-out infinite}
    .pme{animation:ring-red 1.8s ease-out infinite}

    /* ── Leaflet popup card ── */
    .leaflet-popup-content-wrapper{
      border-radius:18px!important;padding:0!important;
      overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.28)!important;
      min-width:230px;
    }
    .leaflet-popup-content{margin:0!important}
    .leaflet-popup-tip-container{display:none}

    .card{background:#fff;border-radius:18px;overflow:hidden;font-size:13px;min-width:230px}
    .card-img{width:100%;height:150px;object-fit:cover;display:block;background:#e5e5e5}
    .card-body{padding:12px 14px 14px}
    .card-name{font-size:15px;font-weight:700;color:#111;margin-bottom:5px}
    .card-row{color:#555;margin-bottom:3px;display:flex;align-items:center;gap:5px;font-size:13px}
    .card-bio{color:#666;font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;font-size:12px}
    .badge-dist{
      display:inline-block;background:linear-gradient(135deg,#e74c3c,#c0392b);
      color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px
    }
    .badge-active{background:linear-gradient(135deg,#2ecc71,#27ae60)}
    .badge-inactive{background:linear-gradient(135deg,#3498db,#2980b9)}
    .card-actions{display:flex;gap:8px;margin-top:10px}
    .btn-msg{
      flex:1;background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;
      border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:600;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px
    }
    .btn-msg:active{opacity:.85}
    .last-seen{font-size:11px;color:#999;margin-top:5px}
  </style>
</head>
<body>

<div id="overlay">
  <div class="ico">🗺️</div>
  <div class="lbl" id="overlay-lbl">Loading map…</div>
</div>

<div id="map"></div>

<div id="live-badge">
  <span class="pulse-dot"></span>
  <span id="live-lbl">LIVE</span>
  <span id="countdown"> 5s </span>
</div>

<button id="recenter" title="Re-center">📍</button>

<div id="legend">
  <span><span class="leg-dot red"></span><span id="leg-me">You</span></span>
  <span><span class="leg-dot green"></span><span id="leg-active">Active</span></span>
  <span><span class="leg-dot blue"></span><span id="leg-away">Away</span></span>
</div>

<script>
  // ── Params ──────────────────────────────────────────────────────────────
  const uid  = new URLSearchParams(location.search).get('uid');
  const lang = new URLSearchParams(location.search).get('lang') || 'en';

  const L_ = {
    ar:{
      loading:'جارٍ التحميل…', you:'موقعك',
      me_leg:'أنت', active_leg:'نشط', away_leg:'غير نشط',
      km:'كم', yo:'سنة', msg:'💬 مراسلة',
      active:'🟢 نشط الآن', away:'🔵 غير نشط',
      last:'آخر ظهور:', now:'الآن', min:'د', hr:'س', day:'ي',
      no_photo_alt:'صورة', err:'❌ خطأ في التحميل'
    },
    en:{
      loading:'Loading map…', you:'Your location',
      me_leg:'You', active_leg:'Active', away_leg:'Away',
      km:'km', yo:'yo', msg:'💬 Message',
      active:'🟢 Active now', away:'🔵 Away',
      last:'Last seen:', now:'now', min:'m', hr:'h', day:'d',
      no_photo_alt:'photo', err:'❌ Error loading map'
    }
  }[lang] || {
    loading:'Loading…', you:'You', me_leg:'You', active_leg:'Active', away_leg:'Away',
    km:'km', yo:'yo', msg:'💬 Message', active:'🟢 Active', away:'🔵 Away',
    last:'Last:', now:'now', min:'m', hr:'h', day:'d', no_photo_alt:'photo', err:'❌ Error'
  };

  // Apply legend labels
  document.getElementById('overlay-lbl').textContent = L_.loading;
  document.getElementById('leg-me').textContent    = L_.me_leg;
  document.getElementById('leg-active').textContent = L_.active_leg;
  document.getElementById('leg-away').textContent   = L_.away_leg;
  document.getElementById('live-lbl').textContent   = 'LIVE';

  // ── Helpers ─────────────────────────────────────────────────────────────
  function timeAgo(isoStr) {
    if (!isoStr) return '';
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 60)  return L_.now;
    if (diff < 3600) return `${Math.floor(diff/60)}${L_.min}`;
    if (diff < 86400) return `${Math.floor(diff/3600)}${L_.hr}`;
    return `${Math.floor(diff/86400)}${L_.day}`;
  }

  function openChat(username, telegramId) {
    const url = username
      ? `https://t.me/${username}`
      : `tg://user?id=${telegramId}`;
    if (window.Telegram && Telegram.WebApp && Telegram.WebApp.openTelegramLink) {
      Telegram.WebApp.openTelegramLink(url);
    } else {
      window.open(url, '_blank');
    }
  }

  // Expose globally for onclick in popup HTML
  window.openChat = openChat;

  // ── Map setup ────────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: false });
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(map);

  let myLatLng = null;
  document.getElementById('recenter').addEventListener('click', () => {
    if (myLatLng) map.setView(myLatLng, 16);
  });

  // ── Custom pin factory ───────────────────────────────────────────────────
  function makePin(isActive, isMe, photoUrl, initial) {
    const sz   = isMe ? 28 : 44;
    const half = sz / 2;
    const borderColor = isMe ? '#e74c3c' : isActive ? '#2ecc71' : '#3498db';
    const animClass   = isMe ? 'pme' : isActive ? 'pa' : '';

    let inner;
    if (photoUrl) {
        inner = `
          <div style="
            width:${sz}px;
            height:${sz}px;
            border-radius:50%;
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
          ">
            <img src="${photoUrl}"
              style="
                width:100%;
                height:100%;
                object-fit:cover;
                display:block;
              "
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">

            <div style="
              display:none;
              width:100%;
              height:100%;
              border-radius:50%;
              background:${isActive?'#2ecc71':'#3498db'};
              color:#fff;
              font-size:${sz/2.5}px;
              font-weight:700;
              align-items:center;
              justify-content:center">
              ${initial}
            </div>
          </div>
        `;
    } else {
      inner = `<div style="width:${sz}px;height:${sz}px;border-radius:50%;
               background:${isActive?'#2ecc71':'#3498db'};
               color:#fff;font-size:${sz/2.5}px;font-weight:700;
               display:flex;align-items:center;justify-content:center">${initial}</div>`;
    }

    return L.divIcon({
      html: `<div class="${animClass}" style="
        width:${sz}px;height:${sz}px;border-radius:50%;
        border:3px solid ${borderColor};overflow:hidden;
        background:#ccc">${inner}</div>`,
      className: '',
      iconSize:   [sz, sz],
      iconAnchor: [half, half],
      popupAnchor:[0, -half - 8],
    });
  }

  // ── Popup card builder ───────────────────────────────────────────────────
  function makePopup(u) {
    const ago    = timeAgo(u.last_seen);
    const status = u.is_active ? L_.active : L_.away;
    let html = '<div class="card">';

    if (u.photo_url) {
      html += `<img class="card-img" src="${u.photo_url}"
        onerror="this.style.display='none'" alt="${L_.no_photo_alt}">`;
    }

    html += '<div class="card-body">';
    html += `<div class="card-name">👤 ${u.username || 'User'}</div>`;

    const parts = [];
    if (u.age)    parts.push(`🎂 ${u.age} ${L_.yo}`);
    if (u.gender) parts.push(`🚻 ${u.gender}`);
    if (parts.length) html += `<div class="card-row">${parts.join(' &nbsp;•&nbsp; ')}</div>`;

    html += `<div class="card-row">${status}</div>`;

    if (u.distance != null) {
      html += `<span class="badge-dist">📍 ${u.distance} ${L_.km}</span>`;
    }

    if (ago) {
      html += `<div class="last-seen">🕒 ${L_.last} ${ago}</div>`;
    }

    if (u.bio) {
      html += `<div class="card-bio">📝 ${u.bio}</div>`;
    }

    if (u.username || u.telegram_id) {
      html += `<div class="card-actions">
        <button class="btn-msg" onclick="openChat('${u.username||''}','${u.telegram_id||''}')">
          ${L_.msg}
        </button>
      </div>`;
    }

    html += '</div></div>';
    return html;
  }

  // ── State ────────────────────────────────────────────────────────────────
  let meMarker   = null;
  const markerMap = {};   // userId → L.Marker
  let refreshTimer = 5;
  let countdownInt = null;

  // ── Main load / refresh ──────────────────────────────────────────────────
  function loadData(firstLoad) {
    fetch(`/api/nearby/${uid}`)
      .then(r => r.json())
      .then(data => {
        if (firstLoad) {
          const overlay = document.getElementById('overlay');
          overlay.classList.add('gone');
          setTimeout(() => overlay.remove(), 500);
        }

        if (data.error) {
          if (firstLoad) {
            const el = document.getElementById('overlay-lbl');
            if (el) el.textContent = data.error;
            document.getElementById('overlay')?.classList.remove('gone');
          }
          return;
        }

        // ── Current user (red pin) ───────────────────────────
        const me = data.me;
        myLatLng = [me.lat, me.lng];

        const meIcon = makePin(true, true, null, (me.name||'?')[0].toUpperCase());

        if (!meMarker) {
          meMarker = L.marker(myLatLng, { icon: meIcon, zIndexOffset: 1000 })
            .addTo(map)
            .bindPopup(`<div style="padding:10px;font-weight:700;font-size:14px">📍 ${L_.you}</div>`);
          if (firstLoad) map.setView(myLatLng, 16);
        } else {
          meMarker.setLatLng(myLatLng).setIcon(meIcon);
        }

        // ── Nearby users (photo pins) ────────────────────────
        const seenIds = new Set();

        data.nearby.forEach(u => {
          seenIds.add(u.id);
          const initial  = (u.username || '?')[0].toUpperCase();
          const icon     = makePin(u.is_active, false, u.photo_url, initial);
          const latlng   = [u.lat, u.lng];
          const popupHtml = makePopup(u);

          if (markerMap[u.id]) {
            // Update existing marker
            markerMap[u.id].setLatLng(latlng).setIcon(icon);
            // Update popup content
            markerMap[u.id].getPopup().setContent(popupHtml);
          } else {
            // Add new marker
            const m = L.marker(latlng, { icon })
              .addTo(map)
              .bindPopup(popupHtml, { maxWidth: 280, minWidth: 230 });
            markerMap[u.id] = m;
          }
        });

        // Remove markers for users who left
        Object.keys(markerMap).forEach(id => {
          if (!seenIds.has(parseInt(id))) {
            map.removeLayer(markerMap[id]);
            delete markerMap[id];
          }
        });

        // Reset countdown
        refreshTimer = 5;
      })
      .catch(() => {
        if (firstLoad) {
          const el = document.getElementById('overlay-lbl');
          if (el) el.textContent = L_.err;
        }
      });
  }

  // ── Live countdown ────────────────────────────────────────────────────────
  function startCountdown() {
    refreshTimer = 5; // 👈 يبدأ من 5 صح

    const el = document.getElementById('countdown');
    if (el) el.textContent = `${refreshTimer}s`;

    countdownInt = setInterval(() => {
      refreshTimer--;

      if (el) el.textContent = `${refreshTimer}s`;

      if (refreshTimer <= 0) {
        refreshTimer = 5;
        loadData(false);
      }
    }, 1000);
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadData(true);
  startCountdown();
</script>
</body>
</html>
