<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>دردشة المجموعة</title>
<style>
:root{
  --bg:#0f0f13;--card:#1a1a24;--card2:#22222e;
  --accent:#7c5af0;--accent2:#e91e8c;
  --text:#f0f0f8;--sub:#8888a8;--brd:rgba(255,255,255,.08);
  --me:linear-gradient(135deg,#7c5af0,#e91e8c);
  --other:#22222e;--radius:16px;
  --bar-h:64px;--hdr-h:58px;
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
#hdr{height:var(--hdr-h);background:var(--card);border-bottom:1px solid var(--brd);
     display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0}
#hdr-icon{font-size:26px;flex-shrink:0}
#hdr-info{flex:1;min-width:0}
#hdr-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-sub{font-size:11px;color:var(--sub);margin-top:1px}
#hdr-status{width:10px;height:10px;border-radius:50%;background:#555;flex-shrink:0;transition:background .3s}
#hdr-status.live{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,.6)}

/* MESSAGES */
#msgs-wrap{flex:1;overflow-y:auto;padding:12px 10px 8px;
           display:flex;flex-direction:column;gap:6px;
           scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
#msgs-wrap::-webkit-scrollbar{width:4px}
#msgs-wrap::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
#empty-state{display:none;flex-direction:column;align-items:center;
             justify-content:center;gap:12px;flex:1;color:var(--sub);text-align:center;padding:40px 20px}
#empty-state .icon{font-size:52px;opacity:.35}
#empty-state p{font-size:13px;line-height:1.7}
#loading-msgs{text-align:center;padding:30px;color:var(--sub);font-size:13px}

/* DATE DIVIDER */
.date-divider{text-align:center;color:var(--sub);font-size:11px;padding:8px 0;
              display:flex;align-items:center;gap:8px}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--brd)}

/* BUBBLE */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:85%}
.msg-row.mine{align-self:flex-start;flex-direction:row-reverse}
.msg-row.other{align-self:flex-end}
.msg-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;cursor:pointer;border:2px solid var(--brd)}
.msg-avatar-ph{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;cursor:pointer;border:2px solid var(--brd)}
.bubble-wrap{display:flex;flex-direction:column;gap:2px}
.bubble-meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--sub);padding:0 4px}
.msg-row.mine .bubble-meta{justify-content:flex-end}
.meta-name{font-weight:600;color:var(--text);cursor:pointer}
.bubble{border-radius:18px;padding:10px 13px;max-width:300px;word-break:break-word;font-size:14px;line-height:1.5;position:relative}
.msg-row.mine .bubble{background:var(--me);border-bottom-right-radius:4px;box-shadow:0 2px 12px rgba(124,90,240,.35)}
.msg-row.other .bubble{background:var(--other);border-bottom-left-radius:4px}
.bubble-time{font-size:9px;color:rgba(255,255,255,.45);margin-top:3px;text-align:left}
.msg-row.mine .bubble-time{text-align:right}
.bubble-img{border-radius:14px;max-width:220px;max-height:220px;object-fit:cover;cursor:pointer;display:block;width:100%}
.voice-bubble{display:flex;align-items:center;gap:8px;padding:8px 12px;min-width:160px}
.voice-play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.voice-bars{flex:1;display:flex;align-items:center;gap:2px;height:24px}
.voice-bar{flex:1;background:rgba(255,255,255,.4);border-radius:2px}
.voice-dur{font-size:11px;color:rgba(255,255,255,.7);flex-shrink:0;min-width:28px;text-align:right}
.file-bubble{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer}
.file-ico{font-size:24px;flex-shrink:0}
.file-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.file-dl{font-size:10px;color:rgba(255,255,255,.6)}

/* INPUT BAR */
#input-bar{background:var(--card);border-top:1px solid var(--brd);
           padding:8px 10px calc(8px + var(--safe-bot));
           display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.ibtn{width:38px;height:38px;border-radius:50%;background:var(--card2);border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
#msg-input{flex:1;background:var(--card2);border:1.5px solid var(--brd);border-radius:20px;padding:9px 15px;color:var(--text);font-size:14px;resize:none;max-height:120px;outline:none;font-family:inherit;line-height:1.4}
#msg-input::placeholder{color:var(--sub)}
#send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
#send-btn:active{transform:scale(.9)}
#send-btn.mic-mode{background:var(--card2)}

/* EMOJI */
#emoji-picker{position:fixed;bottom:calc(var(--bar-h) + 8px);left:8px;right:8px;background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:10px;z-index:200;display:none;box-shadow:0 -8px 30px rgba(0,0,0,.5)}
.emoji-tabs{display:flex;gap:6px;margin-bottom:8px;border-bottom:1px solid var(--brd);padding-bottom:6px}
.etab{background:none;border:none;font-size:18px;cursor:pointer;padding:3px 6px;border-radius:8px;opacity:.5}
.etab.active{opacity:1;background:rgba(124,90,240,.2)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:160px;overflow-y:auto}
.eg{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;border-radius:8px;text-align:center}

/* ATTACH */
#attach-menu{position:fixed;bottom:calc(var(--bar-h) + 8px);left:10px;background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:8px;z-index:200;display:none;box-shadow:0 -4px 20px rgba(0,0,0,.4)}
.amenu-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;white-space:nowrap}
.amenu-item span{font-size:20px}

/* VOICE */
#rec-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#rec-pulse{width:80px;height:80px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:36px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#rec-dur{font-size:28px;font-weight:700;color:#fff}
#rec-cancel{background:var(--card2);border:none;color:var(--sub);padding:10px 24px;border-radius:20px;cursor:pointer;font-size:13px}

/* IMAGE EXPAND */
#img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;display:none;align-items:center;justify-content:center}
#img-overlay img{max-width:95vw;max-height:92vh;border-radius:12px;object-fit:contain}
#img-overlay-close{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px}

/* USER SHEET */
#user-sheet{position:fixed;inset:0;z-index:350;display:none}
#user-sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
#user-sheet-card{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + var(--safe-bot));display:flex;flex-direction:column;align-items:center;gap:14px}
.usheet-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}
.usheet-name{font-size:16px;font-weight:700}
.usheet-btns{display:flex;gap:10px;width:100%}
.usheet-btn{flex:1;padding:13px;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:700}
.usheet-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.usheet-btn.secondary{background:var(--card2);color:var(--text)}

/* SCROLL BTN */
#scroll-btn{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--bar-h) + 16px);background:var(--accent);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:12px;cursor:pointer;display:none;z-index:150;box-shadow:0 2px 12px rgba(124,90,240,.5)}

/* NOT MEMBER */
#not-member{display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;flex:1;padding:40px 24px;text-align:center}
#not-member .icon{font-size:52px}
#not-member h3{font-size:16px;font-weight:700}
#not-member p{font-size:13px;color:var(--sub);line-height:1.6}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-icon">💬</div>
  <div id="hdr-info">
    <div id="hdr-name">جارٍ التحميل…</div>
    <div id="hdr-sub"></div>
  </div>
  <div id="hdr-status"></div>
</div>

<!-- MESSAGES -->
<div id="msgs-wrap">
  <div id="loading-msgs">⏳ جارٍ التحميل…</div>
  <div id="empty-state" style="display:none">
    <div class="icon">💬</div>
    <p id="empty-txt">لا توجد رسائل بعد<br>كن أول من يبدأ المحادثة!</p>
  </div>
</div>

<!-- NOT MEMBER -->
<div id="not-member">
  <div class="icon">🔒</div>
  <h3 id="nm-title">غير مصرح</h3>
  <p id="nm-txt">يجب أن تكون عضواً للمشاركة في هذه الدردشة.</p>
</div>

<!-- SCROLL BTN -->
<button id="scroll-btn" onclick="scrollToBottom()">⬇ رسائل جديدة</button>

<!-- INPUT BAR -->
<div id="input-bar">
  <button class="ibtn" id="emoji-btn">😊</button>
  <button class="ibtn" id="attach-btn">📎</button>
  <textarea id="msg-input" rows="1" placeholder="اكتب رسالة…"></textarea>
  <button id="send-btn" class="mic-mode">🎤</button>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker">
  <div class="emoji-tabs">
    <button class="etab active" data-cat="smileys">😀</button>
    <button class="etab" data-cat="gestures">👍</button>
    <button class="etab" data-cat="hearts">❤️</button>
    <button class="etab" data-cat="nature">🌸</button>
    <button class="etab" data-cat="objects">⭐</button>
    <button class="etab" data-cat="flags">🇸🇦</button>
  </div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<!-- ATTACH MENU -->
<div id="attach-menu">
  <div class="amenu-item" id="attach-img"><span>🖼️</span> <span id="lbl-img">صورة</span></div>
  <div class="amenu-item" id="attach-file"><span>📄</span> <span id="lbl-file">ملف</span></div>
</div>

<!-- VOICE -->
<div id="rec-overlay">
  <div id="rec-pulse">🎤</div>
  <div id="rec-dur">0:00</div>
  <button id="rec-cancel">❌ إلغاء</button>
</div>

<!-- IMAGE EXPAND -->
<div id="img-overlay" onclick="closeImg()">
  <button id="img-overlay-close" onclick="closeImg()">✕</button>
  <img id="img-overlay-img" src="" alt="">
</div>

<!-- USER SHEET -->
<div id="user-sheet">
  <div id="user-sheet-bg" onclick="closeUserSheet()"></div>
  <div id="user-sheet-card">
    <img class="usheet-avatar" id="us-avatar" src="" alt="" onerror="this.style.display='none'">
    <div class="usheet-name" id="us-name"></div>
    <div class="usheet-btns">
      <button class="usheet-btn primary" onclick="goPrivateChat()">💬 <span id="lbl-priv">محادثة خاصة</span></button>
      <button class="usheet-btn secondary" onclick="closeUserSheet()"><span id="lbl-close">إغلاق</span></button>
    </div>
  </div>
</div>

<!-- FILE INPUTS -->
<input type="file" id="fi-img"  accept="image/*" style="display:none">
<input type="file" id="fi-file" accept="*/*"     style="display:none">

<script>
// ══════════════════════════════════════
// PARAMS
// ══════════════════════════════════════
const params  = new URLSearchParams(location.search);
const uid     = params.get('uid')  || '';
const lang    = params.get('lang') || 'ar';
const gtype   = params.get('type') || 'room';   // 'room' | 'store'
const gid     = params.get('id')   || '';
const isRTL   = lang === 'ar';
document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
document.documentElement.lang = lang;

const T = {
  ar: {
    loading:'جارٍ التحميل…', empty:'لا توجد رسائل بعد\nكن أول من يبدأ المحادثة!',
    members:'عضو', followers:'متابع', live:'مباشر',
    nm_title:'غير مصرح', nm_txt:'يجب أن تكون عضواً في هذه الغرفة للمشاركة في الدردشة.',
    nm_txt_store:'يجب أن تكون متابعاً لهذا المتجر للمشاركة في الدردشة.',
    priv_chat:'💬 محادثة خاصة', close:'إغلاق',
    img_lbl:'صورة', file_lbl:'ملف', placeholder:'اكتب رسالة…',
    new_msgs:'⬇ رسائل جديدة', today:'اليوم', yesterday:'أمس',
    no_mic:'لا يمكن الوصول للميكروفون',
    room_icon:'🏠', store_icon:'🏪',
  },
  en: {
    loading:'Loading…', empty:'No messages yet\nBe the first to start the chat!',
    members:'members', followers:'followers', live:'Live',
    nm_title:'Access Denied', nm_txt:'You must be a member of this room to chat.',
    nm_txt_store:'You must follow this store to chat.',
    priv_chat:'💬 Private Chat', close:'Close',
    img_lbl:'Image', file_lbl:'File', placeholder:'Type a message…',
    new_msgs:'⬇ New messages', today:'Today', yesterday:'Yesterday',
    no_mic:'Cannot access microphone',
    room_icon:'🏠', store_icon:'🏪',
  }
}[lang] || {loading:'…',members:'',followers:'',live:'',nm_title:'',nm_txt:'',nm_txt_store:'',priv_chat:'',close:'',img_lbl:'',file_lbl:'',placeholder:'',new_msgs:'',today:'',yesterday:'',room_icon:'🏠',store_icon:'🏪'};

// Apply translations
document.getElementById('empty-txt').textContent    = T.empty;
document.getElementById('nm-title').textContent     = T.nm_title;
document.getElementById('nm-txt').textContent       = gtype === 'store' ? T.nm_txt_store : T.nm_txt;
document.getElementById('lbl-img').textContent      = T.img_lbl;
document.getElementById('lbl-file').textContent     = T.file_lbl;
document.getElementById('lbl-priv').textContent     = T.priv_chat;
document.getElementById('lbl-close').textContent    = T.close;
document.getElementById('msg-input').placeholder    = T.placeholder;
document.getElementById('scroll-btn').textContent   = T.new_msgs;
document.getElementById('hdr-icon').textContent     = gtype === 'store' ? T.store_icon : T.room_icon;

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let lastId = 0, myDbId = null, pollTimer = null;
let isAtBottom = true, isMember = false;
let mediaRecorder = null, audioChunks = [], isRecording = false;
let recInterval = null, recSeconds = 0, recCancelled = false;
let sheetTgId = null;

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
async function init() {
  await loadGroupInfo();
  await loadMessages(true);
  startPolling();
}

async function loadGroupInfo() {
  try {
    const r = await fetch(`/api/chat/group/info?uid=${uid}&type=${gtype}&id=${gid}`).then(r=>r.json());
    if (!r.ok) { showNotMember(); return; }
    isMember = r.is_member;
    document.getElementById('hdr-name').textContent = r.name || (gtype === 'room' ? '🏠' : '🏪');
    const cnt = r.member_count || 0;
    const unit = gtype === 'store' ? T.followers : T.members;
    document.getElementById('hdr-sub').textContent = `${cnt} ${unit}`;
    document.getElementById('hdr-status').classList.add('live');
    if (!isMember) showNotMember();
  } catch(e) { console.error(e); }
}

function showNotMember() {
  isMember = false;
  document.getElementById('msgs-wrap').style.display    = 'none';
  document.getElementById('input-bar').style.display    = 'none';
  document.getElementById('not-member').style.display   = 'flex';
}

// ══════════════════════════════════════
// POLLING
// ══════════════════════════════════════
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => loadMessages(false), 3000);
}

// ══════════════════════════════════════
// SCROLL
// ══════════════════════════════════════
const wrap = document.getElementById('msgs-wrap');
wrap.addEventListener('scroll', () => {
  isAtBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 60;
  if (isAtBottom) document.getElementById('scroll-btn').style.display = 'none';
});
function scrollToBottom() {
  wrap.scrollTop = wrap.scrollHeight;
  document.getElementById('scroll-btn').style.display = 'none';
  isAtBottom = true;
}

// ══════════════════════════════════════
// LOAD MESSAGES
// ══════════════════════════════════════
async function loadMessages(reset) {
  if (reset) {
    lastId = 0;
    wrap.innerHTML = '<div id="loading-msgs" style="text-align:center;padding:30px;color:var(--sub);font-size:13px">⏳ ' + T.loading + '</div>';
  }
  if (!uid || !gid) return;
  try {
    const r = await fetch(`/api/chat/group/messages?uid=${uid}&type=${gtype}&id=${gid}&last_id=${lastId}`).then(r=>r.json());
    if (!r.ok) return;
    if (r.my_db_id) myDbId = r.my_db_id;

    if (reset) {
      wrap.innerHTML = '';
      if (!r.messages || r.messages.length === 0) {
        wrap.innerHTML = '<div id="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1;color:var(--sub);text-align:center;padding:40px 20px"><div style="font-size:52px;opacity:.35">💬</div><p style="font-size:13px;line-height:1.7">' + T.empty.replace('\n','<br>') + '</p></div>';
        return;
      }
    }

    let lastDate = '';
    (r.messages || []).forEach(m => {
      if (document.getElementById(`msg-${m.id}`)) { if (m.id > lastId) lastId = m.id; return; }
      const d = fmtDate(m.created_at);
      if (d !== lastDate) {
        lastDate = d;
        const div = document.createElement('div');
        div.className = 'date-divider'; div.textContent = d;
        wrap.appendChild(div);
      }
      wrap.appendChild(buildMsgEl(m));
      if (m.id > lastId) lastId = m.id;
    });

    if (reset || isAtBottom) scrollToBottom();
    else if (r.messages && r.messages.length > 0) {
      document.getElementById('scroll-btn').style.display = 'block';
    }
  } catch(e) { console.error(e); }
}

// ══════════════════════════════════════
// BUILD MSG ELEMENT
// ══════════════════════════════════════
function esc(s){ return String(s||'').replace(/'/g,'&apos;').replace(/"/g,'&quot;'); }
function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString(lang === 'ar' ? 'ar-SA' : 'en-US', {hour:'2-digit',minute:'2-digit'});
}
function fmtDate(iso) {
  const d = new Date(iso); const now = new Date();
  const today = now.toDateString(); const yest = new Date(now - 86400000).toDateString();
  if (d.toDateString() === today) return T.today;
  if (d.toDateString() === yest)  return T.yesterday;
  return d.toLocaleDateString(lang === 'ar' ? 'ar-SA' : 'en-US');
}
function fmtDur(s){ const m=Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; }

function buildMsgEl(m) {
  const row = document.createElement('div');
  row.id = `msg-${m.id}`;
  row.className = `msg-row ${m.is_mine ? 'mine' : 'other'}`;

  const avatarEl = m.sender_photo
    ? `<img class="msg-avatar" src="${m.sender_photo}" alt="" onerror="this.parentNode.querySelector('.msg-avatar-ph')&&(this.style.display='none')"
           onclick="openUserSheet('${m.sender_tg_id}','${esc(m.sender_name)}','${esc(m.sender_photo||'')}')">` 
    : `<div class="msg-avatar-ph" onclick="openUserSheet('${m.sender_tg_id}','${esc(m.sender_name)}','')">👤</div>`;

  let bubbleContent = '';
  if (m.msg_type === 'image' && m.file_url) {
    bubbleContent = `<img class="bubble-img" src="${m.file_url}" alt="" onclick="openImg('${m.file_url}')" onerror="this.style.display='none'">`;
  } else if (m.msg_type === 'voice' && m.file_url) {
    const dur = m.duration || 0;
    const bars = Array.from({length:20},(_,i)=>`<div class="voice-bar" style="height:${6+Math.sin(i*0.8)*8+5}px"></div>`).join('');
    bubbleContent = `<div class="voice-bubble"><button class="voice-play" onclick="playVoice(this,'${m.file_url}')">▶</button><div class="voice-bars">${bars}</div><span class="voice-dur">${fmtDur(dur)}</span></div>`;
  } else if (m.msg_type === 'file' && m.file_url) {
    bubbleContent = `<div class="file-bubble" onclick="window.open('${m.file_url}','_blank')"><span class="file-ico">📄</span><div class="file-info"><div class="file-name">${esc(m.file_name||'file')}</div><div class="file-dl">⬇ تحميل</div></div></div>`;
  } else {
    bubbleContent = esc(m.content || '').replace(/\n/g,'<br>');
  }

  const nameHtml = m.is_mine ? '' : `<span class="meta-name" onclick="openUserSheet('${m.sender_tg_id}','${esc(m.sender_name)}','')">${esc(m.sender_name)}</span>`;
  row.innerHTML = `
    ${avatarEl}
    <div class="bubble-wrap">
      <div class="bubble-meta">${nameHtml}</div>
      <div class="bubble">${bubbleContent}<div class="bubble-time">${fmtTime(m.created_at)}</div></div>
    </div>`;
  return row;
}

// ══════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════
const inp    = document.getElementById('msg-input');
const sendBt = document.getElementById('send-btn');

inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  sendBt.textContent = this.value.trim() ? '➤' : '🎤';
  sendBt.classList.toggle('mic-mode', !this.value.trim());
});
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextMsg(); } });

sendBt.addEventListener('click', () => {
  if (inp.value.trim()) { sendTextMsg(); return; }
  startRecording();
});

async function sendTextMsg() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  sendBt.textContent = '🎤'; sendBt.classList.add('mic-mode');
  await sendMsg({ uid, content: text, msg_type: 'text' });
}

async function sendMsg(payload) {
  payload.type = gtype; payload.id = gid;
  try {
    const r = await fetch('/api/chat/group/send', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).then(r=>r.json());
    if (r.ok) loadMessages(false);
  } catch(e) { console.error(e); }
}

// ══════════════════════════════════════
// VOICE
// ══════════════════════════════════════
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks = []; recCancelled = false;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      if (recCancelled || audioChunks.length===0) return;
      const blob = new Blob(audioChunks, {type:'audio/webm'});
      await uploadAndSend(blob, 'voice.webm', 'voice', recSeconds);
    };
    mediaRecorder.start(200); isRecording = true; recSeconds = 0;
    document.getElementById('rec-overlay').style.display = 'flex';
    recInterval = setInterval(() => {
      recSeconds++;
      const m=String(Math.floor(recSeconds/60)).padStart(1,'0'), s=String(recSeconds%60).padStart(2,'0');
      document.getElementById('rec-dur').textContent = `${m}:${s}`;
    }, 1000);
  } catch(err) { alert(T.no_mic); }
}
function stopRecording(cancel) {
  if (!isRecording) return; isRecording=false; recCancelled=cancel;
  clearInterval(recInterval); document.getElementById('rec-overlay').style.display='none';
  if (mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
}
document.getElementById('rec-cancel').onclick = () => stopRecording(true);

// ══════════════════════════════════════
// FILE UPLOAD
// ══════════════════════════════════════
async function handleFileUpload(file, type) { if (!file) return; await uploadAndSend(file, file.name, type, null); }
async function uploadAndSend(blob, name, type, dur) {
  const fd = new FormData();
  fd.append('uid', uid);
  fd.append('file_type', type==='image'?'image':type==='voice'?'voice':'file');
  fd.append('file', blob, name);
  try {
    const res = await fetch('/api/chat/upload', {method:'POST',body:fd}).then(r=>r.json());
    if (!res.ok) { alert(res.error); return; }
    const payload = {uid, content:'', msg_type:type, file_url:res.file_url, file_name:res.file_name};
    if (dur) payload.duration = dur;
    await sendMsg(payload);
  } catch(e) { console.error(e); }
}

// ══════════════════════════════════════
// VOICE PLAY
// ══════════════════════════════════════
let curAudio = null;
function playVoice(btn, url) {
  if (curAudio) { curAudio.pause(); curAudio = null; }
  const a = new Audio(url); curAudio = a;
  a.play(); btn.textContent = '⏸';
  a.onended = () => { btn.textContent = '▶'; curAudio = null; };
}

function openUserSheet(tgId, name, photo) {
  if (!tgId || tgId === uid) return;
  sheetTgId = tgId;
  document.getElementById('us-name').textContent = name || '?';
  const av = document.getElementById('us-avatar');
  if (photo) { av.src = photo; av.style.display=''; } else { av.style.display='none'; }
  document.getElementById('user-sheet').style.display = 'block';
}
function closeUserSheet() { document.getElementById('user-sheet').style.display='none'; sheetTgId=null; }
function goPrivateChat() {
  if (!sheetTgId) return;
  closeUserSheet();
  const url = `/private-chat?uid=${uid}&other_uid=${sheetTgId}&lang=${lang}`;
  if (window.Telegram?.WebApp?.openLink) window.Telegram.WebApp.openLink(url);
  else window.open(url,'_blank');
}
