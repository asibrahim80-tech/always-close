<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Always Close – Stores</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100vh}

    /* ── Header ── */
    #header{position:sticky;top:0;z-index:100;background:#fff;padding:14px 16px 10px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    #header h1{font-size:18px;font-weight:700;color:#111;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    #header h1 span{color:#e67e22}

    /* ── Sort chips ── */
    #sort-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:8px}
    #sort-row::-webkit-scrollbar{display:none}
    .sort-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#f7f7f7;font-size:12.5px;cursor:pointer;font-weight:500;color:#555;transition:all .15s;white-space:nowrap}
    .sort-chip.active{background:#e67e22;border-color:#e67e22;color:#fff}
    .sort-chip:active{opacity:.75}

    /* ── Filter row ── */
    #filter-row{display:flex;gap:8px;align-items:center}
    #filter-row select{flex:1;padding:7px 10px;border-radius:10px;border:1.5px solid #e0e0e0;font-size:13px;background:#fafafa;color:#333;outline:none}
    #filter-row select:focus{border-color:#e67e22}

    /* ── Nature filter ── */
    #nature-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-top:8px}
    #nature-row::-webkit-scrollbar{display:none}
    .nat-chip{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1.5px solid #ddd;background:#f7f7f7;font-size:12px;cursor:pointer;font-weight:500;color:#555;transition:all .15s;white-space:nowrap}
    .nat-chip.active{background:#e67e22;border-color:#e67e22;color:#fff}

    /* ── Stats bar ── */
    #stats-bar{background:#fef6ee;border-radius:10px;padding:7px 12px;margin-top:8px;font-size:12px;color:#b7600a;font-weight:600;display:none}

    /* ── Loading ── */
    #loading{text-align:center;padding:50px 20px;color:#999;font-size:14px}
    .spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#e67e22;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Store list ── */
    #list{padding:10px 12px;display:flex;flex-direction:column;gap:12px}

    /* ── Store card ── */
    .scard{background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden}

    /* ── Store banner ── */
    .store-banner{position:relative;width:100%;height:130px;overflow:hidden;background:linear-gradient(135deg,#e67e22 0%,#d35400 50%,#c0392b 100%);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .store-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .store-banner-icon{font-size:52px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
    .store-banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.5))}
    .store-banner-camera{position:absolute;bottom:8px;right:10px;background:rgba(255,255,255,.85);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:#333;display:flex;align-items:center;gap:4px}
    .store-banner-del-img{position:absolute;bottom:8px;left:10px;background:rgba(231,76,60,.85);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:#fff;cursor:pointer}

    /* ── Card body ── */
    .scard-body{padding:12px 14px 0}
    .scard-name-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
    .scard-name{font-size:16px;font-weight:700;color:#111;flex:1;word-break:break-word}
    .badge-new{background:#27ae60;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}

    /* ── Badges ── */
    .scard-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .badge{border-radius:10px;padding:3px 9px;font-size:12px;font-weight:500}
    .badge.dist{background:#fdf0ef;color:#e74c3c}
    .badge.mem{background:#fef6ee;color:#e67e22}
    .badge.time{background:#eaf3fb;color:#2980b9}
    .badge.nat{background:#fef9e7;color:#b7770d;border:1px solid #f9e79f}
    .badge.purp{background:#f5eef8;color:#7d3c98;border:1px solid #d7bde2;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── Star display ── */
    .star-display{display:flex;align-items:center;gap:6px;margin-bottom:8px}
    .star-bar-wrap{position:relative;display:inline-block;font-size:16px;line-height:1;letter-spacing:1px}
    .star-bar-back{color:#ddd}
    .star-bar-front{position:absolute;top:0;left:0;overflow:hidden;white-space:nowrap;color:#f39c12}
    .star-val{font-size:15px;font-weight:700;color:#333}
    .star-cnt{font-size:12px;color:#999}
    .no-ratings{font-size:12px;color:#bbb;font-style:italic}

    /* ── Interactive rating widget ── */
    .rate-section{padding:0 14px 10px}
    .rate-label{font-size:12px;color:#888;margin-bottom:5px}
    .rate-stars{display:flex;gap:4px}
    .rate-star{font-size:26px;color:#ddd;cursor:pointer;transition:color .1s,transform .1s;user-select:none;-webkit-user-select:none}
    .rate-star.on{color:#f39c12}
    .rate-star.hover{color:#f5c842}
    .rate-star:active{transform:scale(1.2)}

    /* ── Follower dots ── */
    .member-bar{display:flex;align-items:center;gap:4px;padding:0 0 8px}
    .member-dot{width:8px;height:8px;border-radius:50%;background:#e67e22;opacity:.6}
    .member-count-label{font-size:11px;color:#aaa;margin-left:4px}

    /* ── Occ bar ── */
    .occ-bar-wrap{padding:0 0 8px}
    .occ-bar-bg{height:4px;background:#eee;border-radius:4px;overflow:hidden}
    .occ-bar-fill{height:100%;background:linear-gradient(90deg,#e67e22,#c0392b);border-radius:4px;transition:width .4s}

    /* ── Actions ── */
    .scard-actions{display:flex;flex-wrap:wrap;gap:7px;padding:0 14px 12px}
    .act-btn{flex:1;min-width:0;padding:9px 10px;border-radius:11px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .1s,transform .08s}
    .act-btn:active{opacity:.7;transform:scale(.97)}
    .act-btn.map{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
    .act-btn.follow{background:linear-gradient(135deg,#e67e22,#d35400);color:#fff}
    .act-btn.following{background:#e8f8f0;color:#27ae60;border:1.5px solid #a9dfbf;cursor:default}
    .act-btn.del{background:#fdf0ef;color:#e74c3c;border:1.5px solid #fadbd8}
    .act-btn.rate-members{background:#fef6ee;color:#e67e22;border:1.5px solid #fce0b0;flex:0 0 auto;padding:9px 14px}

    /* ── Divider ── */
    .scard-div{height:1px;background:#f0f0f0;margin:0 14px}

    /* ── No results ── */
    #no-results{text-align:center;padding:40px 20px;color:#aaa;font-size:14px;display:none}
    #no-results .ico{font-size:40px;margin-bottom:8px}

    /* ── Toast ── */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;border-radius:20px;padding:9px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── Members modal ── */
    #members-modal{position:fixed;inset:0;z-index:500;display:none}
    #modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
    #modal-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;max-height:80vh;overflow-y:auto;padding:0 0 30px}
    #modal-panel.open{animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    #modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:1}
    #modal-title{font-size:16px;font-weight:700;color:#111}
    #modal-close{font-size:22px;color:#999;cursor:pointer;padding:4px}
    .member-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #f8f8f8}
    .member-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#e0e0e0,#ccc);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#888;flex-shrink:0;overflow:hidden}
    .member-av img{width:100%;height:100%;object-fit:cover}
    .member-info{flex:1;min-width:0}
    .member-name{font-size:14px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .member-avg{font-size:11px;color:#f39c12;margin-top:2px}
    .member-rate-stars{display:flex;gap:3px;margin-top:5px}
    .member-rate-star{font-size:22px;color:#ddd;cursor:pointer;transition:color .1s}
    .member-rate-star.on{color:#f39c12}
    #modal-empty{text-align:center;padding:30px;color:#bbb;font-size:14px}
    .modal-spinner{width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#e67e22;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}

    /* ── RTL ── */
    body.rtl{direction:rtl}
    body.rtl .store-banner-camera{right:auto;left:10px}
    body.rtl .store-banner-del-img{left:auto;right:10px}
    body.rtl .member-count-label{margin-left:0;margin-right:4px}
    body.rtl .star-bar-front{left:auto;right:0}

    /* ── Edit modal ── */
    #edit-modal{position:fixed;inset:0;z-index:700;display:none}
    #edit-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.52)}
    #edit-panel{
      position:absolute;bottom:0;left:0;right:0;background:#fff;
      border-radius:22px 22px 0 0;padding:20px 16px 36px;
      max-height:90vh;overflow-y:auto;
    }
    #edit-panel.open{animation:slideUpE .3s ease}
    @keyframes slideUpE{from{transform:translateY(100%)}to{transform:translateY(0)}}
    #edit-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    #edit-modal-title{font-size:16px;font-weight:800;color:#111}
    #edit-modal-close{font-size:22px;color:#aaa;cursor:pointer;padding:4px;line-height:1}
    .ef-label{font-size:12px;font-weight:700;color:#555;margin-bottom:5px;display:block}
    .ef-input{
      width:100%;box-sizing:border-box;padding:11px 13px;
      border:1.5px solid #ddd;border-radius:12px;font-size:14px;
      margin-bottom:12px;outline:none;font-family:inherit;transition:border-color .15s;
    }
    .ef-input:focus{border-color:#e67e22}
    .ef-char{font-size:11px;color:#bbb;text-align:right;margin-top:-10px;margin-bottom:10px}
    #edit-save-btn{
      width:100%;padding:13px;background:linear-gradient(135deg,#e67e22,#c0392b);
      color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;
      cursor:pointer;transition:opacity .15s;
    }
    #edit-save-btn:disabled{opacity:.5}

    /* ── Catalog modal (orange theme) ── */
    #cat-modal{position:fixed;inset:0;z-index:600;display:none}
    #cat-modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
    #cat-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;max-height:90vh;display:flex;flex-direction:column}
    #cat-panel.open{animation:slideUp .3s ease}
    #cat-header{padding:14px 16px 0;border-bottom:1px solid #f0f0f0;flex-shrink:0;background:#fff;border-radius:22px 22px 0 0}
    #cat-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    #cat-title{font-size:16px;font-weight:700;color:#111}
    #cat-close{font-size:22px;color:#999;cursor:pointer;padding:4px;line-height:1}
    #cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
    #cat-tabs::-webkit-scrollbar{display:none}
    .cat-tab{flex-shrink:0;padding:6px 14px;border-radius:18px;border:1.5px solid #ddd;background:#f7f7f7;font-size:12px;font-weight:600;cursor:pointer;color:#555;white-space:nowrap;transition:all .15s}
    .cat-tab.active{background:#e67e22;border-color:#e67e22;color:#fff}
    #cat-body{overflow-y:auto;padding:10px 14px 30px;flex:1}
    #cat-add-btn{width:100%;padding:11px;border-radius:12px;border:2px dashed #f5cba7;background:#fef9f4;color:#e67e22;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px}
    #cat-add-btn:active{background:#fdebd0}
    #cat-form{background:#fef9f4;border-radius:14px;padding:14px;margin-bottom:14px;display:none}
    #cat-form input,#cat-form textarea,#cat-form select{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #e0e0e0;font-size:13px;color:#333;background:#fff;outline:none;margin-bottom:8px;box-sizing:border-box}
    #cat-form input:focus,#cat-form textarea:focus,#cat-form select:focus{border-color:#e67e22}
    #cat-form textarea{min-height:68px;resize:vertical}
    #cat-form-row{display:flex;gap:8px}
    #cat-form-row input{flex:1;margin-bottom:0}
    #cat-save-btn{background:linear-gradient(135deg,#e67e22,#d35400);color:#fff;border:none;border-radius:11px;padding:10px;width:100%;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
    #cat-save-btn:active{opacity:.8}
    .cat-item{background:#fff;border-radius:14px;border:1px solid #fde8d8;box-shadow:0 1px 6px rgba(230,126,34,.07);margin-bottom:10px;overflow:hidden}
    .cat-item-img{width:100%;height:130px;object-fit:cover;display:block;background:#fef3e8}
    .cat-item-body{padding:10px 12px}
    .cat-item-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
    .cat-item-title{font-size:14px;font-weight:700;color:#111;flex:1}
    .cat-item-price{font-size:13px;font-weight:700;color:#e67e22;white-space:nowrap}
    .cat-item-desc{font-size:12px;color:#666;line-height:1.5;margin-bottom:6px}
    .cat-item-extra{font-size:12px;color:#555;display:flex;align-items:center;gap:6px;margin-bottom:3px}
    .cat-item-del{background:#fdf0ef;color:#e74c3c;border:1px solid #fadbd8;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
    .cat-item-del:active{opacity:.7}
    .cat-empty{text-align:center;padding:30px;color:#bbb;font-size:14px}
    .cat-spinner{width:26px;height:26px;border:3px solid #e0e0e0;border-top-color:#e67e22;border-radius:50%;animation:spin .7s linear infinite;margin:20px auto}
  </style>
</head>
<body>

<div id="header">
  <h1>🏪 <span id="title-text">Stores List</span></h1>
  <div id="sort-row">
    <button class="sort-chip active" data-sort="distance" id="chip-dist">📍 Closest</button>
    <button class="sort-chip"        data-sort="followers" id="chip-fol">👥 Popular</button>
    <button class="sort-chip"        data-sort="rating"    id="chip-rat">⭐ Top Rated</button>
    <button class="sort-chip"        data-sort="newest"    id="chip-new">🕒 Newest</button>
  </div>
  <div id="filter-row">
    <select id="sel-dist">
      <option value="">Any Distance</option>
      <option value="0.5">≤ 500 m</option>
      <option value="1">≤ 1 km</option>
      <option value="5">≤ 5 km</option>
      <option value="10">≤ 10 km</option>
      <option value="50">≤ 50 km</option>
    </select>
  </div>
  <div id="nature-row">
    <button class="nat-chip active" data-nat="">🏪 All</button>
    <button class="nat-chip" data-nat="grocery">🛒</button>
    <button class="nat-chip" data-nat="food">🍔</button>
    <button class="nat-chip" data-nat="clothing">👕</button>
    <button class="nat-chip" data-nat="electronics">📱</button>
    <button class="nat-chip" data-nat="beauty">💄</button>
    <button class="nat-chip" data-nat="services">🔧</button>
    <button class="nat-chip" data-nat="other">📦</button>
  </div>
  <div id="stats-bar"></div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-lbl">Loading…</div></div>
<div id="list" style="display:none"></div>
<div id="no-results"><div class="ico">🏪</div><div id="no-res-lbl">No stores found</div></div>
<div id="toast"></div>
<input type="file" id="img-input" accept="image/*" style="display:none">

<!-- ── Edit modal (creator only) ── -->
<div id="edit-modal">
  <div id="edit-modal-bg"></div>
  <div id="edit-panel">
    <div id="edit-hdr">
      <span id="edit-modal-title"></span>
      <span id="edit-modal-close">✕</span>
    </div>
    <label class="ef-label" id="ef-name-label"></label>
    <input  class="ef-input" id="ef-name" type="text" maxlength="60">
    <div class="ef-char" id="ef-name-char">0/60</div>
    <label class="ef-label" id="ef-purpose-label"></label>
    <input  class="ef-input" id="ef-purpose" type="text" maxlength="120">
    <label class="ef-label" id="ef-nature-label"></label>
    <input  class="ef-input" id="ef-nature" type="text" maxlength="60">
    <button id="edit-save-btn"></button>
  </div>
</div>

<!-- ── Catalog modal ── -->
<div id="cat-modal">
  <div id="cat-modal-bg"></div>
  <div id="cat-panel">
    <div id="cat-header">
      <div id="cat-title-row">
        <span id="cat-title">📋 Catalog</span>
        <span id="cat-close">✕</span>
      </div>
      <div id="cat-tabs"></div>
    </div>
    <div id="cat-body"></div>
  </div>
</div>

<!-- Members rating modal -->
<div id="members-modal">
  <div id="modal-bg"></div>
  <div id="modal-panel">
    <div id="modal-header">
      <span id="modal-title">Rate Followers</span>
      <span id="modal-close">✕</span>
    </div>
    <div id="modal-body"><div style="text-align:center;padding:30px"><div class="modal-spinner"></div></div></div>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

  }[lang] || {};

  // Apply header
  document.getElementById('title-text').textContent  = T.title;
  document.getElementById('chip-dist').textContent   = T.sort_dist;
  document.getElementById('chip-fol').textContent    = T.sort_fol;
  document.getElementById('chip-rat').textContent    = T.sort_rat;
  document.getElementById('chip-new').textContent    = T.sort_new;
  document.getElementById('loading-lbl').textContent = T.loading;
  document.getElementById('no-res-lbl').textContent  = T.no_res;
  document.getElementById('modal-title').textContent = T.modal_title;

  // Nature filter labels
  const natLabels = {
    '':           T.nat_all,
    'grocery':    T.nat_grocery,
    'food':       T.nat_food,
    'clothing':   T.nat_clothing,
    'electronics':T.nat_electronics,
    'beauty':     T.nat_beauty,
    'services':   T.nat_services,
    'other':      T.nat_other,
  };
  document.querySelectorAll('.nat-chip').forEach(c => {
    c.textContent = natLabels[c.dataset.nat] || c.textContent;
  });

  const selDist = document.getElementById('sel-dist');
  selDist.options[0].text = T.any_dist; selDist.options[1].text = T.d05;
  selDist.options[2].text = T.d1;       selDist.options[3].text = T.d5;
  selDist.options[4].text = T.d10;      selDist.options[5].text = T.d50;

  let allStores  = [];
  let activeSort = 'distance';
  let activeNat  = '';
  let uploadTargetStoreId = null;

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const d = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (d < 60) return T.ago_now;
    if (d < 3600) return `${Math.floor(d/60)}${T.ago_min}`;
    if (d < 86400) return `${Math.floor(d/3600)}${T.ago_hr}`;
    return `${Math.floor(d/86400)}${T.ago_day}`;
  }
  function isNew(iso) { return iso && (Date.now() - new Date(iso)) < 3600000; }

  function openMap() {
    const url = `${mapBase || location.origin}/map?uid=${uid}&lang=${lang}`;
    if (window.Telegram?.WebApp?.openLink) Telegram.WebApp.openLink(url);
    else window.open(url, '_blank');
  }

  const ICONS = ['🏪','🛍️','🛒','🏬','🛕','🎯','🎪','🏆','🌟','💎'];
  function storeIcon(id) { return ICONS[(id || 0) % ICONS.length]; }

  // ── Star display ──
  function makeStarDisplay(avg, count) {
    const wrap = document.createElement('div');
    wrap.className = 'star-display';
    if (!count) {
      const empty = document.createElement('span');
      empty.className = 'no-ratings'; empty.textContent = T.no_ratings;
      wrap.appendChild(empty); return wrap;
    }
    const pct = Math.round((avg / 5) * 100);
    const bw = document.createElement('span'); bw.className = 'star-bar-wrap';
    bw.innerHTML = `<span class="star-bar-back">★★★★★</span><span class="star-bar-front" style="width:${pct}%">★★★★★</span>`;
    wrap.appendChild(bw);
    const vEl = document.createElement('span'); vEl.className = 'star-val'; vEl.textContent = avg.toFixed(1); wrap.appendChild(vEl);
    const cEl = document.createElement('span'); cEl.className = 'star-cnt'; cEl.textContent = `(${count})`; wrap.appendChild(cEl);
    return wrap;
  }

  // ── Rating widget ──
  function makeRatingWidget(cur, onRate) {
    const wrap = document.createElement('div'); wrap.className = 'rate-stars';
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'rate-star' + (i <= cur ? ' on' : '');
      star.textContent = '★';
      const ci = i;
      star.addEventListener('mouseenter', () => wrap.querySelectorAll('.rate-star').forEach((s,idx) => s.classList.toggle('hover', idx < ci)));
      star.addEventListener('mouseleave', () => wrap.querySelectorAll('.rate-star').forEach(s => s.classList.remove('hover')));
      star.addEventListener('click', () => { wrap.querySelectorAll('.rate-star').forEach((s,idx) => s.classList.toggle('on', idx < ci)); onRate(ci); });
      wrap.appendChild(star);
    }
    return wrap;
  }

  // ── Follow ──
  async function followStore(storeId, btnEl) {
    btnEl.disabled = true;
    try {
      const res  = await fetch('/api/store/join', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), store_id: storeId})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(data.already ? T.follow_already : T.follow_ok);
        btnEl.className = 'act-btn following';
        btnEl.textContent = T.btn_following;
        btnEl.disabled = true;
        const store = allStores.find(s => s.id === storeId);
        if (store && !data.already) { store.is_member = true; store.members += 1; }
      } else { showToast(T.follow_err); btnEl.disabled = false; }
    } catch(e) { showToast(T.follow_err); btnEl.disabled = false; }
  }

  // ── Delete ──
  async function deleteStore(storeId, cardEl) {
    if (!confirm(T.del_confirm)) return;
    try {
      const res  = await fetch('/api/store/delete', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), store_id: storeId})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(T.del_ok);
        cardEl.style.transition = 'opacity .3s,transform .3s';
        cardEl.style.opacity = '0'; cardEl.style.transform = 'scale(.95)';
        setTimeout(() => { cardEl.remove(); allStores = allStores.filter(s => s.id !== storeId); }, 320);
      } else if (data.error === 'has_members') { showToast(T.del_err_members); }
      else { showToast(T.del_err); }
    } catch(e) { showToast(T.del_err); }
  }

  // ── Rate store ──
  async function rateStore(storeId, rating, displayEl) {
    try {
      const res  = await fetch('/api/store/rate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), store_id: storeId, rating})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(T.rate_ok);
        if (displayEl) { const nd = makeStarDisplay(data.avg_rating, data.rating_count); displayEl.replaceWith(nd); }
        const store = allStores.find(s => s.id === storeId);
        if (store) { store.avg_rating = data.avg_rating; store.rating_count = data.rating_count; store.my_rating = rating; }
      } else { showToast(T.rate_err); }
    } catch(e) { showToast(T.rate_err); }
  }

  // ── Image upload ──
  const imgInput = document.getElementById('img-input');
  imgInput.addEventListener('change', async () => {
    const file = imgInput.files[0];
    if (!file || !uploadTargetStoreId) return;
    const card = document.querySelector(`[data-store-id="${uploadTargetStoreId}"]`);
    if (card) card.querySelector('.store-banner').style.opacity = '.5';
    const formData = new FormData();
    formData.append('uid', uid); formData.append('store_id', uploadTargetStoreId); formData.append('image', file);
    try {
      const res  = await fetch('/api/store/image/upload', {method:'POST', body: formData});
      const data = await res.json();
      if (data.ok) {
        showToast(T.img_ok);
        const store = allStores.find(s => s.id === uploadTargetStoreId);
        if (store) { store.image_url = data.image_url + '?t=' + Date.now(); refreshCardBanner(card, store); }
      } else { showToast(T.img_err); }
    } catch(e) { showToast(T.img_err); }
    if (card) card.querySelector('.store-banner').style.opacity = '1';
    imgInput.value = ''; uploadTargetStoreId = null;
  });

  function triggerImageUpload(storeId) { uploadTargetStoreId = storeId; imgInput.click(); }

  async function deleteStoreImage(storeId, card) {
    if (!confirm(T.img_del_confirm)) return;
    try {
      const res  = await fetch('/api/store/image/delete', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), store_id: storeId})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(T.img_del_ok);
        const store = allStores.find(s => s.id === storeId);
        if (store) { store.image_url = ''; refreshCardBanner(card, store); }
      }
    } catch(e) {}
  }

  function refreshCardBanner(card, store) {
    if (!card) return;
    const banner = card.querySelector('.store-banner');
    if (!banner) return;
    const img  = banner.querySelector('img');
    const cam  = banner.querySelector('.store-banner-camera');
    const delI = banner.querySelector('.store-banner-del-img');
    if (store.image_url) {
      if (img) img.src = store.image_url;
      else { const ni = document.createElement('img'); ni.src = store.image_url; banner.insertBefore(ni, banner.firstChild); }
      if (cam) cam.textContent = '📷 ' + T.btn_change_img;
      if (delI) delI.style.display = 'flex';
    } else {
      if (img) img.remove();
      if (cam) cam.textContent = '📷 ' + T.btn_add_img;
      if (delI) delI.style.display = 'none';
    }
  }

  // ── Members Modal ──
  const modal    = document.getElementById('members-modal');
  const modalBody = document.getElementById('modal-body');
  document.getElementById('modal-bg').addEventListener('click', () => modal.style.display = 'none');
  document.getElementById('modal-close').addEventListener('click', () => modal.style.display = 'none');

  async function openMembersModal(storeId) {
    modal.style.display = 'block';
    modalBody.innerHTML = '<div style="text-align:center;padding:30px"><div class="modal-spinner"></div></div>';
    try {
      const res  = await fetch(`/api/store/${storeId}/members/${uid}`);
      const data = await res.json();
      const members = data.members || [];
      if (!members.length) { modalBody.innerHTML = `<div id="modal-empty">${T.modal_empty}</div>`; return; }
      modalBody.innerHTML = '';
      members.forEach(m => {
        const item = document.createElement('div'); item.className = 'member-item';
        const av = document.createElement('div'); av.className = 'member-av';
        if (m.photo_url) { const img = document.createElement('img'); img.src = m.photo_url; img.onerror = () => { img.style.display='none'; av.textContent = (m.username||'?')[0].toUpperCase(); }; av.appendChild(img); }
        else av.textContent = (m.username || '?')[0].toUpperCase();
        item.appendChild(av);
        const info = document.createElement('div'); info.className = 'member-info';
        const name = document.createElement('div'); name.className = 'member-name'; name.textContent = `@${m.username}`; info.appendChild(name);
        if (m.rating_count > 0) {
          const avgEl = document.createElement('div'); avgEl.className = 'member-avg';
          const pct = Math.round((m.avg_rating / 5) * 100);
          avgEl.innerHTML = `<span style="position:relative;display:inline-block;font-size:13px"><span style="color:#ddd">★★★★★</span><span style="position:absolute;top:0;left:0;overflow:hidden;width:${pct}%;white-space:nowrap;color:#f39c12">★★★★★</span></span> ${m.avg_rating.toFixed(1)} (${m.rating_count})`;
          info.appendChild(avgEl);
        }
        const starsRow = document.createElement('div'); starsRow.className = 'member-rate-stars';
        for (let i = 1; i <= 5; i++) {
          const star = document.createElement('span');
          star.className = 'member-rate-star' + (i <= m.my_rating ? ' on' : '');
          star.textContent = '★'; const ci = i;
          star.addEventListener('click', async () => {
            starsRow.querySelectorAll('.member-rate-star').forEach((s,idx) => s.classList.toggle('on', idx < ci));
            try { const r = await fetch('/api/user/rate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:parseInt(uid),target_id:m.user_id,rating:ci})}); const d = await r.json(); if(d.ok) showToast(T.member_rate_ok); } catch(e) {}
          });
          starsRow.appendChild(star);
        }
        info.appendChild(starsRow); item.appendChild(info); modalBody.appendChild(item);
      });
    } catch(e) { modalBody.innerHTML = `<div id="modal-empty">${T.modal_empty}</div>`; }
  }

  // ── Nature filter matching ──
  const NATURE_MAP = {
    grocery:     ['🛒 بقالة','🛒 Grocery'],
    food:        ['🍔 مطعم / طعام','🍔 Restaurant / Food'],
    clothing:    ['👕 ملابس','👕 Clothing'],
    electronics: ['📱 إلكترونيات','📱 Electronics'],
    beauty:      ['💄 جمال وعناية','💄 Beauty & Care'],
    services:    ['🔧 خدمات','🔧 Services'],
    other:       ['📦 أخرى','📦 Other'],
  };

  function matchNat(storeNature, filter) {
    if (!filter) return true;
    const allowed = NATURE_MAP[filter] || [];
    return allowed.some(n => storeNature.includes(n.split(' ').pop()));
  }

  // ── Render ──
  function render() {
    const distLimit = selDist.value ? parseFloat(selDist.value) : null;
    let filtered = allStores.filter(s => {
      if (distLimit !== null && s.distance != null && s.distance > distLimit) return false;
      if (activeNat && !matchNat(s.nature, activeNat)) return false;
      return true;
    });

    if (activeSort === 'distance')   filtered.sort((a,b) => (a.distance ?? 9999) - (b.distance ?? 9999));
    else if (activeSort === 'followers') filtered.sort((a,b) => b.members - a.members);
    else if (activeSort === 'rating')    filtered.sort((a,b) => (b.avg_rating||0) - (a.avg_rating||0));
    else if (activeSort === 'newest')    filtered.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));

    const listEl   = document.getElementById('list');
    const noRes    = document.getElementById('no-results');
    const statsBar = document.getElementById('stats-bar');
    listEl.innerHTML = '';

    if (!filtered.length) {
      listEl.style.display = 'none'; noRes.style.display = 'block'; statsBar.style.display = 'none'; return;
    }
    noRes.style.display = 'none'; listEl.style.display = 'flex';
    statsBar.style.display = 'block'; statsBar.textContent = T.stats(filtered.length);

    const maxM = Math.max(...filtered.map(x => x.members), 1);

    filtered.forEach(s => {
      const card = document.createElement('div');
      card.className = 'scard'; card.setAttribute('data-store-id', s.id);

      // Banner
      const banner = document.createElement('div'); banner.className = 'store-banner';
      if (s.image_url) { const img = document.createElement('img'); img.src = s.image_url; img.onerror = () => img.remove(); banner.appendChild(img); }
      const overlay = document.createElement('div'); overlay.className = 'store-banner-overlay'; banner.appendChild(overlay);
      const iconEl = document.createElement('div'); iconEl.className = 'store-banner-icon'; iconEl.textContent = storeIcon(s.id); banner.appendChild(iconEl);
      if (s.is_creator) {
        const cam = document.createElement('div'); cam.className = 'store-banner-camera';
        cam.textContent = '📷 ' + (s.image_url ? T.btn_change_img : T.btn_add_img);
        cam.addEventListener('click', e => { e.stopPropagation(); triggerImageUpload(s.id); }); banner.appendChild(cam);
        if (s.image_url) {
          const di = document.createElement('div'); di.className = 'store-banner-del-img'; di.textContent = T.btn_del_img;
          di.addEventListener('click', e => { e.stopPropagation(); deleteStoreImage(s.id, card); }); banner.appendChild(di);
        }
      }
      card.appendChild(banner);

      // Body
      const body = document.createElement('div'); body.className = 'scard-body';
      const nameRow = document.createElement('div'); nameRow.className = 'scard-name-row';
      const nameEl = document.createElement('div'); nameEl.className = 'scard-name'; nameEl.textContent = s.name || 'Store'; nameRow.appendChild(nameEl);
      if (isNew(s.created_at)) { const nb = document.createElement('span'); nb.className = 'badge-new'; nb.textContent = T.new_badge; nameRow.appendChild(nb); }
      body.appendChild(nameRow);

      // Badges
      const badges = document.createElement('div'); badges.className = 'scard-badges';
      if (s.distance != null) { const b = document.createElement('span'); b.className = 'badge dist'; b.textContent = `📍 ${s.distance} ${T.km}`; badges.appendChild(b); }
      const mb = document.createElement('span'); mb.className = 'badge mem'; mb.textContent = `🔔 ${s.members} ${T.followers}`; badges.appendChild(mb);
      if (!isNew(s.created_at) && s.created_at) { const tb = document.createElement('span'); tb.className = 'badge time'; tb.textContent = `🕒 ${timeAgo(s.created_at)}`; badges.appendChild(tb); }
      if (s.nature) { const nb = document.createElement('span'); nb.className = 'badge nat'; nb.textContent = s.nature; badges.appendChild(nb); }
      if (s.purpose) { const pb = document.createElement('span'); pb.className = 'badge purp'; pb.title = s.purpose; pb.textContent = `📝 ${s.purpose}`; badges.appendChild(pb); }
      if (s.expires_at) {
        const exp = new Date(s.expires_at); const daysLeft = Math.ceil((exp - Date.now()) / 86400000);
        const eb = document.createElement('span'); eb.className = 'badge';
        if (daysLeft <= 0) { eb.style.cssText = 'background:#fdf0ef;color:#e74c3c'; eb.textContent = `⚠️ ${isAr ? 'منتهي' : 'Expired'}`; }
        else if (daysLeft <= 1) { eb.style.cssText = 'background:#fff3e0;color:#e67e22'; eb.textContent = `⏳ ${isAr ? 'ينتهي اليوم' : 'Expires today'}`; }
        else { eb.style.cssText = 'background:#eaf3fb;color:#2980b9'; eb.textContent = `⏳ ${daysLeft}${isAr ? ' أيام' : 'd'}`; }
        badges.appendChild(eb);
      }
      body.appendChild(badges);

      // Stars display
      const starDisp = makeStarDisplay(s.avg_rating || 0, s.rating_count || 0); body.appendChild(starDisp);

      // Follower dots
      if (s.members > 0) {
        const bar = document.createElement('div'); bar.className = 'member-bar';
        const dc = Math.min(s.members, 14);
        for (let i = 0; i < dc; i++) { const d = document.createElement('div'); d.className = 'member-dot'; bar.appendChild(d); }
        if (s.members > 14) { const lbl = document.createElement('span'); lbl.className = 'member-count-label'; lbl.textContent = `+${s.members - 14}`; bar.appendChild(lbl); }
        body.appendChild(bar);
      }

      // Occ bar
      const occWrap = document.createElement('div'); occWrap.className = 'occ-bar-wrap';
      const occBg   = document.createElement('div'); occBg.className   = 'occ-bar-bg';
      const occFill = document.createElement('div'); occFill.className = 'occ-bar-fill';
      occFill.style.width = `${Math.min(100, (s.members / maxM) * 100)}%`;
      occBg.appendChild(occFill); occWrap.appendChild(occBg); body.appendChild(occWrap);
      card.appendChild(body);

      // Divider + Actions
      const div1 = document.createElement('div'); div1.className = 'scard-div'; card.appendChild(div1);
      const actions = document.createElement('div'); actions.className = 'scard-actions';

      const btnMap = document.createElement('button'); btnMap.className = 'act-btn map'; btnMap.textContent = T.btn_map;
      btnMap.addEventListener('click', openMap); actions.appendChild(btnMap);

      if (s.is_member) {
        const bf = document.createElement('button'); bf.className = 'act-btn following'; bf.textContent = T.btn_following; bf.disabled = true; actions.appendChild(bf);
        // Chat button — opens group chat for this store
        const bc = document.createElement('button');
        bc.style.cssText = 'flex:0 0 auto;padding:9px 14px;border-radius:11px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0088cc,#006aad);color:#fff;display:flex;align-items:center;gap:5px;transition:opacity .1s';
        bc.textContent = T.btn_chat;
        bc.addEventListener('click', async () => {
          bc.disabled = true;
          bc.style.opacity = '0.6';
          try {
            await fetch('/api/chat/store/join', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({uid: uid, store_id: s.id})
            });
          } catch(e) {}
          if (window.Telegram?.WebApp?.close) window.Telegram.WebApp.close();
        });
        actions.appendChild(bc);
      } else {
        const bf = document.createElement('button'); bf.className = 'act-btn follow'; bf.textContent = T.btn_follow;
        bf.addEventListener('click', () => followStore(s.id, bf)); actions.appendChild(bf);
      }

      if (s.is_creator && s.members <= 1) {
        const bd = document.createElement('button'); bd.className = 'act-btn del'; bd.style.cssText = 'flex:0 0 auto;padding:9px 14px'; bd.textContent = T.btn_delete;
        bd.addEventListener('click', () => deleteStore(s.id, card)); actions.appendChild(bd);
      }

      if (s.is_creator && s.members > 1) {
        const brm = document.createElement('button'); brm.className = 'act-btn rate-members'; brm.textContent = T.btn_rate_followers;
        brm.addEventListener('click', () => openMembersModal(s.id)); actions.appendChild(brm);
      }

      // Catalog button (all users)
      const bcat = document.createElement('button');
      bcat.className = 'act-btn rate-members';
      bcat.style.cssText = 'background:#fef3e8;color:#e67e22;border:1.5px solid #f5cba7;flex:0 0 auto;padding:9px 14px';
      bcat.textContent = T.btn_catalog || '📋';
      bcat.addEventListener('click', () => openCatalog('store', s.id, s.name, s.is_creator));
      actions.appendChild(bcat);

      // Edit button — creator only
      if (s.is_creator) {
        const bedit = document.createElement('button');
        bedit.className = 'act-btn';
        bedit.style.cssText = 'background:#f0fdf4;color:#16a34a;border:1.5px solid #86efac;flex:0 0 auto;padding:9px 14px;font-weight:700';
        bedit.textContent = T.btn_edit || '✏️';
        bedit.addEventListener('click', () => openEditModal('store', s.id, s.name, s.purpose, s.nature, nameEl));
        actions.appendChild(bedit);
      }

      card.appendChild(actions);

      // Divider + Rating strip
      const div2 = document.createElement('div'); div2.className = 'scard-div'; card.appendChild(div2);
      const rateSection = document.createElement('div'); rateSection.className = 'rate-section';
      const rateLabel = document.createElement('div'); rateLabel.className = 'rate-label'; rateLabel.textContent = T.rate_label; rateSection.appendChild(rateLabel);
      const widget = makeRatingWidget(s.my_rating || 0, async (val) => { await rateStore(s.id, val, starDisp); });
      rateSection.appendChild(widget); card.appendChild(rateSection);

      listEl.appendChild(card);
    });
  }

  // Sort chips
  document.querySelectorAll('.sort-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active'); activeSort = chip.dataset.sort; render();
    });
  });
  // Nature chips
  document.querySelectorAll('.nat-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.nat-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active'); activeNat = chip.dataset.nat; render();
    });
  });
  selDist.addEventListener('change', render);

  // Fetch & auto-refresh
  let firstLoad = true;
  function loadData() {
    fetch(`/api/stores/${uid}`)
      .then(r => r.json())
      .then(data => {
        if (firstLoad) { document.getElementById('loading').style.display = 'none'; firstLoad = false; }
        if (data.error && !data.stores?.length) {
          document.getElementById('no-res-lbl').textContent = data.error;
          document.getElementById('no-results').style.display = 'block'; return;
        }
        allStores = data.stores || [];
        render();
      })
      .catch(() => {
        if (firstLoad) { document.getElementById('loading').style.display = 'none'; firstLoad = false; }
        document.getElementById('no-res-lbl').textContent = T.err;
        document.getElementById('no-results').style.display = 'block';
      });
  }
  loadData();
  setInterval(loadData, 5000);

  // ══════════════════════════════════════════════════════════════════════
  //  CATALOG SYSTEM (store)
  // ══════════════════════════════════════════════════════════════════════
  const CAT_CATS  = ['product','menu_food','menu_drink','clothing','accessory','other','contact','hours'];
  const catModal  = document.getElementById('cat-modal');
  const catPanel  = document.getElementById('cat-panel');
  const catClose  = document.getElementById('cat-close');
  const catTitle  = document.getElementById('cat-title');
  const catTabs   = document.getElementById('cat-tabs');
  const catBody   = document.getElementById('cat-body');

  let _catEntityType = '';
  let _catEntityId   = 0;
  let _catIsOwner    = false;
  let _catActiveCat  = CAT_CATS[0];
  let _catAllItems   = [];
  let _catImgInput   = null;
  let _catPendingImg = null;

  catClose.addEventListener('click', closeCatalog);
  document.getElementById('cat-modal-bg').addEventListener('click', closeCatalog);

  function closeCatalog() { catModal.style.display = 'none'; }

  function openCatalog(entityType, entityId, name, isOwner) {
    _catEntityType = entityType;
    _catEntityId   = entityId;
    _catIsOwner    = isOwner;
    _catActiveCat  = CAT_CATS[0];
    catTitle.textContent = `📋 ${name}`;
    catModal.style.display = 'block';
    catPanel.classList.remove('open');
    void catPanel.offsetWidth;
    catPanel.classList.add('open');
    buildCatTabs();
    loadCatalog();
  }

  function buildCatTabs() {
    catTabs.innerHTML = '';
    CAT_CATS.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-tab' + (cat === _catActiveCat ? ' active' : '');
      btn.textContent = (T.cat_tabs || {})[cat] || cat;
      btn.addEventListener('click', () => {
        _catActiveCat = cat;
        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCatalogItems();
      });
      catTabs.appendChild(btn);
    });
  }

  function loadCatalog() {
    catBody.innerHTML = `<div class="cat-spinner"></div>`;
    fetch(`/api/catalog/${_catEntityType}/${_catEntityId}`)
      .then(r => r.json())
      .then(data => { _catAllItems = data.items || []; renderCatalogItems(); })
      .catch(() => { catBody.innerHTML = `<div class="cat-empty">${T.cat_err}</div>`; });
  }

  function renderCatalogItems() {
    catBody.innerHTML = '';
    if (_catIsOwner) {
      const addBtn = document.createElement('button');
      addBtn.id = 'cat-add-btn'; addBtn.textContent = T.cat_add;
      addBtn.addEventListener('click', () => {
        const f = document.getElementById('cat-form');
        if (f) f.style.display = f.style.display === 'none' ? 'block' : 'none';
      });
      catBody.appendChild(addBtn);
      catBody.appendChild(buildAddForm());
    }
    const filtered = _catAllItems.filter(it => it.category === _catActiveCat);
    if (!filtered.length) {
      const empty = document.createElement('div'); empty.className = 'cat-empty';
      empty.textContent = T.cat_empty; catBody.appendChild(empty); return;
    }
    filtered.forEach(it => catBody.appendChild(buildCatItem(it)));
  }

  function buildAddForm() {
    const form = document.createElement('div'); form.id = 'cat-form'; form.style.display = 'none';
    const catSel = document.createElement('select');
    CAT_CATS.forEach(c => {
      const o = document.createElement('option'); o.value = c;
      o.textContent = (T.cat_tabs || {})[c] || c;
      if (c === _catActiveCat) o.selected = true;
      catSel.appendChild(o);
    });
    form.appendChild(catSel);

    const inp = (ph, type='text') => {
      const el = document.createElement(type === 'textarea' ? 'textarea' : 'input');
      if (type !== 'textarea') el.type = type; el.placeholder = ph; return el;
    };
    const fTitle = inp(T.cat_ph_title);
    const fDesc  = inp(T.cat_ph_desc, 'textarea');
    const fRow   = document.createElement('div'); fRow.id = 'cat-form-row';
    const fPrice = inp(T.cat_ph_price, 'number'); fPrice.min = '0'; fPrice.step = '0.01';
    const fCur   = inp(T.cat_ph_cur);   fCur.value = 'SAR'; fCur.style.width = '80px';
    fRow.appendChild(fPrice); fRow.appendChild(fCur);
    const fPhone = inp(T.cat_ph_phone);
    const fWeb   = inp(T.cat_ph_web);
    const fHours = inp(T.cat_ph_hours);
    [fTitle, fDesc, fRow, fPhone, fWeb, fHours].forEach(el => form.appendChild(el));

    const saveBtn = document.createElement('button'); saveBtn.id = 'cat-save-btn';
    saveBtn.textContent = T.cat_save;
    saveBtn.addEventListener('click', async () => {
      const title = fTitle.value.trim();
      if (!title) { showToast(T.cat_ph_title); return; }
      saveBtn.disabled = true;
      try {
        const res = await fetch('/api/catalog/add', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            uid, entity_type:_catEntityType, entity_id:_catEntityId,
            category:catSel.value, title, description:fDesc.value.trim(),
            price:fPrice.value||null, currency:fCur.value.trim()||'SAR',
            phone:fPhone.value.trim(), website:fWeb.value.trim(), hours:fHours.value.trim()
          })
        }).then(r=>r.json());
        if (res.ok) {
          showToast(T.cat_add_ok); _catActiveCat = catSel.value;
          buildCatTabs(); loadCatalog(); form.style.display = 'none';
          [fTitle,fDesc,fPrice,fPhone,fWeb,fHours].forEach(el => el.value='');
        } else showToast(T.cat_err);
      } catch(e) { showToast(T.cat_err); }
      saveBtn.disabled = false;
    });
    form.appendChild(saveBtn);
    return form;
  }

  function buildCatItem(it) {
    const el = document.createElement('div'); el.className = 'cat-item';
    if (it.image_url) {
      const img = document.createElement('img'); img.className = 'cat-item-img';
      img.src = it.image_url; img.onerror = () => img.remove(); el.appendChild(img);
    }
    const body = document.createElement('div'); body.className = 'cat-item-body';
    const top = document.createElement('div'); top.className = 'cat-item-top';
    const ttl = document.createElement('div'); ttl.className = 'cat-item-title'; ttl.textContent = it.title;
    top.appendChild(ttl);
    if (it.price != null) {
      const pr = document.createElement('div'); pr.className = 'cat-item-price';
      pr.textContent = `${parseFloat(it.price).toLocaleString()} ${it.currency||'SAR'}`; top.appendChild(pr);
    }
    body.appendChild(top);
    if (it.description) { const ds = document.createElement('div'); ds.className='cat-item-desc'; ds.textContent=it.description; body.appendChild(ds); }
    const ex = (icon, txt) => { const d=document.createElement('div');d.className='cat-item-extra';d.textContent=`${icon} ${txt}`;body.appendChild(d); };
    if (it.hours) ex('🕐', it.hours);
    if (it.phone) ex('📞', it.phone);
    if (it.website) ex('🌐', it.website);
    if (_catIsOwner) {
      const row = document.createElement('div'); row.style.cssText='display:flex;gap:7px;margin-top:8px;flex-wrap:wrap';
      const delBtn = document.createElement('button'); delBtn.className='cat-item-del';
      delBtn.textContent='🗑️ '+(lang==='ar'?'حذف':'Delete');
      delBtn.addEventListener('click', async () => {
        if (!confirm(T.cat_del_confirm)) return;
        const r=await fetch('/api/catalog/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid,id:it.id})}).then(r=>r.json());
        if(r.ok){showToast(T.cat_del_ok);loadCatalog();}else showToast(T.cat_err);
      });
      row.appendChild(delBtn);
      const imgBtn=document.createElement('button');imgBtn.className='cat-item-del';
      imgBtn.style.cssText='background:#eaf3fb;color:#2980b9;border-color:#aed6f1';
      imgBtn.textContent='📷 '+(lang==='ar'?'صورة':'Photo');
      imgBtn.addEventListener('click',()=>{
        _catPendingImg=it.id;
        if(!_catImgInput){_catImgInput=document.createElement('input');_catImgInput.type='file';_catImgInput.accept='image/*';_catImgInput.style.display='none';document.body.appendChild(_catImgInput);_catImgInput.addEventListener('change',uploadCatImage);}
        _catImgInput.value='';_catImgInput.click();
      });
      row.appendChild(imgBtn);
      body.appendChild(row);
    }
    el.appendChild(body);
    return el;
  }

  async function uploadCatImage() {
    if(!_catImgInput||!_catPendingImg)return;
    const file=_catImgInput.files[0]; if(!file)return;
    const fd=new FormData();fd.append('uid',uid);fd.append('id',_catPendingImg);fd.append('image',file);
    try{const r=await fetch('/api/catalog/image/upload',{method:'POST',body:fd}).then(r=>r.json());
      if(r.ok){showToast('✅');loadCatalog();}else showToast(T.cat_err);}catch{showToast(T.cat_err);}
  }

  // ══════════════════════════════════════════════════════════════════════
  // EDIT MODAL — creator only (stores)
  // ══════════════════════════════════════════════════════════════════════
  const _emModal    = document.getElementById('edit-modal');
  const _emPanel    = document.getElementById('edit-panel');
  const _emTitle    = document.getElementById('edit-modal-title');
  const _emName     = document.getElementById('ef-name');
  const _emNameChar = document.getElementById('ef-name-char');
  const _emPurpose  = document.getElementById('ef-purpose');
  const _emNature   = document.getElementById('ef-nature');
  const _emSave     = document.getElementById('edit-save-btn');
  let _emEntityType = 'store';
  let _emEntityId   = 0;
  let _emNameEl     = null;

  document.getElementById('edit-modal-close').addEventListener('click', () => _emModal.style.display='none');
  document.getElementById('edit-modal-bg').addEventListener('click', () => _emModal.style.display='none');
  _emName.addEventListener('input', () => { _emNameChar.textContent = `${_emName.value.length}/60`; });

  function openEditModal(entityType, entityId, name, purpose, nature, nameEl) {
    _emEntityType = entityType; _emEntityId = entityId; _emNameEl = nameEl;
    document.getElementById('ef-name-label').textContent    = T.edit_name    || 'Name';
    document.getElementById('ef-purpose-label').textContent = T.edit_purpose || 'Purpose';
    document.getElementById('ef-nature-label').textContent  = T.edit_nature  || 'Nature';
    _emTitle.textContent = T.edit_title || '✏️ Edit';
    _emSave.textContent  = T.edit_save  || '💾 Save';
    _emName.value = name || ''; _emPurpose.value = purpose || ''; _emNature.value = nature || '';
    _emNameChar.textContent = `${_emName.value.length}/60`;
    _emName.style.borderColor = '';
    _emModal.style.display = 'block';
    _emPanel.classList.remove('open'); void _emPanel.offsetWidth; _emPanel.classList.add('open');
    setTimeout(() => _emName.focus(), 320);
  }

  _emSave.addEventListener('click', async () => {
    const name = _emName.value.trim();
    if (!name) { _emName.style.borderColor = '#e74c3c'; _emName.focus(); return; }
    _emName.style.borderColor = '';
    _emSave.disabled = true; _emSave.textContent = '⏳';
    try {
      const res = await fetch('/api/entity/edit', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ uid, entity_type:_emEntityType, entity_id:_emEntityId,
          name, purpose:_emPurpose.value.trim(), nature:_emNature.value.trim() })
      }).then(r=>r.json());
      if (res.ok) {
        _emSave.textContent = T.edit_ok || '✅';
        if (_emNameEl) _emNameEl.textContent = name;
        setTimeout(() => { _emModal.style.display='none'; loadData(); _emSave.disabled=false; _emSave.textContent=T.edit_save||'💾 Save'; }, 700);
      } else {
        _emSave.textContent = T.edit_err || '❌';
        setTimeout(() => { _emSave.disabled=false; _emSave.textContent=T.edit_save||'💾 Save'; }, 1500);
      }
    } catch { _emSave.textContent=T.edit_err||'❌'; setTimeout(()=>{ _emSave.disabled=false; _emSave.textContent=T.edit_save||'💾 Save'; },1500); }
  });
</script>
</body>
</html>
