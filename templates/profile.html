<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Always Close – Profile</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --pr:#6C5CE7;--pk:#fd79a8;--gr:#00b894;--or:#e17055;
      --bg:#f5f6fa;--card:#fff;--text:#2d3436;--sub:#636e72;
      --brd:#dfe6e9;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}
    body.rtl{direction:rtl}

    /* ── HEADER ── */
    #top-header{
      background:linear-gradient(135deg,#6C5CE7 0%,#a29bfe 50%,#fd79a8 100%);
      padding:20px 16px 0;position:sticky;top:0;z-index:200;
      box-shadow:0 2px 16px rgba(108,92,231,.35);
    }
    #hdr-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    #hdr-avatar-wrap{position:relative;flex-shrink:0}
    #hdr-avatar{width:58px;height:58px;border-radius:50%;object-fit:cover;
      border:3px solid rgba(255,255,255,.6);display:block}
    #hdr-avatar-ph{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.25);
      display:flex;align-items:center;justify-content:center;font-size:24px;
      border:3px solid rgba(255,255,255,.4);flex-shrink:0}
    #hdr-avatar-edit{
      position:absolute;bottom:-2px;right:-2px;
      background:#fff;border-radius:50%;width:20px;height:20px;
      display:flex;align-items:center;justify-content:center;font-size:11px;
      box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;
    }
    body.rtl #hdr-avatar-edit{right:auto;left:-2px}
    #hdr-info{flex:1;min-width:0}
    #hdr-name{font-size:16px;font-weight:800;color:#fff;margin-bottom:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #hdr-handle{font-size:12px;color:rgba(255,255,255,.7)}
    #hdr-complete-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px}
    #hdr-complete-label{font-size:11px;color:rgba(255,255,255,.8);flex-shrink:0}
    #hdr-complete-bar{flex:1;height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
    #hdr-complete-fill{height:100%;border-radius:3px;
      background:linear-gradient(90deg,#55efc4,#00b894);
      transition:width .5s ease}
    #hdr-complete-pct{font-size:11px;font-weight:700;color:#fff;flex-shrink:0}

    /* ── TABS ── */
    #tab-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
      background:rgba(255,255,255,.12);border-radius:12px 12px 0 0;
      padding:4px 4px 0;}
    #tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{
      flex-shrink:0;padding:8px 14px;border:none;background:transparent;
      color:rgba(255,255,255,.65);font-size:12px;font-weight:600;
      border-radius:10px 10px 0 0;cursor:pointer;transition:all .2s;
      white-space:nowrap;
    }
    .tab-btn.active{background:#fff;color:var(--pr)}

    /* ── SECTIONS ── */
    .section{display:none;padding:14px 12px 0}
    .section.active{display:block}

    /* ── CARD ── */
    .pcard{background:var(--card);border-radius:16px;
      box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden}
    .pcard-hdr{
      display:flex;align-items:center;gap:8px;
      padding:12px 14px;border-bottom:1px solid var(--brd);
    }
    .pcard-hdr-icon{font-size:18px}
    .pcard-hdr-title{font-size:13px;font-weight:700;color:var(--text)}
    .pcard-body{padding:12px 14px}

    /* ── INPUT ── */
    .f-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;display:block;letter-spacing:.3px}
    .f-input{
      width:100%;padding:11px 13px;border:1.5px solid var(--brd);
      border-radius:12px;font-size:14px;color:var(--text);
      background:#fafafa;outline:none;transition:border-color .15s;
      font-family:inherit;margin-bottom:12px;
    }
    .f-input:focus{border-color:var(--pr);background:#fff}
    .f-input::placeholder{color:#b2bec3}
    .f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .f-row .f-input{margin-bottom:0}
    .f-select{
      width:100%;padding:11px 13px;border:1.5px solid var(--brd);
      border-radius:12px;font-size:14px;color:var(--text);
      background:#fafafa;outline:none;font-family:inherit;margin-bottom:12px;
      appearance:none;-webkit-appearance:none;cursor:pointer;
    }
    .f-select:focus{border-color:var(--pr)}
    .f-textarea{
      width:100%;padding:11px 13px;border:1.5px solid var(--brd);
      border-radius:12px;font-size:14px;color:var(--text);
      background:#fafafa;outline:none;font-family:inherit;
      resize:none;min-height:90px;line-height:1.5;margin-bottom:4px;
      transition:border-color .15s;
    }
    .f-textarea:focus{border-color:var(--pr);background:#fff}
    .f-char{font-size:11px;color:#b2bec3;text-align:right;margin-bottom:10px}
    body.rtl .f-char{text-align:left}

    /* ── CHIPS ── */
    .chip-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 12px}
    .chip{
      padding:7px 14px;border-radius:20px;border:1.5px solid var(--brd);
      background:#f7f8fa;font-size:13px;color:var(--sub);
      cursor:pointer;transition:all .15s;font-weight:500;
      user-select:none;
    }
    .chip:active{transform:scale(.95)}
    .chip.sel-purple{background:var(--pr);border-color:var(--pr);color:#fff}
    .chip.sel-pink  {background:var(--pk);border-color:var(--pk);color:#fff}
    .chip.sel-green {background:var(--gr);border-color:var(--gr);color:#fff}
    .chip.sel-orange{background:var(--or);border-color:var(--or);color:#fff}

    /* Single-select chips (radio) */
    .chip.radio{border-radius:10px}
    .chip.radio.active{background:var(--pr);border-color:var(--pr);color:#fff}

    /* ── TOGGLE ROW ── */
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0 12px}
    .toggle-label{font-size:14px;color:var(--text);font-weight:500}
    .toggle{position:relative;width:46px;height:26px;background:var(--brd);
      border-radius:13px;cursor:pointer;transition:background .2s;flex-shrink:0}
    .toggle.on{background:var(--pr)}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;
      width:20px;height:20px;border-radius:50%;background:#fff;
      transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .toggle.on::after{left:23px}

    /* ── PHOTOS SECTION ── */
    #photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .photo-slot{
      aspect-ratio:1;border-radius:14px;overflow:hidden;position:relative;
      background:var(--bg);border:2px dashed var(--brd);
      display:flex;align-items:center;justify-content:center;cursor:pointer;
    }
    .photo-slot img{width:100%;height:100%;object-fit:cover;display:block}
    .photo-slot.has-photo{border-style:solid;border-color:transparent}
    .photo-slot-icon{font-size:26px;color:#b2bec3}
    .photo-slot-del{
      position:absolute;top:5px;right:5px;
      background:rgba(231,76,60,.85);color:#fff;
      border-radius:50%;width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;cursor:pointer;z-index:2;
    }
    body.rtl .photo-slot-del{right:auto;left:5px}
    .photo-main-badge{
      position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
      background:rgba(108,92,231,.85);color:#fff;
      border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;
    }

    /* ── RATING DISPLAY ── */
    #rating-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;
      background:#f8f4ff;border-radius:12px;padding:10px 12px}
    .stars-disp{color:#f39c12;font-size:16px}
    .rating-val{font-size:18px;font-weight:800;color:var(--pr)}
    .rating-cnt{font-size:12px;color:var(--sub)}

    /* ── ZODIAC PICKER ── */
    .zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .zodiac-chip{
      border:1.5px solid var(--brd);border-radius:12px;
      padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;
      background:#f7f8fa;
    }
    .zodiac-chip.active{background:var(--pr);border-color:var(--pr);color:#fff}
    .zodiac-sign{font-size:20px;display:block;margin-bottom:2px}
    .zodiac-name{font-size:10px;font-weight:600;color:var(--sub)}
    .zodiac-chip.active .zodiac-name{color:rgba(255,255,255,.85)}

    /* ── PRIVACY ACTION CARDS ── */
    .priv-card{
      background:var(--card);border-radius:16px;
      box-shadow:0 1px 6px rgba(0,0,0,.07);
      margin-bottom:12px;overflow:hidden;
    }
    .priv-card-hdr{
      display:flex;align-items:center;gap:10px;
      padding:14px 16px;border-bottom:1px solid var(--brd);
    }
    .priv-card-icon{font-size:20px}
    .priv-card-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
    .priv-card-body{padding:14px 16px}
    .priv-toggle-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 0;border-bottom:1px solid var(--brd);
    }
    .priv-toggle-row:last-child{border-bottom:none;padding-bottom:0}
    .priv-toggle-info{flex:1;padding-inline-end:12px}
    .priv-toggle-label{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
    .priv-toggle-desc{font-size:12px;color:var(--sub);line-height:1.4}
    .priv-toggle-status{
      font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;
      margin-top:4px;display:inline-block;
    }
    .priv-toggle-status.on{background:#e8f8f0;color:#00b894}
    .priv-toggle-status.off{background:#ffeef5;color:#e84393}
    .priv-edit-btn{
      display:flex;align-items:center;gap:10px;padding:12px 16px;
      cursor:pointer;transition:background .15s;border-radius:12px;
      background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(253,121,168,.08));
      border:1.5px solid rgba(108,92,231,.15);text-decoration:none;
      margin-bottom:12px;
    }
    .priv-edit-btn:active{opacity:.8}
    .priv-edit-icon{font-size:22px;flex-shrink:0}
    .priv-edit-text{flex:1}
    .priv-edit-label{font-size:14px;font-weight:700;color:var(--pr)}
    .priv-edit-sub{font-size:12px;color:var(--sub);margin-top:2px}
    .priv-edit-arrow{font-size:16px;color:var(--pr)}

    /* ── TAB BADGE ── */
    .tab-btn{position:relative}
    .tab-done{
      position:absolute;top:4px;right:4px;
      width:8px;height:8px;border-radius:50%;
      background:#00b894;display:none;
      border:1.5px solid rgba(255,255,255,.7);
    }
    .tab-btn.active .tab-done{border-color:var(--pr)}
    .tab-done.show{display:block}

    /* ── SAVE BUTTON (sticky bottom) ── */
    #save-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:300;
      background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
      padding:10px 16px 12px;border-top:1px solid var(--brd);
    }
    #save-hint{
      text-align:center;font-size:11px;color:var(--sub);
      margin-bottom:7px;
    }
    #save-row{display:flex;gap:10px;align-items:center}
    #save-btn{
      flex:1;padding:14px;
      background:linear-gradient(135deg,var(--pr),var(--pk));
      color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;
      cursor:pointer;transition:opacity .15s;
    }
    #save-btn:disabled{opacity:.5}
    #save-status{font-size:12px;color:var(--sub);text-align:center;flex-shrink:0;width:60px}

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:90px;left:12px;right:12px;
      transform:translateY(60px);
      background:#2d3436;color:#fff;border-radius:12px;padding:12px 16px;
      font-size:13px;font-weight:600;z-index:999;opacity:0;
      transition:all .3s;pointer-events:none;
      text-align:center;line-height:1.4;
    }
    #toast.show{transform:translateY(0);opacity:1}

    /* ── LOADING ── */
    #loading{text-align:center;padding:80px 20px;color:var(--sub)}
    .spinner{width:36px;height:36px;border:3px solid var(--brd);
      border-top-color:var(--pr);border-radius:50%;
      animation:spin .7s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── HIDDEN FILE INPUT ── */
    #photo-file-input{display:none}
  </style>
</head>
<body>

<!-- STICKY HEADER -->
<div id="top-header">
  <div id="hdr-row">
    <div id="hdr-avatar-wrap">
      <img id="hdr-avatar" src="" alt="" style="display:none">
      <div id="hdr-avatar-ph">👤</div>
      <div id="hdr-avatar-edit" onclick="triggerPhotoUpload(-1)" title="Change main photo">📷</div>
    </div>
    <div id="hdr-info">
      <div id="hdr-name">...</div>
      <div id="hdr-handle">@username</div>
    </div>
  </div>
  <div id="hdr-complete-row">
    <span id="hdr-complete-label"></span>
    <div id="hdr-complete-bar"><div id="hdr-complete-fill" style="width:0%"></div></div>
    <span id="hdr-complete-pct">0%</span>
  </div>
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="photos">📸<span class="tab-done" id="tdone-photos"></span></button>
    <button class="tab-btn" data-tab="basic">👤<span class="tab-done" id="tdone-basic"></span></button>
    <button class="tab-btn" data-tab="looking">❤️<span class="tab-done" id="tdone-looking"></span></button>
    <button class="tab-btn" data-tab="interests">🎯<span class="tab-done" id="tdone-interests"></span></button>
    <button class="tab-btn" data-tab="education">🎓<span class="tab-done" id="tdone-education"></span></button>
    <button class="tab-btn" data-tab="location">📍<span class="tab-done" id="tdone-location"></span></button>
    <button class="tab-btn" data-tab="privacy">🔒</button>
    <button class="tab-btn" data-tab="entities">🗂️</button>
    <button class="tab-btn" data-tab="feedback">📨</button>
  </div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-text">Loading...</div></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="photo-file-input" accept="image/*" capture="environment">

<!-- ═══════════════ SECTION: PHOTOS ═══════════════ -->
<div class="section" id="sec-photos" style="display:none">
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">📸</span><span class="pcard-hdr-title" id="lbl-photos-title"></span></div>
    <div class="pcard-body">
      <div id="photo-grid"></div>
      <div style="font-size:12px;color:var(--sub);text-align:center" id="lbl-photos-hint"></div>
    </div>
  </div>

  <!-- Rating display -->
  <div id="rating-row" style="display:none">
    <div class="stars-disp" id="rating-stars"></div>
    <div class="rating-val" id="rating-val"></div>
    <div class="rating-cnt" id="rating-cnt"></div>
  </div>
</div>

<!-- ═══════════════ SECTION: BASIC INFO (merged with contact) ═══════════════ -->
<div class="section" id="sec-basic" style="display:none">

  <!-- Required: Name -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">✍️</span><span class="pcard-hdr-title" id="lbl-name-title"></span></div>
    <div class="pcard-body">
      <div class="f-row">
        <div>
          <label class="f-label" id="lbl-first-name"></label>
          <input class="f-input" id="f-first-name" type="text" maxlength="40">
        </div>
        <div>
          <label class="f-label" id="lbl-last-name"></label>
          <input class="f-input" id="f-last-name" type="text" maxlength="40">
        </div>
      </div>
    </div>
  </div>

  <!-- Required: Contact -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">📧</span><span class="pcard-hdr-title" id="lbl-contact-title"></span></div>
    <div class="pcard-body">
      <label class="f-label" id="lbl-phone-disp"></label>
      <input class="f-input" id="f-phone" type="tel" maxlength="20" placeholder="+966…">
      <div style="font-size:11px;color:var(--sub);margin-bottom:12px" id="lbl-phone-hint"></div>
      <label class="f-label" id="lbl-email"></label>
      <input class="f-input" id="f-email" type="email" maxlength="100">
    </div>
  </div>

  <!-- Required: Gender + Birthdate -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">🎂</span><span class="pcard-hdr-title" id="lbl-bday-title"></span></div>
    <div class="pcard-body">
      <label class="f-label" id="lbl-gender"></label>
      <div class="chip-grid" id="gender-chips">
        <div class="chip radio" data-v="Male">👨 <span id="lbl-g-male"></span></div>
        <div class="chip radio" data-v="Female">👩 <span id="lbl-g-female"></span></div>
      </div>
      <label class="f-label" id="lbl-birthdate"></label>
      <input class="f-input" id="f-birthdate" type="date" max="">
      <div id="zodiac-auto-row" style="margin-bottom:8px;font-size:12px;color:var(--pr);font-weight:600"></div>
    </div>
  </div>

  <!-- Optional: Bio -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">💬</span><span class="pcard-hdr-title" id="lbl-bio-title"></span></div>
    <div class="pcard-body">
      <label class="f-label" id="lbl-bio"></label>
      <textarea class="f-textarea" id="f-bio" maxlength="300" rows="4"></textarea>
      <div class="f-char"><span id="bio-char">0</span>/300</div>
    </div>
  </div>

  <!-- Zodiac -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">⭐</span><span class="pcard-hdr-title" id="lbl-zodiac-title"></span></div>
    <div class="pcard-body">
      <div class="zodiac-grid" id="zodiac-grid"></div>
    </div>
  </div>

  <!-- Social Status -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">💍</span><span class="pcard-hdr-title" id="lbl-social-title"></span></div>
    <div class="pcard-body">
      <div class="chip-grid" id="social-chips"></div>
      <div class="toggle-row">
        <span class="toggle-label" id="lbl-children"></span>
        <div class="toggle" id="toggle-children"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ SECTION: LOOKING FOR ═══════════════ -->
<div class="section" id="sec-looking" style="display:none">
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">❤️</span><span class="pcard-hdr-title" id="lbl-looking-title"></span></div>
    <div class="pcard-body">
      <div id="lbl-looking-hint" style="font-size:12px;color:var(--sub);margin-bottom:12px"></div>
      <div class="chip-grid" id="purpose-chips"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ SECTION: INTERESTS ═══════════════ -->
<div class="section" id="sec-interests" style="display:none">
  <!-- Hobbies -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">🎮</span><span class="pcard-hdr-title" id="lbl-hobbies-title"></span></div>
    <div class="pcard-body">
      <div class="chip-grid" id="hobbies-chips"></div>
    </div>
  </div>

  <!-- Habits -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">🌟</span><span class="pcard-hdr-title" id="lbl-habits-title"></span></div>
    <div class="pcard-body">
      <div class="chip-grid" id="habits-chips"></div>
    </div>
  </div>

  <!-- Personality -->
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">🧠</span><span class="pcard-hdr-title" id="lbl-personality-title"></span></div>
    <div class="pcard-body">
      <div class="chip-grid" id="personality-chips"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ SECTION: EDUCATION ═══════════════ -->
<div class="section" id="sec-education" style="display:none">
  <div class="pcard">
    <div class="pcard-hdr"><span class="pcard-hdr-icon">🎓</span><span class="pcard-hdr-title" id="lbl-edu-title"></span></div>
    <div class="pcard-body">
      <label class="f-label" id="lbl-edu-level"></label>
      <select class="f-select" id="f-edu"></select>

      <label class="f-label" id="lbl-profession"></label>
      <input class="f-input" id="f-profession" type="text" maxlength="80">

      <label class="f-label" id="lbl-university"></label>
      <input class="f-input" id="f-university" type="text" maxlength="100">

      <label class="f-label" id="lbl-school"></label>
      <input class="f-input" id="f-school" type="text" maxlength="100">
    </div>
  </div>
</div>

<!-- ═══════════════ SECTION: LOCATION ═══════════════ -->
<div class="section" id="sec-location" style="display:none">
  <div class="pcard">

// BUILD CHIP LISTS
// ═══════════════════════════════════════════════════════════════
function buildChips(containerId, items, selectedArr, colorCls, isRadio) {
  const cont = document.getElementById(containerId);
  cont.innerHTML = '';
  items.forEach(item => {
    const v = typeof item === 'object' ? item.v : item;
    const l = typeof item === 'object' ? item.l : item;
    const chip = document.createElement('div');
    chip.className = 'chip' + (isRadio ? ' radio' : '');
    chip.textContent = l;
    chip.dataset.v = v;
    if (isRadio) {
      if (selectedArr[0] === v) chip.classList.add('active');
      chip.addEventListener('click', () => {
        cont.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        selectedArr[0] = v;
        calcCompletion();
      });
    } else {
      if (selectedArr.includes(v)) chip.classList.add(colorCls);
      chip.addEventListener('click', () => {
        const idx = selectedArr.indexOf(v);
        if (idx >= 0) { selectedArr.splice(idx,1); chip.classList.remove(colorCls); }
        else { selectedArr.push(v); chip.classList.add(colorCls); }
        calcCompletion();
      });
    }
    cont.appendChild(chip);
  });
}

// ZODIAC AUTO-CALCULATE FROM BIRTHDATE
// ═══════════════════════════════════════════════════════════════
function getZodiac(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const m = d.getMonth() + 1, day = d.getDate();
  if ((m===3&&day>=21)||(m===4&&day<=19)) return 'Aries';
  if ((m===4&&day>=20)||(m===5&&day<=20)) return 'Taurus';
  if ((m===5&&day>=21)||(m===6&&day<=20)) return 'Gemini';
  if ((m===6&&day>=21)||(m===7&&day<=22)) return 'Cancer';
  if ((m===7&&day>=23)||(m===8&&day<=22)) return 'Leo';
  if ((m===8&&day>=23)||(m===9&&day<=22)) return 'Virgo';
  if ((m===9&&day>=23)||(m===10&&day<=22)) return 'Libra';
  if ((m===10&&day>=23)||(m===11&&day<=21)) return 'Scorpio';
  if ((m===11&&day>=22)||(m===12&&day<=21)) return 'Sagittarius';
  if ((m===12&&day>=22)||(m===1&&day<=19)) return 'Capricorn';
  if ((m===1&&day>=20)||(m===2&&day<=18)) return 'Aquarius';
  return 'Pisces';
}

// PHOTO MANAGEMENT
// ═══════════════════════════════════════════════════════════════
let photosState = [];         // [{id, photo_url, order_num}] extra photos
let mainPhotoUrl = null;
let pendingPhotoSlot = -1;   // -1 = main photo
const fileInput = document.getElementById('photo-file-input');

function renderPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  // Slot 0 = main photo
  const slots = [{ id: -1, photo_url: mainPhotoUrl, is_main: true }, ...photosState];
  for (let i = 0; i < 9; i++) {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    if (slots[i]) {
      const s = slots[i];
      if (s.photo_url) {
        slot.classList.add('has-photo');
        const img = document.createElement('img');
        img.src = s.photo_url;
        img.onerror = () => { img.style.display='none'; slot.classList.remove('has-photo'); };
        slot.appendChild(img);
        if (s.is_main) {
          const badge = document.createElement('div');
          badge.className = 'photo-main-badge';
          badge.textContent = T.photo_main;
          slot.appendChild(badge);
        } else {
          const del = document.createElement('div');
          del.className = 'photo-slot-del';
          del.textContent = '✕';
          del.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!confirm(T.photo_del_confirm)) return;
            deleteExtraPhoto(s.id);
          });
          slot.appendChild(del);
        }
        slot.addEventListener('click', () => triggerPhotoUpload(s.is_main ? -1 : i));
      } else {
        const icon = document.createElement('div');
        icon.className = 'photo-slot-icon';
        icon.textContent = T.photo_add;
        slot.appendChild(icon);
        slot.addEventListener('click', () => triggerPhotoUpload(s.is_main ? -1 : i));
      }
    } else {
      const icon = document.createElement('div');
      icon.className = 'photo-slot-icon';
      icon.textContent = T.photo_add;
      slot.appendChild(icon);
      slot.addEventListener('click', () => triggerPhotoUpload(i));
    }
    grid.appendChild(slot);
  }
}

function triggerPhotoUpload(slotIdx) {
  pendingPhotoSlot = slotIdx;
  fileInput.value = '';
  fileInput.click();
}

fileInput.addEventListener('change', async () => {
  if (!fileInput.files.length) return;
  const file = fileInput.files[0];
  if (pendingPhotoSlot === -1) {
    // Main photo not uploaded separately — show preview (main photo set via bot)
    showToast(lang === 'ar' ? 'الصورة الرئيسية تُعدَّل عبر البوت' : 'Main photo is set via the bot');
    return;
  }
  // Upload extra photo
  const fd = new FormData();
  fd.append('uid', uid);
  fd.append('image', file);
  try {
    const res = await fetch('/api/profile/photo/add', { method:'POST', body:fd }).then(r=>r.json());
    if (res.ok) {
      photosState.push({ id: Date.now(), photo_url: res.photo_url, order_num: photosState.length });
      renderPhotoGrid();
      showToast('✅');
      // reload to get proper id
      loadProfile();
    } else {
      if (res.error === 'max_photos') showToast(T.max_photos);
      else showToast(T.save_err);
    }
  } catch { showToast(T.save_err); }
});

async function deleteExtraPhoto(photoId) {
  try {
    const res = await fetch('/api/profile/photo/delete', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ uid, photo_id: photoId })
    }).then(r=>r.json());
    if (res.ok) {
      photosState = photosState.filter(p => p.id !== photoId);
      renderPhotoGrid();
    } else showToast(T.save_err);
  } catch { showToast(T.save_err); }
}

async function loadProfile() {
  if (!uid) return;
  try {
    const res = await fetch(`/api/profile/${uid}`).then(r=>r.json());
    if (!res.ok) { showToast(res.error || '?'); return; }
    const p = res.profile;

    // Header
    const name = [p.first_name, p.last_name].filter(Boolean).join(' ') || p.username || '—';
    document.getElementById('hdr-name').textContent    = name;
    document.getElementById('hdr-handle').textContent  = p.username ? '@'+p.username : '';
    // Compute completeness from actual fields (not DB value which may be wrong type)
    // calcCompletion() will be called after all fields are populated below

    // Avatar
    mainPhotoUrl = p.photo_url || null;
    if (mainPhotoUrl) {
      const img = document.getElementById('hdr-avatar');
      img.src = mainPhotoUrl;
      img.style.display = 'block';
      document.getElementById('hdr-avatar-ph').style.display = 'none';
    }

    // Extra photos
    photosState = p.extra_photos || [];
    renderPhotoGrid();

    // Rating
    if (p.rating_count > 0) {
      const rr = document.getElementById('rating-row');
      rr.style.display = 'flex';
      document.getElementById('rating-stars').textContent = '★'.repeat(Math.round(p.rating_avg)) + '☆'.repeat(5-Math.round(p.rating_avg));
      document.getElementById('rating-val').textContent   = p.rating_avg;
      document.getElementById('rating-cnt').textContent   = `(${p.rating_count} ${lang==='ar'?'تقييم':'reviews'})`;
    }

    // Basic fields
    document.getElementById('f-first-name').value  = p.first_name  || '';
    document.getElementById('f-last-name').value   = p.last_name   || '';
    document.getElementById('f-bio').value         = p.bio         || '';
    document.getElementById('bio-char').textContent= (p.bio||'').length;
    document.getElementById('f-birthdate').value   = p.birthdate   || '';
    document.getElementById('f-email').value       = p.email       || '';
    document.getElementById('f-phone').value       = p.phone       || '';
    document.getElementById('f-profession').value  = p.profession  || '';
    document.getElementById('f-university').value  = p.university  || '';
    document.getElementById('f-school').value      = p.school      || '';
    document.getElementById('f-country').value     = p.country     || '';
    document.getElementById('f-city').value        = p.city        || '';
    document.getElementById('f-neighborhood').value= p.neighborhood|| '';

    // Zodiac auto hint
    if (p.birthdate) {
      const z = getZodiac(p.birthdate);
      if (z) {
        const info = ZODIACS.find(x=>x.v===z);
        if (info) document.getElementById('zodiac-auto-row').textContent = `${T.zodiac_auto} ${info.s} ${info.n}`;
      }
    }

    // Education
    buildEduSelect(p.education || '');

    // Gender
    buildGenderChips(p.gender || '');

    // Zodiac
    zodiacState = [p.zodiac || ''];
    buildZodiacGrid(zodiacState);

    // Social status
    socialState = [p.social_status || ''];
    buildChips('social-chips', SOCIAL_STATUS, socialState, 'sel-pink', true);

    // Has children
    hasChildren = p.has_children || false;
    const tog = document.getElementById('toggle-children');
    tog.classList.toggle('on', hasChildren);

    // Purpose
    purposeState = Array.isArray(p.purpose) ? [...p.purpose] : [];
    buildChips('purpose-chips', PURPOSES, purposeState, 'sel-pink', false);

    // Hobbies
    hobbiesState = Array.isArray(p.hobbies) ? [...p.hobbies] : [];
    buildChips('hobbies-chips', HOBBIES, hobbiesState, 'sel-purple', false);

    // Habits
    habitsState = Array.isArray(p.habits) ? [...p.habits] : [];
    buildChips('habits-chips', HABITS, habitsState, 'sel-green', false);

    // Personality
    personalityState = Array.isArray(p.personality_traits) ? [...p.personality_traits] : [];
    buildChips('personality-chips', PERSONALITY, personalityState, 'sel-orange', false);

    // Privacy state
    updatePrivacyUI(p.is_visible !== false, !!p.show_phone);

    // Show UI
    document.getElementById('loading').style.display = 'none';
    document.querySelectorAll('.section').forEach(s => { if(s.id==='sec-photos') s.classList.add('active'); });
    document.getElementById('sec-photos').style.display = 'block';
    document.getElementById('sec-photos').classList.add('active');
    document.getElementById('save-bar').style.display = 'block';

    // Initial completeness calc (after all state is loaded)
    calcCompletion();

    // Check if registration is required (first time user or missing required fields)
    const requiredMissing =
      !p.first_name || !p.last_name || !p.phone || !p.email || !p.gender || !p.birthdate;
    if (requiredMissing) {
      showRegistrationModal(p);
    }

  } catch(e) {
    console.error(e);
    showToast('Error');
  }
}

// ═══════════════════════════════════════════════════════════════
// LIVE COMPLETENESS + TAB BADGES
// ═══════════════════════════════════════════════════════════════
function calcCompletion() {
  const v = (id) => (document.getElementById(id)?.value || '').trim();

  // score fields (each = 1 point out of 12)
  const fields = [
    /* photos       */ mainPhotoUrl || photosState.length > 0,
    /* first name   */ !!v('f-first-name'),
    /* last name    */ !!v('f-last-name'),
    /* phone        */ !!v('f-phone'),
    /* email        */ !!v('f-email'),
    /* gender       */ !!genderState[0],
    /* birthdate    */ !!v('f-birthdate'),
    /* bio          */ v('f-bio').length >= 10,
    /* looking      */ purposeState.length > 0,
    /* hobbies      */ hobbiesState.length >= 2,
    /* edu          */ !!document.getElementById('f-edu')?.value,
    /* location city*/ !!v('f-city'),
  ];
  const score = Math.round((fields.filter(Boolean).length / fields.length) * 100);

  document.getElementById('hdr-complete-fill').style.width = score + '%';
  document.getElementById('hdr-complete-pct').textContent  = score + '%';

  // Update tab badges — basic tab is done when required fields are filled
  const basicDone = !!v('f-first-name') && !!v('f-last-name') &&
                    !!v('f-phone') && !!v('f-email') &&
                    !!genderState[0] && !!v('f-birthdate');
  const badges = {
    photos:    mainPhotoUrl || photosState.length > 0,
    basic:     basicDone,
    looking:   purposeState.length > 0,
    interests: hobbiesState.length >= 1,
    education: !!document.getElementById('f-edu')?.value,
    location:  !!v('f-city'),
  };
  Object.entries(badges).forEach(([tab, done]) => {
    const el = document.getElementById('tdone-' + tab);
    if (el) el.classList.toggle('show', !!done);
  });
}

  privIsVisible = isVisible;
  privShowPhone = showPhone;

  const togVis = document.getElementById('toggle-visibility');
  const togPhn = document.getElementById('toggle-phone');
  const visStatus = document.getElementById('priv-vis-status');
  const phnStatus = document.getElementById('priv-phone-status');

  // Account visibility toggle — ON means visible (not hidden)
  togVis.classList.toggle('on', isVisible);
  visStatus.textContent = isVisible ? T.priv_vis_on : T.priv_vis_off;
  visStatus.className = 'priv-toggle-status ' + (isVisible ? 'on' : 'off');

  // Phone visibility toggle
  togPhn.classList.toggle('on', showPhone);
  phnStatus.textContent = showPhone ? T.priv_phone_on : T.priv_phone_off;
  phnStatus.className = 'priv-toggle-status ' + (showPhone ? 'on' : 'off');
}

async function toggleVisibility() {
  if (!uid) return;
  try {
    const res = await fetch('/api/profile/toggle_visibility', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({uid})
    }).then(r=>r.json());
    if (res.ok) {
      updatePrivacyUI(res.is_visible, privShowPhone);
      showToast(res.is_visible
        ? (lang==='ar' ? '👁️ حسابك مرئي الآن' : '👁️ Account is now visible')
        : (lang==='ar' ? '👻 حسابك مخفي الآن' : '👻 Account is now hidden'));
    }
  } catch(e) { console.error(e); }
}

// ═══════════════════════════════════════════════════════════════
// REGISTRATION MODAL
// ═══════════════════════════════════════════════════════════════
let regGender = '';

function showRegistrationModal(profile) {
  // 1. Pre-fill from DB profile
  if (profile) {
    document.getElementById('reg-first-name').value = profile.first_name || '';
    document.getElementById('reg-last-name').value  = profile.last_name  || '';
    document.getElementById('reg-phone').value      = profile.phone      || '';
    document.getElementById('reg-email').value      = profile.email      || '';
    document.getElementById('reg-bio').value        = profile.bio        || '';
    document.getElementById('reg-birthdate').value  = profile.birthdate  || '';
    if (profile.gender) selectRegGender(profile.gender);
  }

  // 2. Fill missing fields from Telegram WebApp user data
  const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
  if (tgUser) {
    if (!document.getElementById('reg-first-name').value && tgUser.first_name)
      document.getElementById('reg-first-name').value = tgUser.first_name;
    if (!document.getElementById('reg-last-name').value && tgUser.last_name)
      document.getElementById('reg-last-name').value = tgUser.last_name;

    // Show Telegram profile photo in modal header if available
    const photoSrc = tgUser.photo_url || (profile && profile.photo_url) || null;
    const regAvatarWrap = document.getElementById('reg-tg-photo-wrap');
    if (photoSrc && regAvatarWrap) {
      document.getElementById('reg-tg-photo').src = photoSrc;
      regAvatarWrap.style.display = 'block';
      const emojiIcon = document.getElementById('reg-emoji-icon');
      if (emojiIcon) emojiIcon.style.display = 'none';
    }
  }

  document.getElementById('reg-modal').style.display = 'block';
}

function selectRegGender(val) {
  regGender = val;
  document.getElementById('reg-g-male').classList.toggle('active', val === 'Male');
  document.getElementById('reg-g-female').classList.toggle('active', val === 'Female');
}

async function submitRegistration() {
  const firstName = document.getElementById('reg-first-name').value.trim();
  const lastName  = document.getElementById('reg-last-name').value.trim();
  const phone     = document.getElementById('reg-phone').value.trim();
  const email     = document.getElementById('reg-email').value.trim();
  const birthdate = document.getElementById('reg-birthdate').value;
  const bio       = document.getElementById('reg-bio').value.trim();
  const errEl     = document.getElementById('reg-error');

  const showErr = (msg) => {
    errEl.textContent = msg;
    errEl.style.display = 'block';
    errEl.scrollIntoView({behavior:'smooth', block:'center'});
  };

  errEl.style.display = 'none';

  if (!firstName || !lastName) return showErr(T.reg_err_name);
  if (!phone) return showErr(T.reg_err_phone);
  if (!email || !email.includes('@')) return showErr(T.reg_err_email);
  if (!regGender) return showErr(T.reg_err_gender);
  if (!birthdate) return showErr(T.reg_err_bdate);

  const btn = document.getElementById('reg-submit-btn');
  btn.disabled = true;
  btn.textContent = T.saving;

  try {
    const res = await fetch('/api/profile/save', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        uid, first_name: firstName, last_name: lastName,
        phone, email, gender: regGender, birthdate, bio,
        zodiac: '', social_status: '', has_children: false,
        education: '', profession: '', university: '', school: '',
        country: '', city: '', neighborhood: '',
        hobbies: [], habits: [], personality_traits: [], purpose: [],
      })
    }).then(r=>r.json());

    if (res.ok) {
      document.getElementById('reg-modal').style.display = 'none';
      // Sync main form fields
      document.getElementById('f-first-name').value = firstName;
      document.getElementById('f-last-name').value  = lastName;
      document.getElementById('f-phone').value      = phone;
      document.getElementById('f-email').value      = email;
      document.getElementById('f-birthdate').value  = birthdate;
      document.getElementById('f-bio').value        = bio;
      buildGenderChips(regGender);
      genderState[0] = regGender;
      calcCompletion();
      showToast(lang==='ar' ? '✅ تم تسجيل بياناتك بنجاح' : '✅ Profile saved successfully');
    } else {
      showErr((lang==='ar' ? '❌ خطأ: ' : '❌ Error: ') + (res.error || ''));
    }
  } catch(e) {
    showErr(lang==='ar' ? '❌ خطأ في الاتصال' : '❌ Connection error');
  }

  btn.disabled = false;
  btn.textContent = T.reg_submit;
}

async function togglePhone() {
  if (!uid) return;
  try {
    const res = await fetch('/api/profile/toggle_phone', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({uid})
    }).then(r=>r.json());
    if (res.ok) {
      updatePrivacyUI(privIsVisible, res.show_phone);
      showToast(res.show_phone
        ? (lang==='ar' ? '📞 رقمك مُظهر للآخرين' : '📞 Phone is now visible')
        : (lang==='ar' ? '🔕 رقمك مخفي عن الآخرين' : '🔕 Phone is now hidden'));
    }
  } catch(e) { console.error(e); }
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
const TAB_IDS = {
  photos:'sec-photos', basic:'sec-basic',
  looking:'sec-looking', interests:'sec-interests', education:'sec-education',
  location:'sec-location', privacy:'sec-privacy',
  entities:'sec-entities', feedback:'sec-feedback'
};

function switchToTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
  Object.values(TAB_IDS).forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.style.display='none'; el.classList.remove('active'); }
  });
  const target = document.getElementById(TAB_IDS[tabName]);
  if (target) {
    target.style.display='block'; target.classList.add('active');
    target.scrollIntoView({behavior:'smooth', block:'start'});
  }
  // Show/hide save bar
  const noSave = ['privacy','entities','feedback'];
  const savebar = document.getElementById('save-bar');
  if (savebar) savebar.style.display = noSave.includes(tabName) ? 'none' : 'block';
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchToTab(btn.dataset.tab));
});

// ═══════════════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════════════
document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  const st  = document.getElementById('save-status');
  btn.disabled = true;
  btn.textContent = T.saving;

  const payload = {
    uid,
    first_name:         document.getElementById('f-first-name').value.trim(),
    last_name:          document.getElementById('f-last-name').value.trim(),
    bio:                document.getElementById('f-bio').value.trim(),
    birthdate:          document.getElementById('f-birthdate').value,
    email:              document.getElementById('f-email').value.trim(),
    phone:              document.getElementById('f-phone').value.trim(),
    zodiac:             zodiacState[0] || '',
    social_status:      socialState[0] || '',
    has_children:       hasChildren,
    education:          document.getElementById('f-edu').value,
    profession:         document.getElementById('f-profession').value.trim(),
    university:         document.getElementById('f-university').value.trim(),
    school:             document.getElementById('f-school').value.trim(),
    country:            document.getElementById('f-country').value.trim(),
    city:               document.getElementById('f-city').value.trim(),
    neighborhood:       document.getElementById('f-neighborhood').value.trim(),
    hobbies:            hobbiesState,
    habits:             habitsState,
    personality_traits: personalityState,
    purpose:            purposeState,
  };
  if (genderState[0]) payload.gender = genderState[0];

  try {
    const res = await fetch('/api/profile/save', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).then(r=>r.json());

    if (res.ok) {
      // Update completeness bar immediately from server response
      if (res.profile_complete !== undefined) {
        const pct = res.profile_complete;
        document.getElementById('hdr-complete-fill').style.width = pct + '%';
        document.getElementById('hdr-complete-pct').textContent  = pct + '%';
      }

      if (res.warning === 'migration_pending') {
        // Partial save — new columns not yet in DB
        const migMsg = lang === 'ar'
          ? '⚠️ تم حفظ البيانات الأساسية فقط. يجب تشغيل migrate_profile.sql في Supabase لحفظ الاهتمامات والبرج والهوايات.'
          : '⚠️ Basic data saved. Run migrate_profile.sql in Supabase to save hobbies, interests & zodiac.';
        st.textContent = lang === 'ar' ? '⚠️ جزئي' : '⚠️ Partial';
        showToast(migMsg, 5000);
      } else {
        st.textContent = T.saved;
        showToast(T.saved);
      }
      // Reload to confirm what was actually saved
      setTimeout(() => loadProfile(), 600);
    } else {
      st.textContent = T.save_err;
      const errMsg = lang === 'ar'
        ? `❌ فشل الحفظ: ${res.error || 'خطأ غير معروف'}`
        : `❌ Save failed: ${res.error || 'unknown error'}`;
      showToast(errMsg, 4000);
    }
  } catch(e) {
    st.textContent = T.save_err;
    showToast(lang === 'ar' ? '❌ خطأ في الاتصال' : '❌ Connection error', 3000);
  }
  btn.textContent = T.save;
  btn.disabled = false;
  setTimeout(() => { st.textContent = ''; }, 3000);
});

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2200);
}
