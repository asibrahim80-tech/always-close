<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Always Close – Rooms</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100vh}

    /* ── Header ── */
    #header{position:sticky;top:0;z-index:100;background:#fff;padding:14px 16px 10px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
    #header h1{font-size:18px;font-weight:700;color:#111;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    #header h1 span{color:#8e44ad}

    /* ── Sort chips ── */
    #sort-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:8px}
    #sort-row::-webkit-scrollbar{display:none}
    .sort-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#f7f7f7;font-size:12.5px;cursor:pointer;font-weight:500;color:#555;transition:all .15s;white-space:nowrap}
    .sort-chip.active{background:#8e44ad;border-color:#8e44ad;color:#fff}
    .sort-chip:active{opacity:.75}

    /* ── Filter row ── */
    #filter-row{display:flex;gap:8px;align-items:center}
    #filter-row select{flex:1;padding:7px 10px;border-radius:10px;border:1.5px solid #e0e0e0;font-size:13px;background:#fafafa;color:#333;outline:none}
    #filter-row select:focus{border-color:#8e44ad}

    /* ── Stats bar ── */
    #stats-bar{background:#f8f4fc;border-radius:10px;padding:7px 12px;margin-top:8px;font-size:12px;color:#7d3c98;font-weight:600;display:none}

    /* ── Loading ── */
    #loading{text-align:center;padding:50px 20px;color:#999;font-size:14px}
    .spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#8e44ad;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Room list ── */
    #list{padding:10px 12px;display:flex;flex-direction:column;gap:12px}

    /* ── Room card ── */
    .rcard{background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden}

    /* ── Room banner ── */
    .room-banner{position:relative;width:100%;height:130px;overflow:hidden;background:linear-gradient(135deg,#8e44ad 0%,#6c3483 50%,#a93226 100%);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .room-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .room-banner-icon{font-size:52px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
    .room-banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.5))}
    .room-banner-camera{position:absolute;bottom:8px;right:10px;background:rgba(255,255,255,.85);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:#333;display:flex;align-items:center;gap:4px}
    .room-banner-del-img{position:absolute;bottom:8px;left:10px;background:rgba(231,76,60,.85);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:#fff;cursor:pointer}

    /* ── Card body ── */
    .rcard-body{padding:12px 14px 0}
    .rcard-name-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
    .rcard-name{font-size:16px;font-weight:700;color:#111;flex:1;word-break:break-word}
    .badge-new{background:#27ae60;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}

    /* ── Badges ── */
    .rcard-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .badge{border-radius:10px;padding:3px 9px;font-size:12px;font-weight:500}
    .badge.dist{background:#fdf0ef;color:#e74c3c}
    .badge.mem{background:#f3e5f5;color:#7b1fa2}
    .badge.time{background:#eaf3fb;color:#2980b9}
    .badge.nat{background:#e8f8f0;color:#1e8449;border:1px solid #a9dfbf}
    .badge.purp{background:#fef9e7;color:#b7770d;border:1px solid #f9e79f;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── Star display (Google Play style) ── */
    .star-display{display:flex;align-items:center;gap:6px;margin-bottom:8px}
    .star-bar-wrap{position:relative;display:inline-block;font-size:16px;line-height:1;letter-spacing:1px}
    .star-bar-back{color:#ddd}
    .star-bar-front{position:absolute;top:0;left:0;overflow:hidden;white-space:nowrap;color:#f39c12}
    .star-val{font-size:15px;font-weight:700;color:#333}
    .star-cnt{font-size:12px;color:#999}
    .no-ratings{font-size:12px;color:#bbb;font-style:italic}

    /* ── Interactive rating widget ── */
    .rate-section{padding:0 14px 10px}
    .rate-label{font-size:12px;color:#888;margin-bottom:5px}
    .rate-stars{display:flex;gap:4px}
    .rate-star{font-size:26px;color:#ddd;cursor:pointer;transition:color .1s,transform .1s;user-select:none;-webkit-user-select:none}
    .rate-star.on{color:#f39c12}
    .rate-star.hover{color:#f5c842}
    .rate-star:active{transform:scale(1.2)}

    /* ── Member dots ── */
    .member-bar{display:flex;align-items:center;gap:4px;padding:0 0 8px}
    .member-dot{width:8px;height:8px;border-radius:50%;background:#8e44ad;opacity:.6}
    .member-count-label{font-size:11px;color:#aaa;margin-left:4px}

    /* ── Occ bar ── */
    .occ-bar-wrap{padding:0 0 8px}
    .occ-bar-bg{height:4px;background:#eee;border-radius:4px;overflow:hidden}
    .occ-bar-fill{height:100%;background:linear-gradient(90deg,#8e44ad,#c0392b);border-radius:4px;transition:width .4s}

    /* ── Actions ── */
    .rcard-actions{display:flex;flex-wrap:wrap;gap:7px;padding:0 14px 12px}
    .act-btn{flex:1;min-width:0;padding:9px 10px;border-radius:11px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .1s,transform .08s}
    .act-btn:active{opacity:.7;transform:scale(.97)}
    .act-btn.map{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
    .act-btn.join{background:linear-gradient(135deg,#8e44ad,#6c3483);color:#fff}
    .act-btn.joined{background:#e8f8f0;color:#27ae60;border:1.5px solid #a9dfbf;cursor:default}
    .act-btn.del{background:#fdf0ef;color:#e74c3c;border:1.5px solid #fadbd8}
    .act-btn.rate-members{background:#fff3e0;color:#e67e22;border:1.5px solid #fce0b0;flex:0 0 auto;padding:9px 14px}

    /* ── Divider ── */
    .rcard-div{height:1px;background:#f0f0f0;margin:0 14px}

    /* ── No results ── */
    #no-results{text-align:center;padding:40px 20px;color:#aaa;font-size:14px;display:none}
    #no-results .ico{font-size:40px;margin-bottom:8px}

    /* ── Toast ── */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;border-radius:20px;padding:9px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── Members modal ── */
    #members-modal{position:fixed;inset:0;z-index:500;display:none}
    #modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
    #modal-panel{
      position:absolute;bottom:0;left:0;right:0;
      background:#fff;border-radius:22px 22px 0 0;
      max-height:80vh;overflow-y:auto;padding:0 0 30px;
    }
    #modal-panel.open{animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    #modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:1}
    #modal-title{font-size:16px;font-weight:700;color:#111}
    #modal-close{font-size:22px;color:#999;cursor:pointer;padding:4px}
    .member-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #f8f8f8}
    .member-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#e0e0e0,#ccc);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#888;flex-shrink:0;overflow:hidden}
    .member-av img{width:100%;height:100%;object-fit:cover}
    .member-info{flex:1;min-width:0}
    .member-name{font-size:14px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .member-avg{font-size:11px;color:#f39c12;margin-top:2px}
    .member-rate-stars{display:flex;gap:3px;margin-top:5px}
    .member-rate-star{font-size:22px;color:#ddd;cursor:pointer;transition:color .1s}
    .member-rate-star.on{color:#f39c12}
    #modal-empty{text-align:center;padding:30px;color:#bbb;font-size:14px}
    #modal-loading{text-align:center;padding:30px}
    .modal-spinner{width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#8e44ad;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}

    /* ── RTL ── */
    body.rtl{direction:rtl}
    body.rtl .room-banner-camera{right:auto;left:10px}
    body.rtl .room-banner-del-img{left:auto;right:10px}
    body.rtl .member-count-label{margin-left:0;margin-right:4px}
    body.rtl .star-bar-front{left:auto;right:0}
  </style>
</head>
<body>

<div id="header">
  <h1>🏠 <span id="title-text">Rooms List</span></h1>
  <div id="sort-row">
    <button class="sort-chip active" data-sort="distance" id="chip-dist">📍 Closest</button>
    <button class="sort-chip"        data-sort="members"  id="chip-mem">👥 Most Members</button>
    <button class="sort-chip"        data-sort="rating"   id="chip-rat">⭐ Top Rated</button>
    <button class="sort-chip"        data-sort="newest"   id="chip-new">🕒 Newest</button>
  </div>
  <div id="filter-row">
    <select id="sel-dist">
      <option value="">Any Distance</option>
      <option value="0.5">≤ 500 m</option>
      <option value="1">≤ 1 km</option>
      <option value="5">≤ 5 km</option>
      <option value="10">≤ 10 km</option>
      <option value="50">≤ 50 km</option>
    </select>
    <select id="sel-mem">
      <option value="">Any Members</option>
      <option value="1">1+</option>
      <option value="5">5+</option>
      <option value="10">10+</option>
    </select>
  </div>
  <div id="stats-bar"></div>
</div>

<div id="loading"><div class="spinner"></div><div id="loading-lbl">Loading…</div></div>
<div id="list" style="display:none"></div>
<div id="no-results"><div class="ico">🏠</div><div id="no-res-lbl">No rooms found</div></div>
<div id="toast"></div>
<input type="file" id="img-input" accept="image/*" style="display:none">

<!-- Members rating modal -->
<div id="members-modal">
  <div id="modal-bg"></div>
  <div id="modal-panel">
    <div id="modal-header">
      <span id="modal-title">Rate Members</span>
      <span id="modal-close">✕</span>
    </div>
    <div id="modal-body"><div id="modal-loading"><div class="modal-spinner"></div></div></div>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const uid     = new URLSearchParams(location.search).get('uid');
  const lang    = new URLSearchParams(location.search).get('lang') || 'en';
  const mapBase = new URLSearchParams(location.search).get('mapBase') || '';
  const isAr    = lang === 'ar';
  if (isAr) document.body.classList.add('rtl');

  const T = {
    ar:{
      title:'قائمة الغرف',
      sort_dist:'📍 الأقرب', sort_mem:'👥 الأكثر أعضاء', sort_rat:'⭐ الأعلى تقييماً', sort_new:'🕒 الأحدث',
      any_dist:'أي مسافة', d05:'≤ 500 م', d1:'≤ 1 كم', d5:'≤ 5 كم', d10:'≤ 10 كم', d50:'≤ 50 كم',
      any_mem:'أي عدد أعضاء', m1:'1+', m5:'5+', m10:'10+',
      loading:'جارٍ التحميل…', no_res:'لا توجد غرف', err:'❌ خطأ في التحميل',
      km:'كم', members:'عضو',
      btn_map:'🗺️ خريطة', btn_join:'🚪 انضمام', btn_joined:'✅ منضم',
      btn_delete:'🗑️ حذف', btn_add_img:'📷 إضافة', btn_change_img:'📷 تغيير', btn_del_img:'🗑️ صورة',
      btn_rate_members:'👥 تقييم الأعضاء',
      stats:n => `عدد الغرف: ${n}`,
      ago_now:'الآن', ago_min:'د', ago_hr:'س', ago_day:'ي', new_badge:'جديدة',
      rate_label:'قيّم هذه الغرفة:', no_ratings:'لم يُقيَّم بعد',
      join_ok:'✅ تم الانضمام!', join_already:'ℹ️ أنت عضو بالفعل', join_err:'❌ خطأ في الانضمام',
      del_confirm:'حذف هذه الغرفة؟', del_ok:'🗑️ تم حذف الغرفة',
      del_err_members:'❌ يوجد أعضاء آخرون', del_err:'❌ خطأ في الحذف',
      img_ok:'✅ تم حفظ الصورة', img_err:'❌ خطأ في رفع الصورة',
      img_del_ok:'✅ تم حذف الصورة', img_del_confirm:'حذف صورة الغرفة؟',
      rate_ok:'⭐ شكراً على تقييمك!', rate_err:'❌ خطأ في التقييم',
      modal_title:'تقييم أعضاء الغرفة', modal_empty:'لا يوجد أعضاء آخرون',
      member_rate_ok:'⭐ تم تقييم العضو',
    },
    en:{
      title:'Rooms List',
      sort_dist:'📍 Closest', sort_mem:'👥 Most Members', sort_rat:'⭐ Top Rated', sort_new:'🕒 Newest',
      any_dist:'Any Distance', d05:'≤ 500 m', d1:'≤ 1 km', d5:'≤ 5 km', d10:'≤ 10 km', d50:'≤ 50 km',
      any_mem:'Any Members', m1:'1+', m5:'5+', m10:'10+',
      loading:'Loading…', no_res:'No rooms found', err:'❌ Error loading rooms',
      km:'km', members:'members',
      btn_map:'🗺️ Map', btn_join:'🚪 Join', btn_joined:'✅ Joined',
      btn_delete:'🗑️ Delete', btn_add_img:'📷 Add', btn_change_img:'📷 Change', btn_del_img:'🗑️ Photo',
      btn_rate_members:'👥 Rate Members',
      stats:n => `${n} room${n===1?'':'s'} found`,
      ago_now:'now', ago_min:'m', ago_hr:'h', ago_day:'d', new_badge:'NEW',
      rate_label:'Rate this room:', no_ratings:'Not rated yet',
      join_ok:'✅ Joined!', join_already:'ℹ️ Already a member', join_err:'❌ Error joining',
      del_confirm:'Delete this room?', del_ok:'🗑️ Room deleted',
      del_err_members:'❌ Other members exist', del_err:'❌ Error deleting',
      img_ok:'✅ Photo saved', img_err:'❌ Upload error',
      img_del_ok:'✅ Photo deleted', img_del_confirm:'Delete room photo?',
      rate_ok:'⭐ Thanks for rating!', rate_err:'❌ Rating error',
      modal_title:'Rate Room Members', modal_empty:'No other members',
      member_rate_ok:'⭐ Member rated',
    }
  }[lang] || {};

  // Apply header
  document.getElementById('title-text').textContent  = T.title;
  document.getElementById('chip-dist').textContent   = T.sort_dist;
  document.getElementById('chip-mem').textContent    = T.sort_mem;
  document.getElementById('chip-rat').textContent    = T.sort_rat;
  document.getElementById('chip-new').textContent    = T.sort_new;
  document.getElementById('loading-lbl').textContent = T.loading;
  document.getElementById('no-res-lbl').textContent  = T.no_res;
  document.getElementById('modal-title').textContent = T.modal_title;
  const selDist = document.getElementById('sel-dist');
  const selMem  = document.getElementById('sel-mem');
  selDist.options[0].text = T.any_dist; selDist.options[1].text = T.d05;
  selDist.options[2].text = T.d1;       selDist.options[3].text = T.d5;
  selDist.options[4].text = T.d10;      selDist.options[5].text = T.d50;
  selMem.options[0].text  = T.any_mem;  selMem.options[1].text  = T.m1;
  selMem.options[2].text  = T.m5;       selMem.options[3].text  = T.m10;

  let allRooms   = [];
  let activeSort = 'distance';
  let uploadTargetRoomId = null;

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const d = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (d < 60) return T.ago_now;
    if (d < 3600) return `${Math.floor(d/60)}${T.ago_min}`;
    if (d < 86400) return `${Math.floor(d/3600)}${T.ago_hr}`;
    return `${Math.floor(d/86400)}${T.ago_day}`;
  }
  function isNew(iso) { return iso && (Date.now() - new Date(iso)) < 3600000; }

  function openMap() {
    const url = `${mapBase || location.origin}/map?uid=${uid}&lang=${lang}`;
    if (window.Telegram?.WebApp?.openLink) Telegram.WebApp.openLink(url);
    else window.open(url, '_blank');
  }

  const ICONS = ['🏠','🏡','🏢','🌟','🎯','🎪','🎭','💫','🌍','🎵'];
  function roomIcon(id) { return ICONS[(id || 0) % ICONS.length]; }

  // ── Star display (Google Play style) ──
  function makeStarDisplay(avg, count) {
    const wrap = document.createElement('div');
    wrap.className = 'star-display';
    if (!count || count === 0) {
      const empty = document.createElement('span');
      empty.className = 'no-ratings';
      empty.textContent = T.no_ratings;
      wrap.appendChild(empty);
      return wrap;
    }
    const pct = Math.round((avg / 5) * 100);
    const barWrap = document.createElement('span');
    barWrap.className = 'star-bar-wrap';
    barWrap.innerHTML = `<span class="star-bar-back">★★★★★</span><span class="star-bar-front" style="width:${pct}%">★★★★★</span>`;
    wrap.appendChild(barWrap);
    const valEl = document.createElement('span');
    valEl.className = 'star-val';
    valEl.textContent = avg.toFixed(1);
    wrap.appendChild(valEl);
    const cntEl = document.createElement('span');
    cntEl.className = 'star-cnt';
    cntEl.textContent = `(${count})`;
    wrap.appendChild(cntEl);
    return wrap;
  }

  // ── Interactive rating widget ──
  function makeRatingWidget(currentRating, onRate) {
    const wrap = document.createElement('div');
    wrap.className = 'rate-stars';
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'rate-star' + (i <= currentRating ? ' on' : '');
      star.textContent = '★';
      star.addEventListener('mouseenter', () => {
        wrap.querySelectorAll('.rate-star').forEach((s, idx) => s.classList.toggle('hover', idx < i));
      });
      star.addEventListener('mouseleave', () => {
        wrap.querySelectorAll('.rate-star').forEach(s => s.classList.remove('hover'));
      });
      star.addEventListener('click', () => {
        wrap.querySelectorAll('.rate-star').forEach((s, idx) => s.classList.toggle('on', idx < i));
        onRate(i);
      });
      wrap.appendChild(star);
    }
    return wrap;
  }

  // ── Join ──
  async function joinRoom(roomId, btnEl) {
    btnEl.disabled = true;
    try {
      const res  = await fetch('/api/room/join', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), room_id: roomId})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(T.join_ok);
        btnEl.className = 'act-btn joined';
        btnEl.textContent = T.btn_joined;
        btnEl.disabled = true;
        const room = allRooms.find(r => r.id === roomId);
        if (room) { room.is_member = true; room.members += 1; }
      } else if (data.already) {
        showToast(T.join_already);
        btnEl.className = 'act-btn joined';
        btnEl.textContent = T.btn_joined;
        btnEl.disabled = true;
      } else {
        showToast(T.join_err);
        btnEl.disabled = false;
      }
    } catch(e) { showToast(T.join_err); btnEl.disabled = false; }
  }

  // ── Delete room ──
  async function deleteRoom(roomId, cardEl) {
    if (!confirm(T.del_confirm)) return;
    try {
      const res  = await fetch('/api/room/delete', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), room_id: roomId})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(T.del_ok);
        cardEl.style.transition = 'opacity .3s,transform .3s';
        cardEl.style.opacity = '0';
        cardEl.style.transform = 'scale(.95)';
        setTimeout(() => { cardEl.remove(); allRooms = allRooms.filter(r => r.id !== roomId); }, 320);
      } else if (data.error === 'has_members') { showToast(T.del_err_members); }
      else { showToast(T.del_err); }
    } catch(e) { showToast(T.del_err); }
  }

  // ── Rate room ──
  async function rateRoom(roomId, rating, displayEl) {
    try {
      const res  = await fetch('/api/room/rate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), room_id: roomId, rating})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(T.rate_ok);
        // Update star display
        if (displayEl) {
          const newDisplay = makeStarDisplay(data.avg_rating, data.rating_count);
          displayEl.replaceWith(newDisplay);
        }
        const room = allRooms.find(r => r.id === roomId);
        if (room) { room.avg_rating = data.avg_rating; room.rating_count = data.rating_count; room.my_rating = rating; }
      } else { showToast(T.rate_err); }
    } catch(e) { showToast(T.rate_err); }
  }

  // ── Image upload ──
  const imgInput = document.getElementById('img-input');
  imgInput.addEventListener('change', async () => {
    const file = imgInput.files[0];
    if (!file || !uploadTargetRoomId) return;
    const card = document.querySelector(`[data-room-id="${uploadTargetRoomId}"]`);
    if (card) card.querySelector('.room-banner').style.opacity = '.5';
    const formData = new FormData();
    formData.append('uid', uid);
    formData.append('room_id', uploadTargetRoomId);
    formData.append('image', file);
    try {
      const res  = await fetch('/api/room/image/upload', {method:'POST', body: formData});
      const data = await res.json();
      if (data.ok) {
        showToast(T.img_ok);
        const room = allRooms.find(r => r.id === uploadTargetRoomId);
        if (room) { room.image_url = data.image_url + '?t=' + Date.now(); refreshCardBanner(card, room); }
      } else { showToast(T.img_err); }
    } catch(e) { showToast(T.img_err); }
    if (card) card.querySelector('.room-banner').style.opacity = '1';
    imgInput.value = '';
    uploadTargetRoomId = null;
  });

  function triggerImageUpload(roomId) { uploadTargetRoomId = roomId; imgInput.click(); }

  async function deleteRoomImage(roomId, card) {
    if (!confirm(T.img_del_confirm)) return;
    try {
      const res  = await fetch('/api/room/image/delete', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid: parseInt(uid), room_id: roomId})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(T.img_del_ok);
        const room = allRooms.find(r => r.id === roomId);
        if (room) { room.image_url = ''; refreshCardBanner(card, room); }
      }
    } catch(e) {}
  }

  function refreshCardBanner(card, room) {
    if (!card) return;
    const banner = card.querySelector('.room-banner');
    if (!banner) return;
    const img = banner.querySelector('img');
    const cam = banner.querySelector('.room-banner-camera');
    const delI = banner.querySelector('.room-banner-del-img');
    if (room.image_url) {
      if (img) img.src = room.image_url;
      else {
        const ni = document.createElement('img');
        ni.src = room.image_url;
        banner.insertBefore(ni, banner.firstChild);
      }
      if (cam) cam.textContent = '📷 ' + T.btn_change_img;
      if (delI) delI.style.display = 'flex';
    } else {
      if (img) img.remove();
      if (cam) cam.textContent = '📷 ' + T.btn_add_img;
      if (delI) delI.style.display = 'none';
    }
  }

  // ── Members Modal ──
  const modal = document.getElementById('members-modal');
  const modalBody = document.getElementById('modal-body');
  document.getElementById('modal-bg').addEventListener('click', closeModal);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  function closeModal() { modal.style.display = 'none'; }

  async function openMembersModal(roomId) {
    modal.style.display = 'block';
    modalBody.innerHTML = '<div id="modal-loading"><div class="modal-spinner"></div></div>';
    try {
      const res  = await fetch(`/api/room/${roomId}/members/${uid}`);
      const data = await res.json();
      const members = data.members || [];
      if (!members.length) {
        modalBody.innerHTML = `<div id="modal-empty">${T.modal_empty}</div>`;
        return;
      }
      modalBody.innerHTML = '';
      members.forEach(m => {
        const item = document.createElement('div');
        item.className = 'member-item';

        const av = document.createElement('div');
        av.className = 'member-av';
        if (m.photo_url) {
          const img = document.createElement('img');
          img.src = m.photo_url;
          img.onerror = () => { img.style.display='none'; av.textContent = (m.username||'?')[0].toUpperCase(); };
          av.appendChild(img);
        } else {
          av.textContent = (m.username || '?')[0].toUpperCase();
        }
        item.appendChild(av);

        const info = document.createElement('div');
        info.className = 'member-info';

        const name = document.createElement('div');
        name.className = 'member-name';
        name.textContent = `@${m.username}`;
        info.appendChild(name);

        // Avg display
        if (m.rating_count > 0) {
          const avgEl = document.createElement('div');
          avgEl.className = 'member-avg';
          const pct = Math.round((m.avg_rating / 5) * 100);
          avgEl.innerHTML = `<span style="position:relative;display:inline-block;font-size:13px"><span style="color:#ddd">★★★★★</span><span style="position:absolute;top:0;left:0;overflow:hidden;width:${pct}%;white-space:nowrap;color:#f39c12">★★★★★</span></span> ${m.avg_rating.toFixed(1)} (${m.rating_count})`;
          info.appendChild(avgEl);
        }

        // Interactive stars
        const starsRow = document.createElement('div');
        starsRow.className = 'member-rate-stars';
        for (let i = 1; i <= 5; i++) {
          const star = document.createElement('span');
          star.className = 'member-rate-star' + (i <= m.my_rating ? ' on' : '');
          star.textContent = '★';
          const ci = i;
          star.addEventListener('click', async () => {
            starsRow.querySelectorAll('.member-rate-star').forEach((s, idx) => s.classList.toggle('on', idx < ci));
            try {
              const r = await fetch('/api/user/rate', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({uid: parseInt(uid), target_id: m.user_id, rating: ci})
              });
              const d = await r.json();
              if (d.ok) showToast(T.member_rate_ok);
            } catch(e) {}
          });
          starsRow.appendChild(star);
        }
        info.appendChild(starsRow);

        item.appendChild(info);
        modalBody.appendChild(item);
      });
    } catch(e) {
      modalBody.innerHTML = `<div id="modal-empty">${T.modal_empty}</div>`;
    }
  }

  // ── Render ──
  function render() {
    const distLimit = selDist.value ? parseFloat(selDist.value) : null;
    const memMin    = selMem.value  ? parseInt(selMem.value)    : null;

    let filtered = allRooms.filter(r => {
      if (distLimit !== null && r.distance != null && r.distance > distLimit) return false;
      if (memMin    !== null && r.members < memMin)                           return false;
      return true;
    });

    if (activeSort === 'distance')    filtered.sort((a,b) => (a.distance ?? 9999) - (b.distance ?? 9999));
    else if (activeSort === 'members') filtered.sort((a,b) => b.members - a.members);
    else if (activeSort === 'rating')  filtered.sort((a,b) => (b.avg_rating||0) - (a.avg_rating||0));
    else if (activeSort === 'newest')  filtered.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));

    const listEl   = document.getElementById('list');
    const noRes    = document.getElementById('no-results');
    const statsBar = document.getElementById('stats-bar');
    listEl.innerHTML = '';

    if (!filtered.length) {
      listEl.style.display = 'none'; noRes.style.display = 'block'; statsBar.style.display = 'none';
      return;
    }
    noRes.style.display = 'none'; listEl.style.display = 'flex';
    statsBar.style.display = 'block'; statsBar.textContent = T.stats(filtered.length);

    const maxM = Math.max(...filtered.map(x => x.members), 1);

    filtered.forEach(r => {
      const card = document.createElement('div');
      card.className = 'rcard';
      card.setAttribute('data-room-id', r.id);

      // Banner
      const banner = document.createElement('div');
      banner.className = 'room-banner';
      if (r.image_url) {
        const img = document.createElement('img');
        img.src = r.image_url;
        img.onerror = () => img.remove();
        banner.appendChild(img);
      }
      const overlay = document.createElement('div');
      overlay.className = 'room-banner-overlay';
      banner.appendChild(overlay);
      const iconEl = document.createElement('div');
      iconEl.className = 'room-banner-icon';
      iconEl.textContent = roomIcon(r.id);
      banner.appendChild(iconEl);
      if (r.is_creator) {
        const cam = document.createElement('div');
        cam.className = 'room-banner-camera';
        cam.textContent = '📷 ' + (r.image_url ? T.btn_change_img : T.btn_add_img);
        cam.addEventListener('click', e => { e.stopPropagation(); triggerImageUpload(r.id); });
        banner.appendChild(cam);
        if (r.image_url) {
          const di = document.createElement('div');
          di.className = 'room-banner-del-img';
          di.textContent = T.btn_del_img;
          di.addEventListener('click', e => { e.stopPropagation(); deleteRoomImage(r.id, card); });
          banner.appendChild(di);
        }
      }
      card.appendChild(banner);

      // Body
      const body = document.createElement('div');
      body.className = 'rcard-body';

      // Name row
      const nameRow = document.createElement('div');
      nameRow.className = 'rcard-name-row';
      const nameEl = document.createElement('div');
      nameEl.className = 'rcard-name';
      nameEl.textContent = r.name || 'Room';
      nameRow.appendChild(nameEl);
      if (isNew(r.created_at)) {
        const nb = document.createElement('span');
        nb.className = 'badge-new';
        nb.textContent = T.new_badge;
        nameRow.appendChild(nb);
      }
      body.appendChild(nameRow);

      // Badges
      const badges = document.createElement('div');
      badges.className = 'rcard-badges';
      if (r.distance != null) {
        const b = document.createElement('span'); b.className = 'badge dist'; b.textContent = `📍 ${r.distance} ${T.km}`; badges.appendChild(b);
      }
      const mb = document.createElement('span'); mb.className = 'badge mem'; mb.textContent = `👥 ${r.members} ${T.members}`; badges.appendChild(mb);
      if (!isNew(r.created_at) && r.created_at) {
        const tb = document.createElement('span'); tb.className = 'badge time'; tb.textContent = `🕒 ${timeAgo(r.created_at)}`; badges.appendChild(tb);
      }
      if (r.nature) {
        const nb = document.createElement('span'); nb.className = 'badge nat'; nb.textContent = r.nature; badges.appendChild(nb);
      }
      if (r.purpose) {
        const pb = document.createElement('span'); pb.className = 'badge purp'; pb.title = r.purpose; pb.textContent = `📝 ${r.purpose}`; badges.appendChild(pb);
      }
      body.appendChild(badges);

      // ── Star display ──
      const starDisp = makeStarDisplay(r.avg_rating || 0, r.rating_count || 0);
      body.appendChild(starDisp);

      // Member dots
      if (r.members > 0) {
        const bar = document.createElement('div');
        bar.className = 'member-bar';
        const dc = Math.min(r.members, 14);
        for (let i = 0; i < dc; i++) { const d = document.createElement('div'); d.className = 'member-dot'; bar.appendChild(d); }
        if (r.members > 14) { const lbl = document.createElement('span'); lbl.className = 'member-count-label'; lbl.textContent = `+${r.members - 14}`; bar.appendChild(lbl); }
        body.appendChild(bar);
      }

      // Occ bar
      const occWrap = document.createElement('div'); occWrap.className = 'occ-bar-wrap';
      const occBg   = document.createElement('div'); occBg.className   = 'occ-bar-bg';
      const occFill = document.createElement('div'); occFill.className = 'occ-bar-fill';
      occFill.style.width = `${Math.min(100, (r.members / maxM) * 100)}%`;
      occBg.appendChild(occFill); occWrap.appendChild(occBg); body.appendChild(occWrap);

      card.appendChild(body);

      // Divider
      const div1 = document.createElement('div'); div1.className = 'rcard-div'; card.appendChild(div1);

      // Actions
      const actions = document.createElement('div');
      actions.className = 'rcard-actions';

      const btnMap = document.createElement('button');
      btnMap.className = 'act-btn map'; btnMap.textContent = T.btn_map;
      btnMap.addEventListener('click', openMap);
      actions.appendChild(btnMap);

      if (r.is_member) {
        const bj = document.createElement('button'); bj.className = 'act-btn joined'; bj.textContent = T.btn_joined; bj.disabled = true; actions.appendChild(bj);
      } else {
        const bj = document.createElement('button'); bj.className = 'act-btn join'; bj.textContent = T.btn_join;
        bj.addEventListener('click', () => joinRoom(r.id, bj)); actions.appendChild(bj);
      }

      if (r.is_creator && r.members <= 1) {
        const bd = document.createElement('button'); bd.className = 'act-btn del'; bd.style.cssText = 'flex:0 0 auto;padding:9px 14px';
        bd.textContent = T.btn_delete;
        bd.addEventListener('click', () => deleteRoom(r.id, card)); actions.appendChild(bd);
      }

      // Rate members button (creator only)
      if (r.is_creator && r.members > 1) {
        const brm = document.createElement('button'); brm.className = 'act-btn rate-members';
        brm.textContent = T.btn_rate_members;
        brm.addEventListener('click', () => openMembersModal(r.id)); actions.appendChild(brm);
      }

      card.appendChild(actions);

      // Divider + Rating section
      const div2 = document.createElement('div'); div2.className = 'rcard-div'; card.appendChild(div2);

      const rateSection = document.createElement('div');
      rateSection.className = 'rate-section';
      const rateLabel = document.createElement('div');
      rateLabel.className = 'rate-label';
      rateLabel.textContent = T.rate_label;
      rateSection.appendChild(rateLabel);

      const widget = makeRatingWidget(r.my_rating || 0, async (val) => {
        await rateRoom(r.id, val, starDisp);
      });
      rateSection.appendChild(widget);
      card.appendChild(rateSection);

      listEl.appendChild(card);
    });
  }

  // Sort chips
  document.querySelectorAll('.sort-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeSort = chip.dataset.sort;
      render();
    });
  });
  selDist.addEventListener('change', render);
  selMem.addEventListener('change',  render);

  // Fetch
  fetch(`/api/rooms/${uid}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      if (data.error && !data.rooms?.length) {
        document.getElementById('no-res-lbl').textContent = data.error;
        document.getElementById('no-results').style.display = 'block';
        return;
      }
      allRooms = data.rooms || [];
      render();
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('no-res-lbl').textContent = T.err;
      document.getElementById('no-results').style.display = 'block';
    });
</script>
</body>
</html>
