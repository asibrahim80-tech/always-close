<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Always Close – Rooms</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100vh}

    /* ── Header ── */
    #header{
      position:sticky;top:0;z-index:100;
      background:#fff;padding:14px 16px 10px;
      box-shadow:0 1px 4px rgba(0,0,0,.1);
    }
    #header h1{font-size:18px;font-weight:700;color:#111;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    #header h1 span{color:#8e44ad}

    /* ── Sort chips ── */
    #sort-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:8px}
    #sort-row::-webkit-scrollbar{display:none}
    .sort-chip{
      flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;
      background:#f7f7f7;font-size:12.5px;cursor:pointer;font-weight:500;color:#555;
      transition:all .15s;white-space:nowrap;
    }
    .sort-chip.active{background:#8e44ad;border-color:#8e44ad;color:#fff}
    .sort-chip:active{opacity:.75}

    /* ── Filter row ── */
    #filter-row{display:flex;gap:8px;align-items:center}
    #filter-row select{
      flex:1;padding:7px 10px;border-radius:10px;border:1.5px solid #e0e0e0;
      font-size:13px;background:#fafafa;color:#333;outline:none;
    }
    #filter-row select:focus{border-color:#8e44ad}

    /* ── Stats bar ── */
    #stats-bar{
      background:#f8f4fc;border-radius:10px;padding:7px 12px;margin-top:8px;
      font-size:12px;color:#7d3c98;font-weight:600;display:none;
    }

    /* ── Loading / empty ── */
    #loading{text-align:center;padding:50px 20px;color:#999;font-size:14px}
    .spinner{
      width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#8e44ad;
      border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Room list ── */
    #list{padding:10px 12px;display:flex;flex-direction:column;gap:10px}

    /* ── Room card ── */
    .rcard{
      background:#fff;border-radius:16px;
      box-shadow:0 1px 6px rgba(0,0,0,.07);
      overflow:hidden;
      cursor:default;transition:box-shadow .15s,transform .1s;
    }
    .rcard:active{transform:scale(.985);box-shadow:0 2px 12px rgba(0,0,0,.12)}

    .rcard-top{
      display:flex;align-items:center;gap:12px;padding:12px 14px 8px;
    }

    .room-icon{
      width:52px;height:52px;min-width:52px;border-radius:14px;
      background:linear-gradient(135deg,#8e44ad,#6c3483);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;color:#fff;flex-shrink:0;
    }

    .rcard-info{flex:1;min-width:0}
    .rcard-name{font-size:15px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rcard-meta{font-size:12px;color:#888;margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}

    .meta-badge{
      background:#f2f2f2;border-radius:10px;padding:2px 8px;font-size:11.5px;color:#555;font-weight:500;
    }
    .meta-badge.purple{background:#f3e5f5;color:#7b1fa2}
    .meta-badge.green {background:#e8f8f0;color:#27ae60}
    .meta-badge.red   {background:#fdf0ef;color:#e74c3c}
    .meta-badge.blue  {background:#eaf3fb;color:#2980b9}

    /* ── Member avatars row ── */
    .member-bar{
      display:flex;align-items:center;gap:4px;padding:0 14px 10px;
    }
    .member-dot{
      width:8px;height:8px;border-radius:50%;background:#8e44ad;opacity:.6;
    }
    .member-count-label{font-size:11px;color:#aaa;margin-left:4px}

    /* ── Progress bar (occupancy) ── */
    .occ-bar-wrap{padding:0 14px 4px}
    .occ-bar-bg{height:4px;background:#eee;border-radius:4px;overflow:hidden}
    .occ-bar-fill{height:100%;background:linear-gradient(90deg,#8e44ad,#c0392b);border-radius:4px;transition:width .4s}

    /* ── Actions ── */
    .rcard-actions{display:flex;gap:8px;padding:0 14px 12px}
    .act-btn{
      flex:1;padding:8px 10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .1s;
    }
    .act-btn:active{opacity:.7}
    .act-btn.map{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
    .act-btn.join{background:linear-gradient(135deg,#8e44ad,#6c3483);color:#fff}

    /* ── No results ── */
    #no-results{text-align:center;padding:40px 20px;color:#aaa;font-size:14px;display:none}
    #no-results .ico{font-size:40px;margin-bottom:8px}

    /* ── RTL ── */
    body.rtl{direction:rtl}
    body.rtl .rcard-meta{flex-direction:row-reverse}
    body.rtl .member-count-label{margin-left:0;margin-right:4px}
  </style>
</head>
<body>

<div id="header">
  <h1>🏠 <span id="title-text">Rooms List</span></h1>

  <div id="sort-row">
    <button class="sort-chip active" data-sort="distance" id="chip-dist">📍 Closest</button>
    <button class="sort-chip"        data-sort="members"  id="chip-mem">👥 Most Members</button>
    <button class="sort-chip"        data-sort="newest"   id="chip-new">🕒 Newest</button>
  </div>

  <div id="filter-row">
    <select id="sel-dist">
      <option value="">Any Distance</option>
      <option value="0.5">≤ 500 m</option>
      <option value="1">≤ 1 km</option>
      <option value="5">≤ 5 km</option>
      <option value="10">≤ 10 km</option>
      <option value="50">≤ 50 km</option>
    </select>
    <select id="sel-mem">
      <option value="">Any Members</option>
      <option value="1">1+</option>
      <option value="5">5+</option>
      <option value="10">10+</option>
    </select>
  </div>
  <div id="stats-bar"></div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-lbl">Loading…</div>
</div>

<div id="list" style="display:none"></div>
<div id="no-results"><div class="ico">🏠</div><div id="no-res-lbl">No rooms found</div></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const uid     = new URLSearchParams(location.search).get('uid');
  const lang    = new URLSearchParams(location.search).get('lang') || 'en';
  const mapBase = new URLSearchParams(location.search).get('mapBase') || '';

  const isAr = lang === 'ar';
  if (isAr) document.body.classList.add('rtl');

  const T = {
    ar:{
      title:'قائمة الغرف',
      sort_dist:'📍 الأقرب', sort_mem:'👥 الأكثر أعضاء', sort_new:'🕒 الأحدث',
      any_dist:'أي مسافة', d05:'≤ 500 م', d1:'≤ 1 كم', d5:'≤ 5 كم', d10:'≤ 10 كم', d50:'≤ 50 كم',
      any_mem:'أي عدد أعضاء', m1:'1+', m5:'5+', m10:'10+',
      loading:'جارٍ التحميل…',
      no_res:'لا توجد غرف', err:'❌ خطأ في التحميل',
      km:'كم', members:'عضو',
      btn_map:'🗺️ عرض على الخريطة', btn_join:'🚪 الانضمام',
      stats:n => `عدد الغرف: ${n}`,
      ago_now:'الآن', ago_min:'د', ago_hr:'س', ago_day:'ي',
      new_badge:'جديدة',
    },
    en:{
      title:'Rooms List',
      sort_dist:'📍 Closest', sort_mem:'👥 Most Members', sort_new:'🕒 Newest',
      any_dist:'Any Distance', d05:'≤ 500 m', d1:'≤ 1 km', d5:'≤ 5 km', d10:'≤ 10 km', d50:'≤ 50 km',
      any_mem:'Any Members', m1:'1+', m5:'5+', m10:'10+',
      loading:'Loading…',
      no_res:'No rooms found', err:'❌ Error loading rooms',
      km:'km', members:'members',
      btn_map:'🗺️ View on Map', btn_join:'🚪 Join',
      stats:n => `${n} room${n===1?'':'s'} found`,
      ago_now:'now', ago_min:'m', ago_hr:'h', ago_day:'d',
      new_badge:'NEW',
    }
  }[lang] || {};

  // Apply translations
  document.getElementById('title-text').textContent    = T.title;
  document.getElementById('chip-dist').textContent     = T.sort_dist;
  document.getElementById('chip-mem').textContent      = T.sort_mem;
  document.getElementById('chip-new').textContent      = T.sort_new;
  document.getElementById('loading-lbl').textContent   = T.loading;
  document.getElementById('no-res-lbl').textContent    = T.no_res;

  const selDist = document.getElementById('sel-dist');
  const selMem  = document.getElementById('sel-mem');
  selDist.options[0].text = T.any_dist;
  selDist.options[1].text = T.d05;
  selDist.options[2].text = T.d1;
  selDist.options[3].text = T.d5;
  selDist.options[4].text = T.d10;
  selDist.options[5].text = T.d50;
  selMem.options[0].text  = T.any_mem;
  selMem.options[1].text  = T.m1;
  selMem.options[2].text  = T.m5;
  selMem.options[3].text  = T.m10;

  // ── State ──
  let allRooms  = [];
  let activeSort = 'distance';

  // ── Time helper ──
  function timeAgo(iso) {
    if (!iso) return '';
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60)    return T.ago_now;
    if (diff < 3600)  return `${Math.floor(diff/60)}${T.ago_min}`;
    if (diff < 86400) return `${Math.floor(diff/3600)}${T.ago_hr}`;
    return `${Math.floor(diff/86400)}${T.ago_day}`;
  }

  function isNew(iso) {
    if (!iso) return false;
    return (Date.now() - new Date(iso)) < 3600000; // within 1 hour
  }

  // ── Map opener ──
  function openMap() {
    const base = mapBase || location.origin;
    const url  = `${base}/map?uid=${uid}&lang=${lang}`;
    if (window.Telegram?.WebApp?.openLink) Telegram.WebApp.openLink(url);
    else window.open(url, '_blank');
  }

  // ── Room icons ──
  const ICONS = ['🏠','🏡','🏢','🌟','🎯','🎪','🎭','💫','🌍','🎵'];
  function roomIcon(id) { return ICONS[id % ICONS.length]; }

  // ── Render ──
  function render() {
    const distLimit = selDist.value ? parseFloat(selDist.value) : null;
    const memMin    = selMem.value  ? parseInt(selMem.value)    : null;

    let filtered = allRooms.filter(r => {
      if (distLimit !== null && r.distance != null && r.distance > distLimit) return false;
      if (memMin    !== null && r.members < memMin)                           return false;
      return true;
    });

    // Sort
    if (activeSort === 'distance') {
      filtered.sort((a,b) => (a.distance ?? 9999) - (b.distance ?? 9999));
    } else if (activeSort === 'members') {
      filtered.sort((a,b) => b.members - a.members);
    } else if (activeSort === 'newest') {
      filtered.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
    }

    const listEl  = document.getElementById('list');
    const noRes   = document.getElementById('no-results');
    const statsBar = document.getElementById('stats-bar');
    listEl.innerHTML = '';

    if (!filtered.length) {
      listEl.style.display  = 'none';
      noRes.style.display   = 'block';
      statsBar.style.display = 'none';
      return;
    }

    noRes.style.display    = 'none';
    listEl.style.display   = 'flex';
    statsBar.style.display = 'block';
    statsBar.textContent   = T.stats(filtered.length);

    filtered.forEach(r => {
      const card = document.createElement('div');
      card.className = 'rcard';

      // ── Top row ──
      const top = document.createElement('div');
      top.className = 'rcard-top';

      const icon = document.createElement('div');
      icon.className = 'room-icon';
      icon.textContent = roomIcon(r.id || 0);
      top.appendChild(icon);

      const info = document.createElement('div');
      info.className = 'rcard-info';

      const name = document.createElement('div');
      name.className = 'rcard-name';
      name.textContent = r.name || 'Room';
      info.appendChild(name);

      const meta = document.createElement('div');
      meta.className = 'rcard-meta';

      // Distance badge
      if (r.distance != null) {
        const b = document.createElement('span');
        b.className = 'meta-badge red';
        b.textContent = `📍 ${r.distance} ${T.km}`;
        meta.appendChild(b);
      }

      // Members badge
      const mb = document.createElement('span');
      mb.className = 'meta-badge purple';
      mb.textContent = `👥 ${r.members} ${T.members}`;
      meta.appendChild(mb);

      // NEW badge
      if (isNew(r.created_at)) {
        const nb = document.createElement('span');
        nb.className = 'meta-badge green';
        nb.textContent = `✨ ${T.new_badge}`;
        meta.appendChild(nb);
      } else if (r.created_at) {
        const tb = document.createElement('span');
        tb.className = 'meta-badge blue';
        tb.textContent = `🕒 ${timeAgo(r.created_at)}`;
        meta.appendChild(tb);
      }

      info.appendChild(meta);
      top.appendChild(info);
      card.appendChild(top);

      // ── Member dots ──
      if (r.members > 0) {
        const bar = document.createElement('div');
        bar.className = 'member-bar';
        const dotsCount = Math.min(r.members, 12);
        for (let i = 0; i < dotsCount; i++) {
          const dot = document.createElement('div');
          dot.className = 'member-dot';
          bar.appendChild(dot);
        }
        if (r.members > 12) {
          const lbl = document.createElement('span');
          lbl.className = 'member-count-label';
          lbl.textContent = `+${r.members - 12}`;
          bar.appendChild(lbl);
        }
        card.appendChild(bar);
      }

      // ── Occupancy bar ──
      const occWrap = document.createElement('div');
      occWrap.className = 'occ-bar-wrap';
      const occBg = document.createElement('div');
      occBg.className = 'occ-bar-bg';
      const occFill = document.createElement('div');
      occFill.className = 'occ-bar-fill';
      const maxM = Math.max(...filtered.map(x => x.members), 1);
      occFill.style.width = `${Math.min(100, (r.members / maxM) * 100)}%`;
      occBg.appendChild(occFill);
      occWrap.appendChild(occBg);
      card.appendChild(occWrap);

      // ── Actions ──
      const actions = document.createElement('div');
      actions.className = 'rcard-actions';

      const btnMap = document.createElement('button');
      btnMap.className = 'act-btn map';
      btnMap.textContent = T.btn_map;
      btnMap.addEventListener('click', openMap);
      actions.appendChild(btnMap);

      card.appendChild(actions);
      listEl.appendChild(card);
    });
  }

  // ── Sort chips ──
  document.querySelectorAll('.sort-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeSort = chip.dataset.sort;
      render();
    });
  });
  selDist.addEventListener('change', render);
  selMem.addEventListener('change',  render);

  // ── Fetch ──
  fetch(`/api/rooms/${uid}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      if (data.error && !data.rooms?.length) {
        document.getElementById('no-res-lbl').textContent = data.error;
        document.getElementById('no-results').style.display = 'block';
        return;
      }
      allRooms = data.rooms || [];
      render();
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('no-res-lbl').textContent = T.err;
      document.getElementById('no-results').style.display = 'block';
    });
</script>
</body>
</html>
